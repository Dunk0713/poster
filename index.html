<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书笔记生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<!-- 网页字体：霞鹜文楷（开源可商用，适合「文人」「手写」气质）-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
<!-- 网页字体：JetBrains Mono（适合「报表」气质）-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.10/index.css">
<!-- 网页字体：Playfair Display（适合「编辑部」气质标题）-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.0.20/700.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  background: #e8e0d8;
  color: #1d1d1f;
  height: 100vh;
  display: flex; flex-direction: column; overflow: hidden; user-select: none;
}

/* ── Header ── */
.app-header {
  height: 52px; background: rgba(255,252,248,0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid #e0d8cf; display: flex; align-items: center;
  justify-content: space-between; padding: 0 24px; flex-shrink: 0; z-index: 10;
}
.app-header h1 { font-size: 15px; font-weight: 600; color: #2a1a0e; }
.app-header .header-tag {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: #c4673a; background: rgba(196,103,58,0.09); padding: 4px 12px;
  border-radius: 20px; border: 1px solid rgba(196,103,58,0.22);
}
.size-selector { display: flex; gap: 4px; align-items: center; }
.size-btn {
  padding: 4px 10px; border-radius: 16px; border: 1px solid #e0d8cf;
  background: transparent; font-size: 11px; font-weight: 600; color: #9a8878;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.size-btn:hover { border-color: #c4673a; color: #c4673a; }
.size-btn.active { background: #c4673a; color: #fff; border-color: #c4673a; }

/* ── Layout ── */
.app-main { flex: 1; display: flex; overflow: hidden; }

/* ── Editor Panel ── */
.editor-panel {
  width: 420px; min-width: 420px; background: #fff8f3;
  border-right: 1px solid #e0d8cf; display: flex; flex-direction: column; overflow: hidden;
}
.editor-scroll { flex: 1; overflow-y: auto; padding: 16px 16px 8px; }
.editor-scroll::-webkit-scrollbar { width: 4px; }
.editor-scroll::-webkit-scrollbar-thumb { background: #d8cfc5; border-radius: 2px; }

.section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: #c4673a; margin-bottom: 8px; margin-top: 18px;
}
.section-label:first-child { margin-top: 0; }

/* ── Template Tabs ── */
.template-tabs { display: flex; gap: 6px; margin-bottom: 4px; }
.template-tab {
  flex: 1; padding: 8px 4px; border: 1px solid #e0d8cf; border-radius: 10px;
  background: #fff; font-size: 11px; font-weight: 500; color: #9a8878;
  cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.4;
}
.template-tab:hover { border-color: #c4673a; color: #c4673a; }
.template-tab.active { background: #c4673a; color: #fff; border-color: #c4673a; }
.template-hint {
  font-size: 11px; color: #8a8a92; letter-spacing: 0.03em;
  padding: 4px 8px 2px; line-height: 1.5; min-height: 18px;
}

/* ── Form ── */
.form-group { margin-bottom: 11px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: #7a6a5a; margin-bottom: 5px; }
.form-input, .form-textarea {
  width: 100%; padding: 8px 11px; border: 1px solid #e0d8cf; border-radius: 8px;
  font-size: 13px; font-family: inherit; color: #2a1a0e; background: #fffcf9;
  transition: border-color 0.2s, box-shadow 0.2s; outline: none;
}
.form-input:focus, .form-textarea:focus {
  border-color: #c4673a; box-shadow: 0 0 0 3px rgba(196,103,58,0.1); background: #fff;
}
.form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.form-hint { font-size: 11px; color: #b0a090; margin-top: 3px; }

/* ── Palette (theme cards) ── */
.palette-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.theme-card {
  position: relative; height: 44px; border-radius: 8px; overflow: hidden;
  border: 1.5px solid transparent; cursor: pointer; background: none; padding: 0;
  font-family: inherit; transition: border-color 0.15s, transform 0.15s;
}
.theme-card:hover { transform: translateY(-1px); }
.theme-card.active { border-color: #2a1a0e; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
.theme-card .tc-swatch { position: absolute; inset: 0; }
.theme-card .tc-accent {
  position: absolute; left: 4px; right: 4px; bottom: 4px;
  height: 3px; border-radius: 2px; opacity: 0.9;
}
.theme-card .tc-name {
  position: absolute; left: 6px; top: 5px;
  font-size: 9px; color: rgba(0,0,0,0.7); font-weight: 700;
  letter-spacing: 0.5px; text-shadow: 0 0 3px rgba(255,255,255,0.6);
}
.theme-card[data-theme="dark"] .tc-name,
.theme-card[data-theme="midnight"] .tc-name,
.theme-card[data-theme="glass"] .tc-name { color: rgba(255,255,255,0.9); text-shadow: 0 0 3px rgba(0,0,0,0.4); }

/* ── Font Size ── */
.font-size-row { display: flex; gap: 6px; }
.font-size-btn {
  flex: 1; padding: 6px; border: 1px solid #e0d8cf; border-radius: 8px;
  background: #fff; font-size: 12px; cursor: pointer; transition: all 0.2s;
  text-align: center; color: #7a6a5a; font-family: inherit;
}
.font-size-btn:hover { border-color: #c4673a; color: #c4673a; }
.font-size-btn.active { background: #c4673a; color: #fff; border-color: #c4673a; }

/* ── Segmented control (reuse) ── */
.seg-row { display: flex; gap: 4px; }
.seg-btn {
  flex: 1; padding: 5px 8px; border: 1px solid #e0d8cf; border-radius: 6px;
  background: #fff; font-size: 11px; cursor: pointer; transition: all 0.2s;
  text-align: center; color: #7a6a5a; font-family: inherit; white-space: nowrap;
}
.seg-btn:hover { border-color: #c4673a; color: #c4673a; }
.seg-btn.active { background: #c4673a; color: #fff; border-color: #c4673a; }

/* ── Overflow indicator ── */
.overflow-bar {
  display: flex; align-items: center; gap: 8px; margin-top: 6px;
  padding: 7px 10px; border-radius: 8px; font-size: 12px;
  background: rgba(220,60,30,0.07); border: 1px solid rgba(220,60,30,0.2); color: #c03020;
}
.overflow-bar.ok { background: rgba(90,150,90,0.06); border-color: rgba(90,150,90,0.2); color: #4a8a4a; }
.overflow-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.overflow-fill {
  height: 4px; background: #e8dfd5; border-radius: 2px; flex: 1; overflow: hidden;
}
.overflow-fill-inner { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }

/* ── Block Editor ── */
.blocks-editor { display: flex; flex-direction: column; gap: 7px; margin-bottom: 6px; }
.block-item {
  background: #fff; border: 1px solid #e8dfd5; border-radius: 10px;
  padding: 9px 11px; transition: border-color 0.15s, box-shadow 0.15s;
}
.block-item:hover { border-color: #d4cabe; }
.block-item:focus-within { border-color: #c4673a; box-shadow: 0 0 0 3px rgba(196,103,58,0.08); }
.block-item-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 7px;
}
.block-item-header .block-type-badge { flex: 0 0 auto; }
.block-item-header .block-actions { margin-left: auto; }
.block-fold-btn { flex: 0 0 auto; }
.block-item.is-folded { opacity: 0.78; }
.block-item.is-folded .block-item-header { margin-bottom: 0; }
.block-type-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: #c4673a; background: rgba(196,103,58,0.08); padding: 2px 7px; border-radius: 20px;
}
.block-actions { display: flex; gap: 3px; }
.block-btn {
  width: 22px; height: 22px; border-radius: 6px; border: 1px solid #e0d8cf;
  background: #fff; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 11px; color: #9a8878; transition: all 0.2s;
  padding: 0;
}
.block-btn:hover { border-color: #c4673a; color: #c4673a; }
.block-btn.danger:hover { border-color: #e04030; color: #e04030; }

/* ── Per-block style toolbar ── */
.block-style-bar { display: flex; gap: 5px; align-items: center; margin-bottom: 7px; flex-wrap: wrap; }
.block-style-bar .bsb-label { font-size: 10px; color: #b0a090; white-space: nowrap; }
.block-style-bar .bsb-colors { display: flex; gap: 3px; align-items: center; }
.block-color-dot {
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0;
}
.block-color-dot:hover { transform: scale(1.15); }
.block-color-dot.active { border-color: #2a1a0e; box-shadow: 0 0 0 2px rgba(42,26,14,0.12); }
.block-color-dot.gradient-dot { border-radius: 50%; }
.block-size-mini { display: flex; gap: 2px; margin-left: 4px; }
.block-size-mini button {
  padding: 2px 6px; border: 1px solid #e0d8cf; border-radius: 4px;
  background: #fff; font-size: 10px; cursor: pointer; color: #9a8878;
  font-family: inherit; transition: all 0.15s;
}
.block-size-mini button:hover { border-color: #c4673a; color: #c4673a; }
.block-size-mini button.active { background: #c4673a; color: #fff; border-color: #c4673a; }
.block-custom-color-input {
  width: 18px; height: 18px; border: none; padding: 0; cursor: pointer;
  border-radius: 50%; overflow: hidden; background: transparent;
}
.block-custom-color-input::-webkit-color-swatch-wrapper { padding: 0; }
.block-custom-color-input::-webkit-color-swatch { border: 1px solid #ddd; border-radius: 50%; }

.add-block-row { display: flex; gap: 5px; flex-wrap: wrap; padding: 2px 0; }
.add-block-group { margin-top: 10px; }
.add-block-group:first-child { margin-top: 0; }
.add-block-group-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  color: #a0a0a8; text-transform: uppercase; margin-bottom: 4px;
}
.add-block-btn {
  padding: 4px 9px; border: 1px dashed #d8cfc5; border-radius: 20px;
  background: transparent; font-size: 11px; color: #9a8878;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.add-block-btn:hover { border-color: #c4673a; color: #c4673a; border-style: solid; }

/* ── Data rows ── */
.data-row { display: flex; gap: 7px; margin-bottom: 7px; align-items: center; }
.data-row-num {
  flex: 0 0 auto; width: 22px; height: 22px; border-radius: 50%;
  background: rgba(196,103,58,0.1); color: #c4673a;
  font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;
}
.data-row .form-input { flex: 1; }
.data-row-btn {
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid #e0d8cf;
  background: #fff; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 13px; color: #9a8878; transition: all 0.2s; flex-shrink: 0;
  padding: 0;
}
.data-row-btn:hover { border-color: #c4673a; color: #c4673a; }
.data-row-btn.danger:hover { border-color: #e04030; color: #e04030; }
.add-row-btn {
  width: 100%; padding: 7px; border: 1px dashed #d8cfc5; border-radius: 8px;
  background: transparent; cursor: pointer; font-size: 12px; color: #9a8878;
  transition: all 0.2s; font-family: inherit;
}
.add-row-btn:hover { border-color: #c4673a; color: #c4673a; }

/* ── Image drop ── */
.image-drop {
  border: 2px dashed #d8cfc5; border-radius: 10px; padding: 18px;
  text-align: center; cursor: pointer; transition: all 0.2s; color: #9a8878;
  font-size: 12px; position: relative; min-height: 64px; display: flex;
  flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  outline: none;
}
.image-drop:hover { border-color: #c4673a; color: #c4673a; }
.image-drop.has-image { padding: 4px; border-style: solid; border-color: #e0d8cf; }
.image-drop img { max-width: 100%; max-height: 160px; border-radius: 6px; object-fit: contain; }
.image-drop .remove-img {
  position: absolute; top: 6px; right: 6px; width: 20px; height: 20px;
  border-radius: 50%; background: rgba(0,0,0,0.5); color: #fff;
  border: none; font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ── Focal point picker ── */
.focal-preview {
  position: relative; border-radius: 8px; overflow: hidden;
  cursor: crosshair; border: 1px solid #e0d8cf; margin-top: 6px;
  max-height: 160px;
}
.focal-preview img { width: 100%; display: block; pointer-events: none; object-fit: cover; }
.focal-dot {
  position: absolute; width: 18px; height: 18px; border-radius: 50%;
  background: rgba(196,103,58,0.9); border: 2.5px solid #fff;
  transform: translate(-50%,-50%); pointer-events: none;
  box-shadow: 0 1px 6px rgba(0,0,0,0.4), 0 0 0 1px rgba(196,103,58,0.3); z-index: 3;
  transition: left 0.1s, top 0.1s;
}
.focal-crosshair { position: absolute; pointer-events: none; z-index: 1; }
.focal-crosshair-h { left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.55); }
.focal-crosshair-v { top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.55); }

/* ── Image height slider ── */
.img-slider-row {
  display: flex; align-items: center; gap: 8px; margin-top: 6px; transition: opacity 0.2s;
}
.img-slider-row input[type="range"] {
  flex: 1; height: 4px; accent-color: #c4673a; cursor: pointer;
  -webkit-appearance: auto;
}
.img-slider-val {
  font-size: 11px; color: #7a6a5a; font-weight: 600; min-width: 40px;
  text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums;
}

/* ── Page Strip ── */
.page-strip {
  padding: 9px 16px; border-top: 1px solid #e0d8cf; background: #f5ede4;
  display: flex; align-items: center; gap: 7px; overflow-x: auto; flex-shrink: 0;
}
.page-strip::-webkit-scrollbar { height: 3px; }
.page-strip::-webkit-scrollbar-thumb { background: #d8cfc5; border-radius: 2px; }
.page-pill {
  min-width: 38px; height: 50px; border-radius: 8px; border: 2px solid #e0d8cf;
  background: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #9a8878; cursor: pointer;
  transition: all 0.2s; position: relative; flex-shrink: 0;
}
.page-pill:hover { border-color: #c4a882; }
.page-pill.active { border-color: #c4673a; color: #c4673a; background: #fff8f3; }
.page-pill .delete-page {
  display: none; position: absolute; top: -6px; right: -6px; width: 15px; height: 15px;
  border-radius: 50%; background: #e04030; color: #fff; font-size: 9px;
  line-height: 15px; text-align: center; cursor: pointer; border: none;
}
.page-pill:hover .delete-page { display: block; }
.page-add {
  min-width: 38px; height: 50px; border-radius: 8px; border: 2px dashed #d8cfc5;
  background: transparent; display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #b0a090; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.page-add:hover { border-color: #c4673a; color: #c4673a; }

/* ── Preview Panel ── */
.preview-panel {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 20px; position: relative; overflow: hidden;
  background: #ddd6ce;
}
.preview-wrapper { position: relative; overflow: hidden; flex-shrink: 0; }
.preview-nav {
  position: absolute; top: 50%; transform: translateY(-50%); width: 34px; height: 34px;
  border-radius: 50%; background: rgba(255,252,248,0.92); border: 1px solid #e0d8cf;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #7a6a5a; transition: all 0.2s; z-index: 5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.preview-nav:hover { background: #fff; color: #2a1a0e; }
.preview-nav.prev { left: -46px; }
.preview-nav.next { right: -46px; }
.preview-info { margin-top: 12px; font-size: 12px; color: #9a8878; text-align: center; }

/* ── Export ── */
.export-bar { display: flex; gap: 9px; margin-top: 10px; }
.export-btn {
  padding: 9px 20px; border-radius: 20px; border: none; font-size: 13px;
  font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.export-btn.primary { background: #c4673a; color: #fff; }
.export-btn.primary:hover { background: #b05a30; }
.export-btn.secondary { background: #fff; color: #2a1a0e; border: 1px solid #d8cfc5; }
.export-btn.secondary:hover { border-color: #9a8878; }
.export-btn.ghost { background: transparent; color: #7a6a5a; border: 1px solid transparent; flex: 0 0 auto; min-width: 76px; position: relative; }
.export-btn.ghost .undo-count {
  display: none; margin-left: 6px; font-size: 10px; font-weight: 700;
  background: rgba(196,103,58,0.16); color: #c4673a;
  border-radius: 8px; padding: 1px 6px; line-height: 1.4;
}
.export-btn.ghost .undo-count.has { display: inline-block; }

.kbd-hint {
  margin-top: 8px; padding: 6px 10px; text-align: center;
  font-size: 10px; color: #b0a090; line-height: 1.6;
}
.kbd-hint kbd {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  background: #fffaf3; border: 1px solid #e8dfd5;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
  font-size: 10px; color: #7a6a5a; margin: 0 1px;
}

/* ── Find & Replace bar ── */
.find-replace-bar {
  display: none; align-items: center; gap: 8px;
  padding: 10px 14px; margin-bottom: 12px;
  background: #fff; border: 1px solid #e0d8cf; border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06); animation: frSlide 0.18s ease-out;
}
.find-replace-bar.show { display: flex; }
.find-replace-bar .fr-input { flex: 1; min-width: 100px; padding: 8px 11px; font-size: 13px; }
.find-replace-bar .fr-arrow { color: #b0a090; flex-shrink: 0; font-weight: 700; }
.find-replace-bar .fr-btn { padding: 8px 14px; font-size: 12px; flex-shrink: 0; min-width: auto; }
.find-replace-bar .fr-count { font-size: 11px; color: #888; min-width: 60px; text-align: right; }
@keyframes frSlide { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.export-btn.ghost:hover:not(:disabled) { background: #fffaf3; color: #c4673a; border-color: #e8dfd5; }
.export-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Author / Collapse ── */
.author-row { display: flex; gap: 8px; }
.author-row .form-group { flex: 1; }
.collapse-header {
  display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 2px 0;
}
.collapse-header .arrow { font-size: 10px; color: #b0a090; transition: transform 0.2s; }
.collapse-header.open .arrow { transform: rotate(90deg); }
.collapse-body { display: none; }
.collapse-body.open { display: block; animation: frSlide 0.22s ease; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 40px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #2a1a0e; color: #fff; padding: 11px 22px; border-radius: 24px;
  font-size: 13px; font-weight: 500; z-index: 1000; opacity: 0;
  transition: all 0.3s ease; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.toast-warn  { background: #c08030; }
.toast.toast-error { background: #c03020; }
.toast.toast-success { background: #2e8a4e; }
.toast.toast-action { pointer-events: auto; cursor: default; padding-right: 12px; }
.toast.toast-action [data-restore]:hover { background: rgba(255,255,255,0.32) !important; }

/* ═══════════════════════════════════════════
   CARD OUTPUT STYLES  1080 × 1440
   ═══════════════════════════════════════════ */
.card {
  width: 1080px; height: 1440px; position: relative; overflow: hidden;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla", sans-serif;
  display: flex; flex-direction: column;
  /* ── Design tokens (1.25 modular type scale + 8px spacing grid) ── */
  --fs-cap:18px; --fs-micro:22px; --fs-xs:28px; --fs-body:36px;
  --fs-lg:46px;  --fs-h3:58px;  --fs-h2:72px; --fs-h1:90px; --fs-hero:112px;
  --lh-tight:1.15; --lh-snug:1.35; --lh-body:1.65; --lh-loose:1.8;
  --tr-title:-0.015em; --tr-body:0; --tr-cap:0.08em; --tr-label:0.04em;
  --space-block: var(--space-6);
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:24px; --space-6:32px; --space-7:40px; --space-8:56px;
  --space-9:72px; --space-10:96px;
  --radius-sm:10px; --radius-md:16px; --radius-lg:24px; --radius-xl:32px;
  --bg-angle:170deg;
  /* 涨跌语义色（A股红涨绿跌默认值；深色主题下覆盖为高对比亮色） */
  --pos:#d63031; --neg:#1e8a3e;
  --accent-s:rgba(0,0,0,0.28);  /* overridden per theme */
  /* 字体系统：默认（系统无衬线）。各 mood 同时覆盖标题字体与正文字体以保持风格统一 */
  --font-base: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Hiragino Sans GB", sans-serif;
  --font-display: var(--font-base);
}
/* 全局正文字体：所有 .card 内的文本默认走 --font-base，跟随主题切换 */
.card {
  font-family: var(--font-base);
  /* 中西文混排：tnum 等宽数字 / palt 比例标点（中文标点不再占满全角） */
  font-feature-settings: "tnum" 1, "palt" 1, "halt" 1;
  text-spacing-trim: space-all;  /* 自动修剪句首/句末标点的额外空白（CSS Text 4） */
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* ── Global mood (气质) — 标题 + 正文一起变化 ── */
/* 编辑部：衬线宋体气质，杂志感 */
.card.mood-editorial {
  --font-base: 'Source Han Serif SC', 'Noto Serif CJK SC', 'Songti SC', 'STSong', '宋体', Georgia, 'Times New Roman', serif;
  --font-display: 'Playfair Display', 'Source Han Serif SC', 'Songti SC', '宋体', Georgia, serif;
  --tr-title: -0.025em;
  --space-9: 88px; --space-10: 112px;
}
.card.mood-editorial .card-title,
.card.mood-editorial .cover-title { font-weight: 650; }
.card.mood-editorial .cb-highlight .mod-label,
.card.mood-editorial .cb-section-header .sh-label { font-weight: 550; }

/* 极简：仍是无衬线但更轻量、更舒展 */
.card.mood-minimal {
  --font-base: 'Helvetica Neue', -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --font-display: var(--font-base);
  --space-9: 112px; --space-10: 144px;
  --fs-body: 34px;
}
.card.mood-minimal .card-accent-bar { display: none; }
.card.mood-minimal .card-category::after { display: none; }
.card.mood-minimal .cb-section-header .sh-line { display: none; }
.card.mood-minimal .card-title,
.card.mood-minimal .cover-title { font-weight: 550; letter-spacing: -0.02em; }
.card.mood-minimal .cb-text { font-weight: 350; }

/* 文人：纯衬线（楷体感强，正文也用衬线） */
.card.mood-serif {
  --font-base: 'LXGW WenKai', '霞鹜文楷', 'KaiTi', 'STKaiti', '楷体', 'Source Han Serif SC', serif;
  --font-display: 'LXGW WenKai', '霞鹜文楷', 'KaiTi', 'Source Han Serif SC', '宋体', serif;
  --tr-title: -0.005em;
  --lh-body: 1.85;
  --lh-loose: 1.95;  /* 楷体正文更舒展；统一后正文族走 --lh-loose 才生效 */
}
.card.mood-serif .card-title,
.card.mood-serif .cover-title { font-weight: 600; }

/* 亲和：圆体 / 圆润感（正文与标题都偏圆） */
.card.mood-rounded {
  --font-base: 'HarmonyOS Sans SC', 'PingFang SC', 'Hiragino Sans GB', "Microsoft YaHei", "Helvetica Rounded", "Arial Rounded MT Bold", sans-serif;
  --font-display: 'HarmonyOS Sans SC', 'PingFang SC', "Helvetica Rounded", "Arial Rounded MT Bold", sans-serif;
  --tr-title: -0.01em;
}
.card.mood-rounded .card-title,
.card.mood-rounded .cover-title { font-weight: 750; letter-spacing: -0.025em; }
.card.mood-rounded .cb-keystat .ks-value,
.card.mood-rounded .cb-herostat .hs-value,
.card.mood-rounded .cb-metric .m-value { font-weight: 800; }

/* 报表：等宽数据感。正文回退默认无衬线（等宽中英混排呆板），
   仅标题与数据/数字块用等宽，保留金融报表气质 */
.card.mood-mono {
  --font-display: 'JetBrains Mono', 'SF Mono', 'Source Han Sans SC', "Microsoft YaHei", monospace;
  --tr-title: 0;
  --tr-body: 0.01em;
}
.card.mood-mono .card-title,
.card.mood-mono .cover-title { font-weight: 700; letter-spacing: -0.01em; }
.card.mood-mono .cb-table,
.card.mood-mono .cb-metric,
.card.mood-mono .cb-kpigrid,
.card.mood-mono .cb-keystat,
.card.mood-mono .cb-herostat,
.card.mood-mono .cb-sparkcard,
.card.mood-mono .cb-progress {
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', Consolas, 'PingFang SC', "Microsoft YaHei", monospace;
  font-feature-settings: "tnum" 1, "ss01" 1;
}

/* 手写：楷体 / 手写体气质（适合温暖、感性、知识科普） */
.card.mood-handwriting {
  --font-base: 'LXGW WenKai', 'KaiTi', 'STKaiti', '楷体', 'PingFang SC', cursive;
  --font-display: 'LXGW WenKai', 'KaiTi', 'STKaiti', '楷体', cursive;
  --tr-title: 0;
  --lh-body: 1.9;
  --lh-loose: 2.0;
}
.card.mood-handwriting .card-title,
.card.mood-handwriting .cover-title { font-weight: 500; }
.card.mood-handwriting .cb-highlight .mod-label,
.card.mood-handwriting .cb-section-header .sh-label { font-weight: 500; letter-spacing: 0.02em; }
/* 手写体在深色主题可读性差：深色下回退默认无衬线（保留手写的舒展行距） */
.card.theme-dark.mood-handwriting,
.card.theme-midnight.mood-handwriting,
.card.theme-navy.mood-handwriting {
  --font-base: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Hiragino Sans GB", sans-serif;
  --font-display: var(--font-base);
}

/* ── Global density (密度) ── */
.card.density-compact { --space-9: 56px; --space-10: 72px; --space-block: var(--space-4); }
.card.density-airy    { --space-9: 96px; --space-10: 128px; --space-block: var(--space-8); }

/* Themes */

  --line:rgba(0,0,0,0.10); --mod:#fff; --shad:rgba(82,40,20,0.08);
  --pill-bg:rgba(181,87,42,0.10); --pill-text:#8a4020;
}

  --line:rgba(0,0,0,0.10); --mod:#fff; --shad:rgba(10,20,40,0.10);

  --line:rgba(0,0,0,0.10); --mod:#fff; --shad:rgba(82,40,20,0.08);

/* ── New themes ── */
.card.theme-pure {
  --bg1:#ffffff; --bg2:#f5f5f7; --bg-angle:160deg;
  --title:#1d1d1f; --body:#424245; --sub:#86868b;
  --accent:#0071e3; --accent-l:rgba(0,113,227,0.08); --accent-m:rgba(0,113,227,0.16); --accent-s:rgba(0,113,227,0.28);
  --line:rgba(0,0,0,0.10); --mod:#ffffff; --shad:rgba(0,0,0,0.06);
  --pill-bg:rgba(0,113,227,0.08); --pill-text:#0055b3;
}
.card.theme-dark {
  --bg1:#1a1a2e; --bg2:#16213e; --bg-angle:145deg;
  --title:#e8e8ff; --body:#d0d0e8; --sub:#9292b8;
  --accent:#b89aff; --accent-l:rgba(184,154,255,0.08); --accent-m:rgba(184,154,255,0.16); --accent-s:rgba(184,154,255,0.28);
  --line:rgba(255,255,255,0.10); --mod:rgba(255,255,255,0.06); --shad:rgba(0,0,0,0.3);
  --pill-bg:rgba(184,154,255,0.15); --pill-text:#d4bcff;
}
.card.theme-glass {
  --bg1:rgba(255,255,255,0.72); --bg2:rgba(240,240,250,0.55); --bg-angle:135deg;
  --title:#1a1a2e; --body:#2a2a44; --sub:#7a7aa0;
  --accent:#6366f1; --accent-l:rgba(99,102,241,0.08); --accent-m:rgba(99,102,241,0.16); --accent-s:rgba(99,102,241,0.28);
  --line:rgba(0,0,0,0.10); --mod:rgba(255,255,255,0.65); --shad:rgba(10,20,40,0.10);

.card.theme-glass .card-bg {
