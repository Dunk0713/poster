  table:     '数据表格',
};

const THEMES = [
  { id: 'terracotta', label: '赤陶',  colors: ['#faf5ee','#f0e6d8'], accent: '#b5572a' },
  { id: 'ivory',      label: '象牙',  colors: ['#faf8f5','#ede8e0'], accent: '#7a5f3d' },
  { id: 'sage',       label: '鼠尾草',colors: ['#f4f6f2','#e4ebe0'], accent: '#3d7a52' },
  { id: 'blue',       label: '柔蓝',  colors: ['#f0f4fa','#e2eaf4'], accent: '#2a5ad0' },
  { id: 'blush',      label: '腮红',  colors: ['#faf0f4','#f0e2e6'], accent: '#c83860' },
  { id: 'pure',       label: '纯白',  colors: ['#ffffff','#f5f5f7'], accent: '#0071e3' },
  { id: 'warm',       label: '暖橘',  colors: ['#fdf6ee','#f8ece0'], accent: '#d45220' },
  { id: 'glass',      label: '玻璃',  colors: ['#e8ecfa','#d8e0f4'], accent: '#6366f1' },
  { id: 'rainbow',    label: '彩虹',  colors: ['#fef9ff','#f0e8fa'], accent: '#e040a0' },
  { id: 'dark',       label: '深邃',  colors: ['#1a1a2e','#2a2a44'], accent: '#b89aff' },
  { id: 'midnight',   label: '宇宙',  colors: ['#0f0f1a','#1a1a30'], accent: '#00d4ff' },
  { id: 'navy',       label: '黑金',  colors: ['#0b1d3a','#13294d'], accent: '#e8b84a' },
];

// Per-block color presets (label, CSS value)
const BLOCK_COLORS = [
  { id: '', label: '默认', css: '' },
  { id: 'accent', label: '主题色', css: 'var(--accent)' },
  { id: 'black', label: '黑色', css: '#1d1d1f' },
  { id: 'red', label: '红', css: '#e04040' },
  { id: 'orange', label: '橙', css: '#e88a30' },
  { id: 'blue', label: '蓝', css: '#3a7ae8' },
  { id: 'green', label: '绿', css: '#3aaa6a' },
  { id: 'purple', label: '紫', css: '#8a5ae8' },
  { id: 'pink', label: '粉', css: '#e8689a' },
  { id: 'gradient-rainbow', label: '彩虹', css: 'linear-gradient(90deg,#ff6b6b,#ffa94d,#ffd43b,#69db7c,#4dabf7,#9775fa)' },
  { id: 'gradient-sunset', label: '日落', css: 'linear-gradient(90deg,#ff6b6b,#ffa94d,#ffd43b)' },
  { id: 'gradient-ocean', label: '海洋', css: 'linear-gradient(90deg,#4dabf7,#9775fa,#da77f2)' },
];

function makeBlock(type) {
  // 1.6：canonical 排版字段只保留 rhythm + fontWeight（旧 spacing/lineHeight 由 migrateBlock 收敛后删除）
  const base = { customSize: '', customColor: '', blockStyle: '', rhythm: '', fontWeight: '', align: '', maxW: '', col: '' };
  switch(type) {
    case 'text':      return { ...base, type, content: '' };
    case 'bullets':   return { ...base, type, items: [''] };
    case 'numbered':  return { ...base, type, items: [''] };
    case 'highlight': return { ...base, type, label: '', content: '', labelSize: '', labelStyle: '' };
    case 'quote':     return { ...base, type, variant: '', content: '', source: '' };
    case 'infocard':  return { ...base, type, num: '', title: '', desc: '' };
    case 'keystat':   return { ...base, type, variant: '', value: '', label: '', caption: '', delta: '', deltaDir: 'up', deltaLabel: '', chipLabel: '', chipValue: '' };
    case 'herostat':  return { ...base, type: 'keystat', variant: 'hero', value: '8.2%', label: '年化收益率', caption: '', delta: '', deltaDir: 'up', deltaLabel: '', chipLabel: '', chipValue: '' };
    case 'pullquote': return { ...base, type: 'quote', variant: 'featured', content: '市场不会奖励正确，只会奖励耐心。', source: '彼得·林奇' };
    case 'metric':    return { ...base, type: 'keystat', variant: 'metric', value: '8.2%', label: '年化收益', delta: '+12%', deltaDir: 'up', deltaLabel: 'vs 上月', caption: '', chipLabel: '', chipValue: '' };
    case 'ranking':   return { ...base, type, title: 'TOP 基金', items: [
      { name: '易方达蓝筹', value: '23.5%', pct: 100 },
      { name: '中欧医疗', value: '17.2%', pct: 72 },
      { name: '富国天惠', value: '12.8%', pct: 55 }
    ] };
    case 'progress':  return { ...base, type, value: 68, label: '权益仓位', caption: '目标 70%', size: 'm' };
    case 'kpigrid':   return { ...base, type, items: [
      { value: '8.2%', label: '年化收益', delta: '+12%', deltaDir: 'up' },
      { value: '¥2.4亿', label: '管理规模', delta: '+5%', deltaDir: 'up' },
      { value: '-4.8%', label: '最大回撤', delta: '-1.2%', deltaDir: 'down' },
      { value: '1.42', label: '夏普比率', delta: '0', deltaDir: 'flat' }

// Migrate legacy block schemas to current shape (idempotent).
// Invoked on block-state consumption so old notes open cleanly.
function migrateBlock(blk) {
  if (!blk || !blk.type) return blk;
  // Legacy size values ms/ml → small/large
  if (blk.customSize === 'ms') blk.customSize = 'small';
  if (blk.customSize === 'ml') blk.customSize = 'large';
  // Legacy spacing/lineHeight → 统一 rhythm，并删除遗留字段（单一真源）
  // 注意：divider.spacing 是其自身「间距档」语义，不在收敛范围
  if (blk.type !== 'divider') {
    if (blk.spacing && !blk.rhythm) {
      const map = { tight: 'tight', loose: 'loose', extra: 'breath' };
      if (map[blk.spacing]) blk.rhythm = map[blk.spacing];
    }
    if (blk.lineHeight && !blk.rhythm) {
      const lhMap = { compact: 'tight', relaxed: 'loose' };
      if (lhMap[blk.lineHeight]) blk.rhythm = lhMap[blk.lineHeight];
    }
    delete blk.spacing;
    delete blk.lineHeight;
  }
  // Legacy fontWeight heavy → bold
  if (blk.fontWeight === 'heavy') blk.fontWeight = 'bold';
  // ── 3.1 块合并：旧 type → 规范 type + variant（幂等；旧档渲染等价）──
  if (blk.type === 'pullquote') {
    blk.type = 'quote';
    if (!blk.variant) blk.variant = 'featured';
    if (!blk.content && blk.text) blk.content = blk.text;
    delete blk.text;
  }
  if (blk.type === 'herostat' || blk.type === 'metric' || blk.type === 'compare') {
    const v = { herostat: 'hero', metric: 'metric', compare: 'compare' }[blk.type];
    blk.type = 'keystat';
    if (!blk.variant) blk.variant = v;
  }
  if (blk.type === 'keystat') {
    if (blk.variant === undefined) blk.variant = '';
    ['value','label','caption','delta','deltaLabel','chipLabel','chipValue'].forEach(k => { if (blk[k] === undefined) blk[k] = ''; });
    if (!blk.deltaDir) blk.deltaDir = 'up';
  }
  if (blk.type === 'source') {
    blk.type = 'tldr';
    if (!blk.variant) blk.variant = 'source';
  }
  if (blk.type === 'tldr') {
    if (blk.variant === undefined) blk.variant = '';
    if (!Array.isArray(blk.points)) blk.points = [''];
    if (!Array.isArray(blk.items))  blk.items  = [{ id: '1', text: '' }];
  }
  // 字段兜底（旧笔记打开不报错）
  if (blk.type === 'panel'  && !Array.isArray(blk.children)) blk.children = [];
  if (blk.type === 'disclaimer' && !blk.preset) blk.preset = 'standard';
  if (blk.type === 'disclaimer' && !blk.content) blk.content = DISCLAIMER_PRESETS.standard;
  if (blk.type === 'qrcode' && !blk.kind) blk.kind = 'wechat';
  if (blk.type === 'qrcode' && !blk.size) blk.size = 'm';
  if (blk.type === 'image' && (blk.zoom === undefined || blk.zoom === null || !(Number(blk.zoom) >= 1))) blk.zoom = 1;
  if (blk.type === 'table') {
    if (!Array.isArray(blk.headers)) blk.headers = ['指标','A','B'];
    if (!Array.isArray(blk.rows)) blk.rows = [[{text:''},{text:''},{text:''}]];
    // 兼容旧字符串数组：转成 {text} 对象
    blk.rows = blk.rows.map(r => Array.isArray(r) ? r.map(c => typeof c==='string' ? { text:c } : c) : []);
    if (!Array.isArray(blk.colAligns)) blk.colAligns = [];
    if (!Array.isArray(blk.colWidths)) blk.colWidths = [];
    if (!Array.isArray(blk.highlightRows)) blk.highlightRows = [];
  }
  // panel 子块递归迁移（此前从未迁移，旧档嵌套块的遗留字段会漏收敛）
  if (blk.type === 'panel' && Array.isArray(blk.children)) {
    blk.children = blk.children.map(migrateBlock);
  }
  return blk;
}

// ── Debounce & Focus Preservation utilities ──
function _debounce(fn, delay) {
  let timer = null;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

/** Save current focus/selection info */
function _saveFocus() {
  const el = document.activeElement;
  if (!el || !el.id) return null;
  // selectionStart 在非文本类输入（如 type=color/checkbox）下为 undefined，需用 in 检测
  if (!('selectionStart' in el)) return { id: el.id };
  return { id: el.id, start: el.selectionStart, end: el.selectionEnd, top: el.scrollTop || 0 };
}

/** Restore focus/selection after DOM rebuild */
function _restoreFocus(info) {
  if (!info) return;
  const el = document.getElementById(info.id);
  if (!el || !el.focus) return;
  el.focus({ preventScroll: true });
  if (info.start !== undefined) {
    try { el.setSelectionRange(info.start, info.end); } catch(e) {/* range error on some inputs */}
  }
  if (info.top !== undefined && el.scrollTop !== undefined) el.scrollTop = info.top;
}

function showToast(msg, typeOrD = 'info', d = 2400) {
  // 兼容旧调用 showToast('xxx', 1500) 形式
  let type = 'info';
  if (typeof typeOrD === 'number') { d = typeOrD; }
  else if (typeof typeOrD === 'string') { type = typeOrD; }
  if (!els.toast) return;
  const ICON = { info: '', warn: '⚠ ', error: '✕ ', success: '✓ ' };
  els.toast.textContent = (ICON[type] || '') + msg;
  els.toast.className = 'toast show toast-' + type;
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => els.toast.classList.remove('show'), d);
}

// 带「撤销」按钮的可交互 toast（专为破坏性操作如删除提供 5s 内立即恢复入口）
function showRestoreToast(msg, onRestore, ms = 5000) {
  if (!els.toast) return;
  els.toast.innerHTML = `${esc(msg)} <span style="margin-left:14px;padding:3px 10px;background:rgba(255,255,255,0.18);border-radius:14px;cursor:pointer;font-weight:700" data-restore="1">↶ 撤销</span>`;
  els.toast.className = 'toast show toast-info toast-action';
  clearTimeout(showToast._t);
  const closeT = () => { els.toast.classList.remove('show'); els.toast.onclick = null; };
  showToast._t = setTimeout(closeT, ms);
  els.toast.onclick = (e) => {
    const tgt = e.target.closest('[data-restore]');
    if (!tgt) return;
    clearTimeout(showToast._t);
    closeT();
    try { onRestore(); } catch(err) { console.error(err); }
  };
}

function _today() {

  const day = String(d.getDate()).padStart(2,'0');

}

function esc(t) {
  if (!t) return '';
  const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
}

// Attribute-safe escape (for values placed inside HTML attribute quotes)
function escAttr(t) {
  if (!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// **bold**, ==accent==, [^N] cite, \n → <br>
function inl(text) {
  if (!text) return '';
  return esc(text)
    .replace(/\*\*(.+?)\*\*/gu, '<strong>$1</strong>')
    .replace(/==(.+?)==/gu, '<span class="acc">$1</span>')
    .replace(/\[\^(\d+)\]/g, '<sup class="cite">$1</sup>')
    .replace(/\r?\n/g, '<br>');  // 单换行直接渲染为 <br>（parseBody 调用时已无 \n，互不冲突）
}

function parseBody(text) {
  if (!text) return '';
  const lines = text.split('\n'); let html = '', buf = [];
  const flush = () => { if (buf.length) { html += `<p>${buf.join('<br>')}</p>`; buf = []; } };
  for (const line of lines) { const t = line.trimEnd(); if (!t) flush(); else buf.push(inl(t)); }
  flush();
  return html;
}

function readFile(file, cb) {
  if (!file) return;
  const MAX_MB = 10;
  const OK_TYPES = ['image/jpeg','image/jpg','image/png','image/webp','image/gif','image/svg+xml'];
  if (!OK_TYPES.includes(file.type)) {
    return showToast(`不支持 ${file.type || '该格式'}，请用 JPG / PNG / WebP / GIF`, 'error', 3200);
  }
  if (file.size > MAX_MB * 1024 * 1024) {
    return showToast(`图片 ${(file.size/1024/1024).toFixed(1)}MB 超过 ${MAX_MB}MB 上限，请压缩后再上传`, 'error', 3500);
  }
  const r = new FileReader();
  r.onload = () => cb(r.result);
  r.onerror = () => showToast('图片读取失败，请重试', 'error');
  r.readAsDataURL(file);
}

}

// Calculate height from aspect ratio string, based on content width (920px)
function ratioToH(ratio) {
  const contentW = state.cardW - 160; // 80px padding each side
  const maxH = state.cardH - 148;
  if (ratio === 'fill') return maxH;
  const map = { '21:9': 9/21, '16:9': 9/16, '4:3': 3/4, '1:1': 1 };
  if (!map[ratio]) return 0; // 'auto'
  return Math.min(Math.round(contentW * map[ratio] / 10) * 10, maxH);
}

// ====== Overflow detection ======
function checkOverflow() {
  // card-content is flex:1 so its scrollHeight always equals offsetHeight.
  // Real overflow lives inside .card-body (flex:1 min-height:0 inside card-content).
  const body = els.cardContent.querySelector('.card-body');

  let hasOverflow = false, pct = 0;
  if (body) {
    // card-body clips content with overflow:hidden but scrollHeight still reflects true content size
    hasOverflow = body.scrollHeight > body.offsetHeight + 4;
    pct = body.offsetHeight > 0 ? Math.round(body.scrollHeight / body.offsetHeight * 100) : 0;
  } else {
    // dataCard template: no .card-body, check card-content vs available height
    const cc = els.cardContent;
    const available = cc.offsetHeight; // already constrained by flex
    hasOverflow = cc.scrollHeight > available + 4;
    pct = Math.round(cc.scrollHeight / (available || 1) * 100);
  }

  // Update editor overflow bar
  const bar = document.getElementById('overflowBar');
  if (bar) {
    const fill = bar.querySelector('.overflow-fill-inner');
    const label = bar.querySelector('.overflow-label');
    bar.className = 'overflow-bar' + (hasOverflow ? '' : ' ok');
    if (fill) {
      fill.style.width = Math.min(pct, 100) + '%';
      fill.style.background = hasOverflow ? '#c04030' : (pct > 85 ? '#c08030' : '#5a8c5a');
    }
    if (label) label.textContent = hasOverflow ? `内容超出 ${pct}%，建议分页` : `容量 ${pct}%`;
  }

  // Show/hide overlay on card
  let ov = els.cardOutput.querySelector('.card-overflow-overlay');
  if (hasOverflow) {
    if (!ov) {
      ov = document.createElement('div');
      ov.className = 'card-overflow-overlay';
      ov.innerHTML = '<div class="card-overflow-badge" onclick="App.splitOverflowPage()" title="点击自动新建下一页">↓ 内容超出，点击新建下一页</div>';
      els.cardOutput.appendChild(ov);
    }
  } else if (ov) { ov.remove(); }
}

// Derive the single "texture" value from underlying rhythm/weight fields.
function blkTexture(blk) {
  const r = blk.rhythm || blk.spacing || '';
  const w = blk.fontWeight || '';
  if ((r === 'loose' || r === 'breath') && (w === 'light' || w === '')) return 'air';
  if ((r === 'tight') && (w === 'bold' || w === 'heavy' || w === 'medium')) return 'solid';
  if (r === '' && w === '') return '';
  // Partial/legacy state — classify by dominant axis
  if (w === 'light' || r === 'loose' || r === 'breath') return 'air';
  if (w === 'bold' || w === 'heavy' || r === 'tight') return 'solid';
  return '';
}
// Apply a texture preset to a block（只写 canonical rhythm+fontWeight，清掉遗留字段）
function applyBlkTexture(blk, tx) {
  delete blk.spacing; delete blk.lineHeight;
  if (tx === 'air')   { blk.rhythm = 'loose'; blk.fontWeight = 'light'; }
  else if (tx === 'solid') { blk.rhythm = 'tight'; blk.fontWeight = 'bold'; }
  else { blk.rhythm = ''; blk.fontWeight = ''; }
}

// 嵌套面板子块的紧凑字段（与顶级 _edBlockFields 共享 inputId 规范：b{parentBi}_c{ci}_{field}）
function _panelChildFields(ch, bi, ci) {
  const id = (f) => `b${bi}_c${ci}_${f}`;
  const t = ch.type;
  if (t === 'text')      return `<textarea class="form-textarea" id="${id('c')}" rows="2" placeholder="段落内容（支持 **粗体** ==高亮==，回车换行）">${escAttr(ch.content||'')}</textarea>`;
  if (t === 'keystat')   return `<div class="data-row"><input class="form-input" id="${id('v')}" value="${escAttr(ch.value||'')}" placeholder="数值"><input class="form-input" id="${id('l')}" value="${escAttr(ch.label||'')}" placeholder="说明"></div>`;
  if (t === 'herostat')  return `<div class="data-row"><input class="form-input" id="${id('v')}" value="${escAttr(ch.value||'')}" placeholder="巨型数字"><input class="form-input" id="${id('l')}" value="${escAttr(ch.label||'')}" placeholder="标签"></div><input class="form-input" id="${id('cap')}" value="${escAttr(ch.caption||'')}" placeholder="说明（可选）" style="margin-top:6px">`;
  if (t === 'metric')    return `<div class="data-row"><input class="form-input" id="${id('v')}" value="${escAttr(ch.value||'')}" placeholder="数值"><input class="form-input" id="${id('l')}" value="${escAttr(ch.label||'')}" placeholder="标签"></div><div class="data-row" style="margin-top:6px"><input class="form-input" id="${id('d')}" value="${escAttr(ch.delta||'')}" placeholder="差值 +/-"><input class="form-input" id="${id('dl')}" value="${escAttr(ch.deltaLabel||'')}" placeholder="差值说明"></div>`;
  if (t === 'compare')   return `<input class="form-input" id="${id('lbl')}" value="${escAttr(ch.label||'')}" placeholder="项目名称"><div class="data-row" style="margin-top:6px"><input class="form-input" id="${id('v')}" value="${escAttr(ch.value||'')}" placeholder="主数值"><input class="form-input" id="${id('cv')}" value="${escAttr(ch.chipValue||'')}" placeholder="对比药丸 +x.x%"></div>`;
  if (t === 'callout')   return `<div class="data-row"><input class="form-input" id="${id('t')}" value="${escAttr(ch.title||'')}" placeholder="标题"></div><textarea class="form-textarea" id="${id('c')}" rows="2" placeholder="内容（回车换行）" style="margin-top:6px">${escAttr(ch.content||'')}</textarea>`;
  if (t === 'bullets')   {
    let h = '';

    h += `<button class="add-row-btn" style="padding:3px 8px;font-size:11px;margin-top:4px" onclick="App.addPanelChildItem(${bi},${ci})">+ 要点</button>`;
    return h;
  }
  if (t === 'progress')  return `<div class="data-row"><input class="form-input" id="${id('l')}" value="${escAttr(ch.label||'')}" placeholder="标签"><input class="form-input" id="${id('v')}" type="number" min="0" max="100" value="${Number(ch.value)||0}" placeholder="0-100"></div>`;
  if (t === 'sparkcard') return `<div class="data-row"><input class="form-input" id="${id('t')}" value="${escAttr(ch.title||'')}" placeholder="标题"><input class="form-input" id="${id('v')}" value="${escAttr(ch.value||'')}" placeholder="数值"></div><input class="form-input" id="${id('vals')}" value="${escAttr(ch.values||'')}" placeholder="数据序列 用逗号分隔" style="margin-top:6px">`;
  if (t === 'ranking')   {
    let h = `<input class="form-input" id="${id('t')}" value="${escAttr(ch.title||'')}" placeholder="排名标题">`;
    (ch.items||[]).forEach((it,ii) => {
      h += `<div class="data-row" style="margin-top:4px"><input class="form-input" id="${id('rn'+ii)}" value="${escAttr(it.name||'')}" placeholder="名称"><input class="form-input" id="${id('rv'+ii)}" value="${escAttr(it.value||'')}" placeholder="数值" style="flex:0.5"></div>`;
    });
    return h;
  }
  return `<div class="form-hint" style="font-size:11px;color:#888">该子块类型暂不支持嵌套编辑，请删除后在外层添加</div>`;

// Public entry: decide immediate vs debounced
// - immediate=true (default): full sync render (used by structural changes: add/del block, page switch, template change)
// - immediate=false: schedules a debounced refresh (used by content input events to prevent cursor jump)
function renderEditorFields(immediate = true) {
  if (immediate) {
    // Structural change — full immediate rebuild
    const focusInfo = _saveFocus();
    renderEditorFields_raw();
    _restoreFocus(focusInfo);
  } else {
    // Content input — debounce to avoid cursor jump on every keystroke
    _scheduleEditorRefresh();
  }
}

// ====== Undo / History stack ======
// 设计：栈顶 = 当前状态。每次「成功的」mutation 之后调用 pushHistory()。
// undo() 弹出栈顶 → 应用新栈顶 → 即恢复到 mutation 之前的状态。
const _history = { stack: [], max: 40, _typingTimer: null };
function _snapshot() {
  const { _uiFolded, _ui, ...rest } = state;
  try { return JSON.stringify(rest); } catch(e) { console.error('snapshot fail', e); return null; }
}
function pushHistory(label) {
  const snap = _snapshot();
  if (!snap) return;
  // 与栈顶完全相同则不入栈（典型场景：连续点击不变状态的按钮）
  const top = _history.stack[_history.stack.length - 1];
  if (top && top.snap === snap) return;
  _history.stack.push({ snap, label: label || '', at: Date.now() });
  if (_history.stack.length > _history.max) _history.stack.shift();
  _refreshUndoBtn();
  _saveLocal();
}
// 文字输入用的防抖快照：停止输入 700ms 后记录
function pushHistoryDebounced(label) {
  clearTimeout(_history._typingTimer);
  _history._typingTimer = setTimeout(() => pushHistory(label || '编辑'), 700);
}

// ====== Persistence & Archive ======
const PERSIST_KEY = 'rnxhs:autosave';

// 同步左侧静态全局元数据 input（这些控件不由 renderEditorFields 重建，需手动回填）
function _syncGlobalMetaInputs() {
  ['authorName','authorTitle','footerCta','seriesName','seriesIndex','seriesTotal','seriesUnit','dataDate'].forEach(k => {
    const el = document.getElementById(k);
    if (el && typeof state[k] === 'string') el.value = state[k];
  });
}

// 旧档/存档迁移：补缺页字段 + 每块过 migrateBlock（让 migrateBlock 真正生效）
function migrateState(data) {
  if (!data || !Array.isArray(data.pages) || !data.pages.length) return null;
  data.pages = data.pages.map(p => {
    const merged = Object.assign(createPage((p && p.template) || 'text'), p || {});
    merged.blocks = Array.isArray(merged.blocks) ? merged.blocks.map(migrateBlock) : [];
    // 1.5：统一图片适配字段——旧 fullImgFit(imageOnly 专用) 并入 imageFit，保留旧值
    merged.imageFit = (p && (p.imageFit || p.fullImgFit)) || 'contain';
    delete merged.fullImgFit;
    // 旧版 dataCard：扁平 tableHeaders/tableRows(字符串数组) → 统一的 tableData(table 块对象)
    if (p && Array.isArray(p.tableRows) && !p.tableData) {
      const td = makeBlock('table');
      td.headers = Array.isArray(p.tableHeaders) ? p.tableHeaders.slice() : td.headers;
      td.rows = p.tableRows.map(r => (Array.isArray(r) ? r : []).map(c =>
        (c && typeof c === 'object') ? c : { text: String(c == null ? '' : c) }));
      td.title = p.tableTitle || '';
      td.note = p.tableNote || '';
      td.style = p.tableStyle || '';
      td.tableLayout = p.tableLayout || 'full';
      td.numberColor = p.numberColor !== false;
      td.colAligns = Array.isArray(p.colAligns) ? p.colAligns.slice() : [];
      td.colWidths = Array.isArray(p.colWidths) ? p.colWidths.slice() : [];
      td.highlightRows = Array.isArray(p.highlightRows) ? p.highlightRows.slice() : [];
      merged.tableData = td;
    }
    if (!merged.tableData || typeof merged.tableData !== 'object') merged.tableData = makeBlock('table');
    merged.tableData = migrateBlock(merged.tableData);
    // 清掉旧扁平字段，避免与 tableData 并存造成困惑
    ['tableHeaders','tableRows','tableNote','tableTitle','tableStyle','tableLayout','numberColor','highlightRows','colAligns','colWidths']
      .forEach(k => { delete merged[k]; });
    return merged;
  });
  if (typeof data.currentPageIndex !== 'number' || data.currentPageIndex < 0) data.currentPageIndex = 0;
  if (data.currentPageIndex >= data.pages.length) data.currentPageIndex = data.pages.length - 1;
  return data;
}

// 用迁移后的对象整体覆盖 state（恢复/导入共用）
function _applyState(data) {
  const m = migrateState(data);
  if (!m) return false;
  // 先以纯净默认为基底，再覆盖存档中实际存在的键 → 缺失字段回到默认而非残留
  const base = JSON.parse(_PRISTINE_STATE);
  Object.keys(base).forEach(k => { state[k] = (k in m) ? m[k] : base[k]; });
  Object.keys(m).forEach(k => { if (!(k in base)) state[k] = m[k]; });
  state._uiFolded = new Set();
  return true;
}

function undo() {
  // 先 commit 待防抖快照（确保用户最后输入也被记录）
  if (_history._typingTimer) {
    clearTimeout(_history._typingTimer);
    _history._typingTimer = null;
    pushHistory('编辑');
  }
  if (_history.stack.length < 2) {
    showToast('没有可撤销的操作', 'warn');
    return;
  }
  _history.stack.pop();  // 弹出当前状态
  const prev = _history.stack[_history.stack.length - 1];
  if (!prev || !prev.snap) {
    showToast('撤销失败：无效快照', 'error');
    console.error('undo: invalid prev frame', prev);
    return;
  }
  try {
    const data = JSON.parse(prev.snap);
    // 完整还原：先清掉可能在新版本中被加入但快照里没有的可序列化字段，再覆盖
    Object.keys(data).forEach(k => { state[k] = data[k]; });
    if (state.currentPageIndex >= state.pages.length) state.currentPageIndex = state.pages.length - 1;
    if (state.currentPageIndex < 0) state.currentPageIndex = 0;
    // 同步全局元数据 input 控件
    _syncGlobalMetaInputs();
    // 用 render() 触发完整级联渲染，避免漏掉某个子区域
    if (typeof render === 'function') render();
    else { renderEditorFields(); renderCard(); }
    _refreshUndoBtn();
    showToast(`↶ 已撤销${prev.label?'：'+prev.label:''}`, 'success', 1800);
  } catch(e) {
    showToast('撤销失败：' + (e.message||'解析错误'), 'error', 4000);
    console.error('undo fail', e);
  }
}
function _refreshUndoBtn() {
  const btn = document.getElementById('undoBtn');
  if (!btn) return;
  const can = _history.stack.length >= 2;
  btn.disabled = !can;
  btn.title = `撤销（Ctrl+Z）· 历史 ${_history.stack.length}/${_history.max}`;
  const cnt = document.getElementById('undoCount');
  if (cnt) {
    const n = Math.max(0, _history.stack.length - 1);  // 实际可撤销次数
    cnt.textContent = n > 0 ? String(n) : '';
    cnt.classList.toggle('has', n > 0);
  }
}

// ── Find & Replace（递归扫描所有 block 文本字段） ──
function _walkBlockText(blk, fn) {
  if (!blk) return;
  // 叶子文本字段
  ['content','title','subtitle','label','value','caption','desc','num','source','text','chipLabel','chipValue','greeting'].forEach(k => {
    if (typeof blk[k] === 'string') blk[k] = fn(blk[k]);
  });
  // 数组：bullets/numbered.items[] 字符串
  if (Array.isArray(blk.items)) {
    blk.items = blk.items.map(it => {
      if (typeof it === 'string') return fn(it);
      if (it && typeof it === 'object') {
        ['text','name','value','label','desc','id'].forEach(k => { if (typeof it[k]==='string') it[k] = fn(it[k]); });
      }
      return it;
    });
  }
  if (Array.isArray(blk.points)) blk.points = blk.points.map(p => typeof p==='string' ? fn(p) : p);
  if (Array.isArray(blk.images)) blk.images.forEach(im => { if (im && typeof im.label==='string') im.label = fn(im.label); });
  // panel 子块递归
  if (Array.isArray(blk.children)) blk.children.forEach(ch => _walkBlockText(ch, fn));
  // table 块：表头 + 单元格文本（dataCard 的 tableData 同走此路径）
  if (Array.isArray(blk.headers)) blk.headers = blk.headers.map(h => typeof h==='string' ? fn(h) : h);
  if (Array.isArray(blk.rows)) blk.rows.forEach(r => { if (Array.isArray(r)) r.forEach(c => { if (c && typeof c.text==='string') c.text = fn(c.text); }); });
}
function findReplaceAll(needle, repl) {
  if (!needle) return 0;
  let count = 0;
  const fn = s => {
    if (!s || s.indexOf(needle) === -1) return s;
    return s.split(needle).reduce((acc, part, i, arr) => {
      acc += part;
      if (i < arr.length - 1) { acc += repl; count++; }
      return acc;
    }, '');
  };
  // 全局元数据
  ['authorName','authorTitle','footerCta','seriesName'].forEach(k => { if (state[k]) state[k] = fn(state[k]); });
  // 所有页所有块
  state.pages.forEach(p => {
    ['category','title','subtitle','heroValue','heroLabel'].forEach(k => { if (typeof p[k]==='string') p[k] = fn(p[k]); });
    if (p.tableData) _walkBlockText(p.tableData, fn);
    (p.blocks||[]).forEach(blk => _walkBlockText(blk, fn));
  });
  return count;
}

// 全局编辑快捷键
document.addEventListener('keydown', e => {
  const tag = (e.target.tagName || '').toLowerCase();
  const inField = tag === 'input' || tag === 'textarea';
  // Ctrl+Z 撤销：
  // - 在 input/textarea 内：先尝试浏览器原生 undo（不拦截）
  //   但若用户连按 Ctrl+Shift+Z 或 Cmd+Shift+Z 视为「项目级撤销」
  // - 在 input/textarea 外：直接走我们的 state undo
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
    if (inField) return;  // 让浏览器原生 undo 修改 input value
    e.preventDefault(); undo(); return;
  }
  // Ctrl/Cmd+Shift+Z 强制项目级撤销（即使在 input 内也走 state undo）
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    if (e.target && e.target.blur) e.target.blur();
    undo(); return;
  }
  // Ctrl/Cmd+F 查找替换
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f') {
    e.preventDefault(); openFindReplace(); return;
  }
  // Esc 关闭查找替换
  if (e.key === 'Escape') {
    const fr = document.getElementById('findReplaceBar');
    if (fr && fr.classList.contains('show')) { closeFindReplace(); return; }
  }
  // 仅在非输入元素时处理块级快捷键
  if (inField) return;
  const focused = document.activeElement && document.activeElement.closest('.block-item');
  const bi = focused ? parseInt(focused.dataset.block) : -1;
  if (bi < 0) return;
  // Alt+↑ / Alt+↓ 移动块
  if (e.altKey && e.key === 'ArrowUp')   { e.preventDefault(); App.moveBlock(bi, -1); return; }
  if (e.altKey && e.key === 'ArrowDown') { e.preventDefault(); App.moveBlock(bi,  1); return; }
  // Ctrl/Cmd+D 复制块
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'd') {
    e.preventDefault(); App.dupBlock(bi); return;
  }
  // Delete / Backspace 删除块（需在 block-item 上 focus，且非按钮按下）
  if ((e.key === 'Delete') && !e.ctrlKey && !e.metaKey && !e.altKey) {
    if (focused === document.activeElement) {
      e.preventDefault(); App.delBlock(bi); return;
    }
  }
});

    const btn = e.target.closest('.col-align-btn'); if (!btn) return;
