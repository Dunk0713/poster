  backdrop-filter: blur(40px);
}
.card.theme-glass .cb-highlight,
.card.theme-glass .cb-infocard,
.card.theme-glass .cb-grid-item,
.card.theme-glass .cb-quote {
  background: rgba(255,255,255,0.5); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.card.theme-rainbow {
  --bg1:#fef9ff; --bg2:#f0f4ff; --bg-angle:135deg;
  --title:#2d1b69; --body:#3a2570; --sub:#8a78b0;
  --accent:#e040a0; --accent-l:rgba(224,64,160,0.08); --accent-m:rgba(224,64,160,0.16); --accent-s:rgba(224,64,160,0.28);
  --line:rgba(0,0,0,0.10); --mod:rgba(255,255,255,0.85); --shad:rgba(82,40,20,0.08);
  --pill-bg:rgba(224,64,160,0.10); --pill-text:#c03080;
}
/* 收掉 6 色阶"模板感"长虹，改为与高级主题一致的柔和双径向洗色（保留彩色个性） */
.card.theme-rainbow .card-bg {
  background:
    radial-gradient(ellipse at 16% 12%, rgba(224,64,160,0.10) 0%, transparent 56%),
    radial-gradient(ellipse at 86% 88%, rgba(99,102,241,0.10) 0%, transparent 56%),
    linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%) !important;
}
.card.theme-midnight {
  --bg1:#0f0f1a; --bg2:#1a1a30; --bg-angle:170deg;
  --title:#ffffff; --body:#dcdcee; --sub:#a6a6c8;
  --accent:#00d4ff; --accent-l:rgba(0,212,255,0.08); --accent-m:rgba(0,212,255,0.16); --accent-s:rgba(0,212,255,0.28);
  --line:rgba(255,255,255,0.10); --mod:rgba(255,255,255,0.05); --shad:rgba(0,0,0,0.4);
  --pill-bg:rgba(0,212,255,0.12); --pill-text:#00d4ff;
}
.card.theme-midnight .card-bg {
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,100,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(100,0,255,0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(0,200,255,0.08) 0%, transparent 50%),
    linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%) !important;
}
.card.theme-navy {
  --bg1:#0b1d3a; --bg2:#13294d; --bg-angle:175deg;
  --title:#f5ecd6; --body:#d8dce8; --sub:#a8b8d4;
  --accent:#e8b84a; --accent-l:rgba(232,184,74,0.14); --accent-m:rgba(232,184,74,0.22); --accent-s:rgba(232,184,74,0.38);
  --line:rgba(245,236,214,0.12); --mod:rgba(245,236,214,0.04); --shad:rgba(0,0,0,0.35);
  --pill-bg:rgba(232,184,74,0.14); --pill-text:#e8b84a;
}
.card.theme-navy .card-bg {
  background:
    radial-gradient(ellipse at 15% 15%, rgba(232,184,74,0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(60,120,220,0.10) 0%, transparent 55%),
    linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%) !important;
}
.card.theme-navy .card-accent-bottom { opacity: 0.85; }
.card.theme-navy .cb-highlight .mod-text strong,
.card.theme-navy .cb-text strong { color: #f5ecd6; }
.card.theme-navy .palette-swatch.active::after { color: #0b1d3a; }
/* 深色主题：涨跌色提亮以保证对比与协调（统一走 --pos/--neg 令牌） */
.card.theme-dark, .card.theme-midnight, .card.theme-navy { --pos:#ff7b7b; --neg:#6ee0a4; }
.card.theme-navy.template-dashboard .cb-metric,
.card.theme-navy.template-dashboard .cb-ranking,
.card.theme-navy.template-dashboard .cb-sparkcard,
.card.theme-navy.template-dashboard .cb-herostat,
.card.theme-navy.template-dashboard .cb-keystat,
.card.theme-navy.template-dashboard .cb-stat {
  background: rgba(245,236,214,0.04); border-color: rgba(245,236,214,0.10);
}

.card.theme-warm {
  --bg1:#fdf6ee; --bg2:#f8ece0; --bg-angle:175deg;
  --title:#2a1810; --body:#4a2a18; --sub:#a08060;
  --accent:#d45220; --accent-l:rgba(212,82,32,0.08); --accent-m:rgba(212,82,32,0.16); --accent-s:rgba(212,82,32,0.28);
  --line:rgba(0,0,0,0.10); --mod:#fff; --shad:rgba(82,40,20,0.08);
  --pill-bg:rgba(212,82,32,0.10); --pill-text:#9a3a10;
}
/* Dark theme text adjustments */
.card.theme-dark .card-accent-bottom,
.card.theme-midnight .card-accent-bottom { opacity: 0.7; }
.card.theme-dark .cb-highlight .mod-text strong,
.card.theme-dark .cb-text strong,
.card.theme-midnight .cb-highlight .mod-text strong,
.card.theme-midnight .cb-text strong { color: #e8e8ff; }
.card.theme-dark .palette-swatch.active::after,
.card.theme-midnight .palette-swatch.active::after { color: #fff; }

.card-bg {
  position: absolute; inset: 0; z-index: 0;
  /* Default (dots) – direct background layers, no ::after, works reliably with html-to-image */
  background:
    radial-gradient(circle, var(--line) 2.5px, transparent 2.6px) 0 0 / 48px 48px,
    linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%);
}
.card-bg.bg-microdot {
  background:
    radial-gradient(circle, var(--line) 1.5px, transparent 1.6px) 0 0 / 24px 24px,
    linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%) !important;
}
.card-bg::after { display: none; }
.card-content {
  position: relative; z-index: 1; padding: var(--space-9) var(--space-9) var(--space-9);
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}
.card-page-indicator {
  position: absolute; top: 42px; right: 56px; font-size: var(--fs-cap); font-weight: 550;
  color: var(--sub); opacity: 0.35; letter-spacing: 0.15em; z-index: 2;
}

/* ── Card Typography ── */
.card-category {
  font-size: var(--fs-cap); font-weight: 650; letter-spacing: var(--tr-cap); text-transform: uppercase;
  color: var(--accent); margin-bottom: var(--space-4); display: flex; align-items: center; gap: 12px;
}
.card-category::after { content: ''; flex: 1; height: 1px; background: var(--accent); opacity: 0.22; }

.card-title { font-family: var(--font-display); font-size: var(--fs-h2); font-weight: 700; color: var(--title); line-height: var(--lh-tight); letter-spacing: var(--tr-title); margin-bottom: var(--space-5); }
.card-title.sz-s { font-size: var(--fs-h3); }
.card-title.sz-l { font-size: var(--fs-h1); }

.card-accent-bar { width: 54px; height: 3px; background: var(--accent); border-radius: 2px; margin-bottom: var(--space-5); }

.card-subtitle { font-size: var(--fs-xs); font-weight: 450; color: var(--sub); line-height: var(--lh-snug); margin-bottom: var(--space-7); letter-spacing: 0; }
.card-subtitle.sz-s { font-size: 24px; }
.card-subtitle.sz-l { font-size: 34px; }

.card-body { flex: 1; min-height: 0; overflow: hidden; }

/* ── Block style variants ── */
.block-glass {
  background: linear-gradient(145deg, rgba(255,255,255,0.55), rgba(255,255,255,0.35)) !important;
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.5) !important;
  border-radius: var(--radius-lg) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.6) !important;
}
.card.theme-dark .block-glass,
.card.theme-midnight .block-glass {
  background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06)) !important;
  border: 1px solid rgba(255,255,255,0.12) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1) !important;
}
.block-gradient-border {
  border: 2px solid transparent !important;
  background-clip: padding-box !important;
  position: relative;
}
.block-gradient-border::before {
  content: ''; position: absolute; inset: -2px; border-radius: inherit; padding: 2px;
  background: conic-gradient(from 180deg, var(--accent), var(--accent-m), var(--accent), var(--accent-s), var(--accent));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; z-index: -1;
}
.block-soft {
  border-radius: var(--radius-lg) !important;
  box-shadow: 0 4px 24px rgba(0,0,0,0.05) !important;
}
.block-neon {
  box-shadow: 0 0 0 1px var(--accent-m), 0 0 24px -4px var(--accent), 0 8px 32px -12px var(--accent-m) !important;
  border: 1px solid transparent !important;
}

/* ── Block: Text ── */
.cb-text { font-size: var(--fs-body); line-height: var(--lh-loose); color: var(--body); letter-spacing: 0; margin-bottom: var(--space-6); }
/* sz-* 相对 --fs-body（mood 会覆盖 --fs-body）→ 不同气质下大小档一致跟随 */
.cb-text.sz-s { font-size: calc(var(--fs-body) * 0.84); }
.cb-text.sz-l { font-size: calc(var(--fs-body) * 1.28); }
.cb-text p { margin-bottom: var(--space-5); }
.cb-text p:first-child { margin-top: 0; }
.cb-text p:last-child { margin-bottom: 0; }
.cb-text strong { font-weight: 700; color: var(--title); }
.cb-text .acc { color: var(--accent); font-weight: 650; }

/* ── Block: Bullets ── */
.cb-bullets { list-style: none; padding: 0; margin-bottom: var(--space-6); font-size: var(--fs-body); line-height: var(--lh-loose); color: var(--body); }
.cb-bullets.sz-s { font-size: calc(var(--fs-body) * 0.84); }
.cb-bullets.sz-l { font-size: calc(var(--fs-body) * 1.28); }
.cb-bullets li { display: flex; align-items: flex-start; gap: 20px; margin-bottom: var(--space-3); }
.cb-bullets li::before {
  content: ''; flex-shrink: 0;
  width: 12px; height: 12px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-l);
  /* 与首行文字垂直居中：随 line-height 自动调整，不再受字体气质影响 */
  margin-top: calc(var(--lh-body) * 0.5em - 6px); margin-left: 4px;
}
.cb-bullets li strong { font-weight: 700; color: var(--title); }
.cb-bullets li .acc { color: var(--accent); font-weight: 650; }

/* ── Block: Numbered list ── */
.cb-numbered { list-style: none; padding: 0; margin-bottom: var(--space-6); }
.cb-numbered li {
  display: flex; gap: 20px; align-items: flex-start; margin-bottom: var(--space-3);
  font-size: var(--fs-body); color: var(--body); line-height: var(--lh-loose);
}
.cb-numbered.sz-s li { font-size: calc(var(--fs-body) * 0.84); }
.cb-numbered.sz-l li { font-size: calc(var(--fs-body) * 1.28); }
.cb-numbered li .n {
  min-width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; flex-shrink: 0;
  /* 圆心对齐首行文字中线：基于实际 line-height 计算（自适应字体气质） */
  margin-top: calc(var(--lh-body) * 0.5em - 26px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.10);
}
.cb-numbered li strong { font-weight: 700; color: var(--title); }
.cb-numbered li .acc { color: var(--accent); font-weight: 650; }

/* ── Block: Highlight ── */
.cb-highlight {
  background: var(--mod); border-radius: var(--radius-md);
  border-left: 6px solid var(--accent);
  padding: var(--space-6) var(--space-7); margin-bottom: var(--space-6); box-shadow: 0 2px 10px var(--shad);
}
.cb-highlight .mod-label { font-size: var(--fs-micro); font-weight: 650; letter-spacing: var(--tr-cap); color: var(--accent); margin-bottom: var(--space-3); }
.cb-highlight .mod-label.sz-s { font-size: 18px; letter-spacing: var(--tr-cap); margin-bottom: var(--space-2); }
.cb-highlight .mod-label.sz-l { font-size: var(--fs-xs); letter-spacing: var(--tr-cap); margin-bottom: var(--space-3); }
.cb-highlight .mod-label.sz-xl { font-size: var(--fs-lg); letter-spacing: -0.005em; text-transform: none; margin-bottom: var(--space-4); font-weight: 700; color: var(--title); }
.cb-highlight.label-underline .mod-label { border-bottom: 2px solid var(--accent); padding-bottom: var(--space-1); display: inline-block; margin-bottom: var(--space-4); }
.cb-highlight.label-pill .mod-label { background: var(--accent-l); padding: var(--space-1) var(--space-4); border-radius: 100px; display: inline-block; border: 1px solid var(--accent-m); margin-bottom: var(--space-4); }
.cb-highlight.label-bar .mod-label { border-left: 4px solid var(--accent); padding-left: 12px; display: inline-block; text-transform: none; letter-spacing: 0.02em; }
.cb-highlight.label-hidden .mod-label { display: none; }
.cb-highlight .mod-text { font-size: 34px; line-height: var(--lh-body); color: var(--body); }
.cb-highlight .mod-text.sz-s { font-size: 28px; }
.cb-highlight .mod-text.sz-l { font-size: 40px; }
.cb-highlight .mod-text strong { font-weight: 700; color: var(--title); }
.cb-highlight .mod-text .acc { color: var(--accent); font-weight: 650; }
/* When a custom color is applied to the block, let bold/accent text inherit it instead of being overridden */
.cb-highlight[data-has-color] .mod-text strong,
.cb-highlight[data-has-color] .mod-text .acc,
.cb-highlight[data-has-color] .mod-label { color: inherit; }
.cb-text[data-has-color] strong, .cb-text[data-has-color] .acc,
.cb-bullets[data-has-color] li strong, .cb-bullets[data-has-color] li .acc,
.cb-numbered[data-has-color] li strong, .cb-numbered[data-has-color] li .acc,
.cb-quote[data-has-color] .q-text strong, .cb-quote[data-has-color] .q-text .acc { color: inherit; }

/* ── Block: Quote ── */
.cb-quote {
  background: var(--accent-l); border-radius: var(--radius-md); padding: var(--space-6) var(--space-7);
  margin-bottom: var(--space-6); position: relative;
}
.cb-quote::before {
  content: '\201C'; position: absolute; top: -10px; left: 22px;
  font-size: 140px; color: var(--accent); opacity: 0.32;
  font-family: 'Playfair Display', Georgia, serif; line-height: 1; font-weight: 700;
}
.cb-quote .q-text {
  font-size: var(--fs-body); line-height: var(--lh-body); color: var(--body); font-style: italic;
  padding-left: 10px;
}
.cb-quote .q-text.sz-s { font-size: 30px; }
.cb-quote .q-text.sz-l { font-size: var(--fs-lg); }
.cb-quote .q-text strong { font-weight: 700; color: var(--title); font-style: normal; }
.cb-quote .q-text .acc { color: var(--accent); font-weight: 650; font-style: normal; }
.cb-quote .q-source {
  font-size: var(--fs-xs); color: var(--sub); margin-top: var(--space-3);
  padding-left: 10px; font-style: normal; letter-spacing: 0.05em;
}

/* ── Block: Info card ── */
.cb-infocard {
  background: var(--mod); border-radius: var(--radius-md); border: 1px solid var(--line);
  padding: var(--space-6) var(--space-7); margin-bottom: var(--space-6); box-shadow: 0 2px 10px var(--shad);
}
.cb-infocard .ic-num {
  font-size: var(--fs-cap); font-weight: 650; color: var(--accent); letter-spacing: 0.08em;
  margin-bottom: var(--space-2); display: flex; align-items: center; gap: 10px;
}
.cb-infocard .ic-num::before {
  content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 0 3px var(--accent-l);
}
.cb-infocard .ic-title { font-size: var(--fs-body); font-weight: 700; color: var(--title); margin-bottom: var(--space-2); letter-spacing: var(--tr-title); }
.cb-infocard .ic-title.sz-s { font-size: 30px; }
.cb-infocard .ic-title.sz-l { font-size: var(--fs-lg); }
.cb-infocard .ic-desc { font-size: 30px; line-height: var(--lh-body); color: var(--body); }
.cb-infocard .ic-desc.sz-s { font-size: 26px; }
.cb-infocard .ic-desc.sz-l { font-size: 34px; }
.cb-infocard .ic-desc strong { font-weight: 700; color: var(--title); }
.cb-infocard .ic-desc .acc { color: var(--accent); font-weight: 650; }

/* ── Block: Tags ── */
.cb-tags { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: var(--space-6); }
.cb-tag {
  padding: 11px 26px; background: var(--pill-bg); color: var(--pill-text);
  border-radius: 100px; font-size: 26px; font-weight: 550;
  border: 1px solid var(--accent-m); letter-spacing: 0.02em;
}

/* ── Block: Grid ── */
.cb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: var(--space-6); }
.cb-grid-item {
  background: var(--mod); border-radius: 14px; padding: 26px 24px;
  border: 1px solid var(--line); box-shadow: 0 2px 8px var(--shad);
}
.cb-grid-item .gi-label { font-size: var(--fs-cap); font-weight: 650; letter-spacing: var(--tr-label); color: var(--accent); margin-bottom: var(--space-2); }
.cb-grid-item .gi-text { font-size: 28px; line-height: var(--lh-body); color: var(--body); }
.cb-grid-item .gi-text.sz-s { font-size: 24px; }
.cb-grid-item .gi-text.sz-l { font-size: 32px; }
.cb-grid-item .gi-text strong { color: var(--title); font-weight: 700; }
.cb-grid-item .gi-text .acc { color: var(--accent); font-weight: 650; }

/* ── Global tabular-nums for numeric displays ── */
.cb-keystat .ks-value, .cb-herostat .hs-value, .cb-metric .m-value,
.cb-kpigrid .kg-value, .cb-sparkcard .sc-value, .cb-progress .pg-pct,
.cb-stat-compare .cmp-value, .cb-stat-compare .cmp-chip,
.card-table td, .cb-ranking .r-rank { font-variant-numeric: tabular-nums; }

/* ── Block: Key stat ── */
.cb-keystat {
  background: var(--accent-l); border-radius: var(--radius-lg); padding: var(--space-7) var(--space-7);
  margin-bottom: var(--space-6); text-align: center; border: 1px solid var(--accent-m);
}
.cb-keystat .ks-value { font-size: var(--fs-hero); font-weight: 750; color: var(--accent); letter-spacing: -0.03em; line-height: 1; }
/* label：中文友好——加大字号、去掉 uppercase（中文不区分大小写却被强制 letter-spacing 反而变扁）、保留 letter-spacing 用于英文混排 */
.cb-keystat .ks-label { font-size: var(--fs-xs); color: var(--sub); margin-top: var(--space-4); letter-spacing: 0.04em; font-weight: 550; line-height: var(--lh-snug); }

/* ── Block: Editorial hero-stat ── */
.cb-herostat {
  margin: var(--space-7) 0;
  padding: var(--space-6) 0;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: var(--space-3);
}
.cb-herostat .hs-value {
  font-family: var(--font-display);
  font-size: 180px; font-weight: 700;
  letter-spacing: -0.04em; line-height: 0.9;
  color: var(--accent);
}
.cb-herostat.sz-s .hs-value { font-size: 140px; }
.cb-herostat.sz-l .hs-value { font-size: 220px; }
.cb-herostat .hs-sep {
  display: block; width: 56px; height: 2px;
  background: var(--body); opacity: 0.32;
}
.cb-herostat .hs-label {
  font-size: var(--fs-xs); letter-spacing: var(--tr-label);
  color: var(--sub); font-weight: 550;
  max-width: 80%;
}
.cb-herostat .hs-caption {
  font-size: var(--fs-micro); color: var(--sub);
  line-height: var(--lh-body); margin-top: var(--space-2);
  max-width: 78%; opacity: 0.75;
}

/* ── Block: Pull quote (magazine-style) ── */
.cb-pullquote {
  margin: var(--space-7) 0;
  padding: var(--space-6) var(--space-5);
  text-align: center;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  position: relative;
}
.cb-pullquote::before {
  content: '\201C';
  position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-display);
  font-size: 80px; line-height: 1; font-weight: 700;
  color: var(--accent); background: var(--bg1);
  padding: 0 16px;
}
.cb-pullquote .pq-text {
  font-family: var(--font-display);
  font-size: var(--fs-h3); font-weight: 500;
  font-style: italic; color: var(--title);
  line-height: var(--lh-snug);
  letter-spacing: -0.015em;
  max-width: 90%; margin: 0 auto;
}
.cb-pullquote.sz-s .pq-text { font-size: var(--fs-lg); }
.cb-pullquote.sz-l .pq-text { font-size: var(--fs-h2); }
.cb-pullquote .pq-source {
  font-size: var(--fs-micro); color: var(--sub);
  margin-top: var(--space-4); letter-spacing: var(--tr-label);
  font-weight: 550;
  font-style: normal;
}
.cb-pullquote .pq-source::before { content: '— '; opacity: 0.5; }

/* ── Gradient color safety net: prevent invisible nested text ──
   When parent has gradient text-clip, force children to render in their own color
   instead of inheriting text-fill-color: transparent (which clips to their own empty background). */
[style*="-webkit-text-fill-color"] * { -webkit-text-fill-color: currentColor; }

/* ── Delta (up/down/flat indicator) — A股配色：涨红跌绿 ── */
.cb-delta { font-size: var(--fs-micro); font-weight: 650; letter-spacing: 0.02em; display: inline-block; }
.cb-delta.dir-up   { color: var(--pos); }
.cb-delta.dir-up::before   { content: '▲ '; font-size: 0.85em; }
.cb-delta.dir-down { color: var(--neg); }
.cb-delta.dir-down::before { content: '▼ '; font-size: 0.85em; }
.cb-delta.dir-flat { color: var(--sub); }
.cb-delta.dir-flat::before { content: '— '; opacity: 0.6; }
.cb-delta-label { font-size: var(--fs-micro); color: var(--sub); margin-left: 6px; letter-spacing: 0.04em; }

/* ── Block: Metric (KPI card w/ delta) ── */
.cb-metric { margin: var(--space-5) 0; display: flex; flex-direction: column; gap: 6px; }
.cb-metric .m-label { font-size: var(--fs-xs); letter-spacing: var(--tr-label); color: var(--sub); font-weight: 550; }
.cb-metric .m-value { font-family: var(--font-display); font-size: 72px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; color: var(--title); }
.cb-metric .m-delta-row { display: flex; align-items: center; gap: 2px; margin-top: 4px; }
.cb-metric.sz-s .m-value { font-size: 54px; }
.cb-metric.sz-l .m-value { font-size: 96px; }

/* ── Block: Ranking (horizontal bar list) ── */
.cb-ranking { margin: var(--space-5) 0; display: flex; flex-direction: column; gap: 12px; }
.cb-ranking .r-title { font-size: var(--fs-xs); letter-spacing: var(--tr-label); color: var(--sub); font-weight: 550; margin-bottom: var(--space-1); }
.cb-ranking .r-row { display: grid; grid-template-columns: 120px 1fr 70px; align-items: center; gap: 14px; }
.cb-ranking .r-name { font-size: var(--fs-body); color: var(--body); font-weight: 550; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cb-ranking .r-track { height: 10px; background: var(--line); border-radius: 5px; overflow: hidden; opacity: 0.5; }
.cb-ranking .r-fill { height: 100%; background: var(--accent); border-radius: 5px; transition: width 0.3s; }
.cb-ranking .r-value { font-family: var(--font-display); font-size: var(--fs-body); font-weight: 650; color: var(--title); text-align: right; font-variant-numeric: tabular-nums; }

/* ── Block: Progress ring ── */
.cb-progress { margin: var(--space-5) 0; display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--accent); }
.cb-progress .p-wrap { position: relative; display: inline-block; line-height: 0; }
.cb-progress .p-wrap svg { display: block; }
.cb-progress .p-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: var(--title); letter-spacing: -0.02em; line-height: 1; }
.cb-progress.sz-s .p-center { font-size: 22px; }
.cb-progress.sz-m .p-center { font-size: 32px; }
.cb-progress.sz-l .p-center { font-size: 46px; }
.cb-progress .p-label { font-size: var(--fs-xs); letter-spacing: var(--tr-label); color: var(--sub); font-weight: 550; }
.cb-progress .p-caption { font-size: var(--fs-micro); color: var(--sub); opacity: 0.75; }

/* ── Block: KPI Grid (2×2) ── */
.cb-kpigrid { margin: var(--space-5) 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.cb-kpigrid .k-cell { background: var(--bg2); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; display: flex; flex-direction: column; gap: 4px; }
.cb-kpigrid .k-label { font-size: var(--fs-xs); letter-spacing: var(--tr-label); color: var(--sub); font-weight: 550; }
.cb-kpigrid .k-value { font-family: var(--font-display); font-size: 38px; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; color: var(--title); }
.cb-kpigrid .k-delta-row { margin-top: 2px; }

/* ── Block: Sparkcard (trend card) ── */
.cb-sparkcard { margin: var(--space-5) 0; background: var(--bg2); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; color: var(--accent); }
.cb-sparkcard .sc-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.cb-sparkcard .sc-left { display: flex; flex-direction: column; gap: 2px; }
.cb-sparkcard .sc-title { font-size: var(--fs-xs); letter-spacing: var(--tr-label); color: var(--sub); font-weight: 550; }
.cb-sparkcard .sc-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; color: var(--title); }
.cb-sparkcard .sc-chart { width: 100%; height: 56px; line-height: 0; }
.cb-sparkcard .sc-chart svg { display: block; }

/* ── Template: Dashboard ── */
.card.template-dashboard { --space-9: 48px; --space-10: 64px; }
.card.template-dashboard .card-bg { background: var(--bg2); }
.card.template-dashboard .card-content { background: transparent; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 44px 56px 48px; align-content: start; }
.card.template-dashboard .dash-hero { grid-column: 1 / -1; padding: 24px 0 20px; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; border-bottom: 1px solid var(--line); margin-bottom: 8px; }
.card.template-dashboard .dash-hero .dh-left { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.card.template-dashboard .dash-hero .dh-greet { font-family: var(--font-display); font-size: 40px; font-weight: 650; letter-spacing: -0.02em; color: var(--title); line-height: 1.1; }
.card.template-dashboard .dash-hero .dh-meta { font-size: var(--fs-xs); color: var(--sub); letter-spacing: 0.08em; text-transform: uppercase; text-align: right; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.card.template-dashboard .dash-hero .dh-range { display: inline-block; padding: 4px 10px; border-radius: 6px; background: var(--accent-l); color: var(--accent); font-weight: 600; font-size: var(--fs-micro); letter-spacing: 0.05em; text-transform: none; }
/* blocks auto card-ified */
.card.template-dashboard .cb-metric,
.card.template-dashboard .cb-ranking,
.card.template-dashboard .cb-sparkcard,
.card.template-dashboard .cb-progress,
.card.template-dashboard .cb-keystat,
.card.template-dashboard .cb-herostat {
  background: #fff; border: 1px solid var(--line); border-radius: 16px;
  padding: 22px 26px; margin: 0;
}
.card.theme-dark.template-dashboard .cb-metric,
.card.theme-dark.template-dashboard .cb-ranking,
.card.theme-dark.template-dashboard .cb-sparkcard,
.card.theme-dark.template-dashboard .cb-progress,
.card.theme-dark.template-dashboard .cb-keystat,
.card.theme-dark.template-dashboard .cb-herostat,
.card.theme-midnight.template-dashboard .cb-metric,
.card.theme-midnight.template-dashboard .cb-ranking,
.card.theme-midnight.template-dashboard .cb-sparkcard,
.card.theme-midnight.template-dashboard .cb-progress,
.card.theme-midnight.template-dashboard .cb-keystat,
.card.theme-midnight.template-dashboard .cb-herostat { background: var(--bg1); }
/* full-width blocks in dashboard */
.card.template-dashboard .cb-ranking,
.card.template-dashboard .cb-sparkcard,
.card.template-dashboard .cb-pullquote,
.card.template-dashboard .cb-herostat,
.card.template-dashboard .cb-text,
.card.template-dashboard .cb-bullets,
.card.template-dashboard .cb-numbered,
.card.template-dashboard .cb-checklist,
.card.template-dashboard .cb-quote,
.card.template-dashboard .cb-highlight,
.card.template-dashboard .cb-infocard,
.card.template-dashboard .cb-tags,
.card.template-dashboard .cb-grid,
.card.template-dashboard .cb-divider,
.card.template-dashboard .cb-image,
.card.template-dashboard .cb-sectionHeader,
.card.template-dashboard .cb-gallery,
.card.template-dashboard .cb-textWrap,
.card.template-dashboard .cb-kpigrid { grid-column: 1 / -1; }
.card.template-dashboard .cb-kpigrid { background: transparent; border: none; padding: 0; }
.card.template-dashboard .cb-progress { align-items: center; }
.card.template-dashboard .blocks-wrap { display: contents; }

/* ── Block: Callout (6 semantic variants à la Obsidian / Notion) ── */
.cb-callout {
  position: relative; display: flex; gap: 18px; align-items: flex-start;
  margin: var(--space-5) 0; padding: 20px 24px 20px 22px;
  border-radius: 14px; border: 1px solid var(--c-border, rgba(0,0,0,0.06));
  background: var(--c-bg, rgba(0,0,0,0.03));
  border-left: 5px solid var(--c-accent, var(--accent));
}
.cb-callout .co-icon {
  flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; background: var(--c-accent, var(--accent)); color: #fff;
  font-weight: 700;
}
.cb-callout .co-body { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.cb-callout .co-title { font-size: 26px; font-weight: 700; color: var(--title); letter-spacing: -0.01em; line-height: 1.3; }
.cb-callout .co-text { font-size: var(--fs-body); line-height: var(--lh-body); color: var(--body); }
.cb-callout .co-text p { margin-bottom: 6px; }
.cb-callout .co-text p:last-child { margin-bottom: 0; }
.cb-callout.v-note    { --c-accent:#3a7ae8; --c-bg:rgba(58,122,232,0.08); --c-border:rgba(58,122,232,0.22); }
.cb-callout.v-tip     { --c-accent:#3aaa6a; --c-bg:rgba(58,170,106,0.08); --c-border:rgba(58,170,106,0.22); }
.cb-callout.v-warning { --c-accent:#e88a30; --c-bg:rgba(232,138,48,0.10); --c-border:rgba(232,138,48,0.26); }
.cb-callout.v-danger  { --c-accent:#e04040; --c-bg:rgba(224,64,64,0.09); --c-border:rgba(224,64,64,0.24); }
.cb-callout.v-quote   { --c-accent:#7a7a82; --c-bg:rgba(0,0,0,0.04); --c-border:rgba(0,0,0,0.10); }
.cb-callout.v-abstract{ --c-accent:#8a5ae8; --c-bg:rgba(138,90,232,0.08); --c-border:rgba(138,90,232,0.22); }
/* Dark-theme callout contrast */
.card.theme-dark .cb-callout, .card.theme-midnight .cb-callout, .card.theme-navy .cb-callout {
  background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.10);
}
.card.theme-dark .cb-callout.v-quote, .card.theme-midnight .cb-callout.v-quote, .card.theme-navy .cb-callout.v-quote {
  --c-accent:#b0b4c0;
}

/* ── Block: TL;DR / overview card ── */
.cb-tldr {
  margin: var(--space-5) 0; padding: 22px 28px 22px 28px; border-radius: 16px;
  background: linear-gradient(135deg, var(--accent-l), transparent 80%);
  border: 1px solid var(--accent-m);
  position: relative;
}
.cb-tldr .td-badge {
  position: absolute; top: -14px; left: 22px;
  background: var(--accent); color: #fff;
  font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
  padding: 4px 14px; border-radius: 6px; line-height: 1.4;
}
.card.theme-navy .cb-tldr .td-badge { color: #2a1d04; }
.cb-tldr .td-title { font-family: var(--font-display); font-size: 30px; font-weight: 700; color: var(--title); margin: 4px 0 14px; letter-spacing: -0.01em; }
.cb-tldr .td-list { list-style: none; padding: 0; margin: 0; }
.cb-tldr .td-list li {
  position: relative; padding-left: 24px; margin-bottom: 10px;
  font-size: var(--fs-body); line-height: var(--lh-body); color: var(--body);
}
.cb-tldr .td-list li:last-child { margin-bottom: 0; }
.cb-tldr .td-list li::before {
  content: '▸'; position: absolute; left: 2px; top: 0;
  color: var(--accent); font-weight: 700;
}

/* ── Block: Source footnote ── */
.cb-source {
  margin: var(--space-7) 0 var(--space-4); padding: 14px 18px;
  border-top: 1px dashed var(--line); background: transparent;
  font-size: var(--fs-micro); color: var(--sub); line-height: 1.65;
}
.cb-source .sr-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--sub); opacity: 0.7;
  display: block; margin-bottom: 8px;
}
.cb-source ol { list-style: none; padding: 0; margin: 0; }
.cb-source ol li { margin-bottom: 4px; }
.cb-source ol li .sr-id {
  display: inline-block; min-width: 22px; font-weight: 700; color: var(--accent);
}

/* Inline citation marker (parseBody [^N] → sup) */
.cite {
  display: inline-block; vertical-align: super; line-height: 1;
  font-size: 0.65em; font-weight: 700; color: var(--accent);
  padding: 0 0.15em; margin: 0 0.1em;
}

/* ── Block: Disclaimer (基金合规风险提示) ── */
.cb-disclaimer {
  margin-top: var(--space-6); padding: var(--space-4) var(--space-5);
  border-left: 2px solid var(--line); background: transparent;
  font-size: 18px; color: var(--sub); line-height: 1.7;
  letter-spacing: 0.01em;
}
.cb-disclaimer .dc-tag {
  display: inline-block; font-size: 13px; font-weight: 700;
  letter-spacing: var(--tr-cap); color: var(--accent);
  background: var(--accent-l); padding: 2px 10px; border-radius: 4px;
  margin-right: 10px; vertical-align: middle;
}
.cb-disclaimer.sz-s { font-size: 16px; padding: var(--space-3) var(--space-4); }
.cb-disclaimer.sz-l { font-size: 20px; padding: var(--space-5) var(--space-6); }

/* ── 块级字号通用兜底：未单独定义 sz-* 规则的块依然能响应字号切换 ── */
.cb-keystat.sz-xs .ks-value { font-size: 78px; }
.cb-keystat.sz-s  .ks-value { font-size: 92px; }
.cb-keystat.sz-l  .ks-value { font-size: 130px; }
.cb-keystat.sz-xl .ks-value { font-size: 160px; }
.cb-keystat.sz-xs .ks-label, .cb-keystat.sz-s .ks-label { font-size: 22px; }
.cb-keystat.sz-l  .ks-label, .cb-keystat.sz-xl .ks-label { font-size: 34px; }

.cb-callout.sz-s  { font-size: 0.88em; }
.cb-callout.sz-l  { font-size: 1.12em; }

.cb-tldr.sz-s     { font-size: 0.9em; }
.cb-tldr.sz-l     { font-size: 1.12em; }
.cb-tldr.sz-s .td-title { font-size: 26px; }
.cb-tldr.sz-l .td-title { font-size: 36px; }

.cb-stat-compare.sz-s .cmp-value { font-size: 26px; }
.cb-stat-compare.sz-l .cmp-value { font-size: 38px; }
.cb-stat-compare.sz-s { padding: 12px 16px; }
.cb-stat-compare.sz-l { padding: 20px 24px; }

.cb-kpigrid.sz-s .k-value { font-size: 32px; }
.cb-kpigrid.sz-l .k-value { font-size: 46px; }

.cb-ranking.sz-s .r-value, .cb-ranking.sz-s .r-name { font-size: 26px; }
.cb-ranking.sz-l .r-value, .cb-ranking.sz-l .r-name { font-size: 36px; }

.cb-sparkcard.sz-s .sc-value { font-size: 22px; }
.cb-sparkcard.sz-l .sc-value { font-size: 36px; }

.cb-section-header.sz-s .sh-label { font-size: var(--fs-cap); padding: 6px 16px; }
.cb-section-header.sz-l .sh-label { font-size: var(--fs-body); padding: 10px 28px; }

.cb-panel.sz-s .pn-title { font-size: 22px; }
.cb-panel.sz-l .pn-title { font-size: 34px; }

.cb-table.sz-s td, .cb-table.sz-s th { font-size: 26px; padding: 10px 14px; }
.cb-table.sz-l td, .cb-table.sz-l th { font-size: 36px; padding: 18px 22px; }

/* ── Block: QRCode (扫码关注) ── */
.cb-qrcode {
  display: inline-flex; flex-direction: column; align-items: center; gap: var(--space-3);
  padding: var(--space-4); background: #fff;
  border-radius: var(--radius-md); border: 1px solid var(--line);
  margin: var(--space-5) 0;
}
.cb-qrcode.qr-pos-right { float: right; margin-left: var(--space-5); }
.cb-qrcode.qr-pos-center { display: flex; align-self: center; margin-left: auto; margin-right: auto; }
.cb-qrcode.qr-pos-inline { display: inline-flex; }
.cb-qrcode .qr-canvas { display: block; }
.cb-qrcode .qr-canvas svg { display: block; width: 100%; height: 100%; }
.cb-qrcode.sz-s .qr-canvas { width: 120px; height: 120px; }
.cb-qrcode.sz-m .qr-canvas { width: 160px; height: 160px; }
.cb-qrcode.sz-l .qr-canvas { width: 200px; height: 200px; }
.cb-qrcode .qr-label {
  font-size: 18px; font-weight: 600; color: var(--title);
  letter-spacing: 0.02em; text-align: center; line-height: 1.3;
}
.cb-qrcode .qr-fallback {
  font-size: 13px; color: var(--sub); text-align: center; padding: 10px;
  word-break: break-all; max-width: 200px;
}
/* kind 控制装饰边框 */
.cb-qrcode.qr-kind-wechat { border-color: rgba(7,193,96,0.3); }
.cb-qrcode.qr-kind-wechat .qr-label::before { content: '微信 · '; color: #07c160; font-weight: 700; }
.cb-qrcode.qr-kind-company { border-color: rgba(24,144,255,0.3); }
.cb-qrcode.qr-kind-company .qr-label::before { content: '企微 · '; color: #1890ff; font-weight: 700; }
.cb-qrcode.qr-kind-personal { border-color: var(--accent-m); }

/* ── Block: Panel (nested container, poster-style outer frame) ── */
.cb-panel {
  margin: var(--space-6) 0; padding: 20px 22px 18px;
  border-radius: 18px; border: 1px solid var(--line);
  background: var(--mod); position: relative;
}
.card.theme-navy .cb-panel { background: rgba(245,236,214,0.04); }
.cb-panel::before {
  content: ''; position: absolute; left: 22px; top: -6px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 0 4px var(--bg1);
}
.cb-panel .pn-head { margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px dashed var(--line); }
.cb-panel .pn-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--title); letter-spacing: -0.01em; line-height: 1.25; }
.cb-panel .pn-sub { font-size: var(--fs-xs); color: var(--sub); letter-spacing: var(--tr-label); margin-top: var(--space-1); }
.cb-panel .pn-body > * { margin-top: 12px; }
.cb-panel .pn-body > *:first-child { margin-top: 0; }
.cb-panel .pn-body .cb-stat, .cb-panel .pn-body .cb-keystat, .cb-panel .pn-body .cb-metric,
.cb-panel .pn-body .cb-ranking { margin: 0; }

/* ── Block: Divider ── */
.cb-divider { display: flex; align-items: center; gap: 16px; margin-bottom: var(--space-6); }
.cb-divider .dl { flex: 1; height: 1px; background: var(--line); }
.cb-divider .dc { color: var(--accent); opacity: 0.4; font-size: 18px; letter-spacing: 0.3em; }

/* ── 块间距统一节奏：受密度 / 排版预设控制 ── */
.card-body > .cb-text,
.card-body > .cb-bullets,
.card-body > .cb-numbered,
.card-body > .cb-highlight,
.card-body > .cb-callout,
.card-body > .cb-keystat,
.card-body > .cb-herostat,
.card-body > .cb-metric,
.card-body > .cb-grid,
.card-body > .cb-pullquote,
.card-body > .cb-tldr,
.card-body > .cb-source,
.card-body > .cb-stat-compare,
.card-body > .cb-tags,
.card-body > .cb-divider,
.card-body > .cb-image,
.card-body > .cb-quote,
.card-body > .cb-checklist,
.card-body > .cb-disclaimer { margin-bottom: var(--space-block); }

/* ── Block: Image ── */
.cb-image { margin-bottom: var(--space-6); border-radius: 18px; overflow: hidden; box-shadow: 0 3px 14px var(--shad); }
.cb-image.fit-cover { height: 420px; }
.cb-image.fit-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cb-image.fit-contain { background: var(--accent-l); text-align: center; padding: 10px 10px 0; }
.cb-image.fit-contain img { width: auto; max-width: 100%; height: auto; max-height: 520px; display: inline-block; border-radius: 10px; }
.cb-image .img-caption { padding: 14px 22px; font-size: 24px; color: var(--sub); background: var(--mod); border-top: 1px solid var(--line); }
.cb-image.fit-cover.ih-s { height: 200px; } .cb-image.fit-cover.ih-m { height: 360px; } .cb-image.fit-cover.ih-l { height: 520px; }
.cb-image.fit-contain.ih-s img { max-height: 200px; } .cb-image.fit-contain.ih-m img { max-height: 360px; } .cb-image.fit-contain.ih-l img { max-height: 520px; }

/* ── Image area (imageText top) ── */
.card-image-area { border-radius: 20px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 4px 16px var(--shad); }
.card-image-area.fit-cover { height: 420px; } /* default; overridden by inline style when slider used */
.card-image-area.fit-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-image-area.fit-contain img[style*="max-height"] { width: auto; }
.card-image-area.fit-contain { background: var(--accent-l); display: flex; align-items: center; justify-content: center; padding: 10px; }
.card-image-area.fit-contain img { width: auto; max-width: 100%; height: auto; max-height: 540px; object-fit: contain; display: block; border-radius: 10px; }
.card-image-area.fit-cover.ih-s { height: 200px; } .card-image-area.fit-cover.ih-m { height: 360px; } .card-image-area.fit-cover.ih-l { height: 520px; }
.card-image-area.fit-contain.ih-s img { max-height: 200px; } .card-image-area.fit-contain.ih-m img { max-height: 360px; } .card-image-area.fit-contain.ih-l img { max-height: 520px; }
.card-image-placeholder { height: 300px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--sub); opacity: 0.35; background: var(--accent-l); }

/* ── Portrait image: clean floating frame (white mat border) ── */
.card-image-area.fit-contain.portrait-img {
  background: none; box-shadow: none; padding: 0; overflow: visible;
}
.card-image-area.fit-contain.portrait-img img {
  border-radius: 18px;
  box-shadow: 0 0 0 8px var(--mod), 0 0 0 9px var(--line), 0 8px 32px rgba(0,0,0,0.12);
}
.card-image-area.fit-cover.portrait-img { height: 520px; }
.cb-image.fit-contain.portrait-img {
  background: none; box-shadow: none; padding: 0; text-align: center; overflow: visible;
}
.cb-image.fit-contain.portrait-img img {
  border-radius: 16px;
  box-shadow: 0 0 0 7px var(--mod), 0 0 0 8px var(--line), 0 6px 24px rgba(0,0,0,0.10);
}

/* ── Split layout: image left | text right ── */
.card-content.split-layout {
  flex-direction: row; padding: 0; gap: 0; align-items: stretch;
}
.split-img-col {
  width: 400px; flex-shrink: 0; overflow: hidden; position: relative;
  background: var(--accent-l);
  display: flex; align-items: center; justify-content: center;
}
/* Default: contain – show full image, no cropping */
.split-img-col img {
  width: 100%; height: 100%; object-fit: contain; display: block;
  padding: 12px;
}
/* Cover mode (user toggle) – object-position set inline for focal point */
.split-img-col.split-cover img {
  object-fit: cover; padding: 0;
}
/* Width variants */
.split-img-col.sw-s { width: 320px; }
.split-img-col.sw-l { width: 500px; }
.split-img-col .split-img-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--sub); opacity: 0.35; background: var(--accent-l);
}
.split-text-col {
  flex: 1; padding: 64px 64px 56px 52px; display: flex; flex-direction: column;
  min-height: 0; overflow: hidden; border-left: 1px solid var(--line);
}
.split-text-col .card-body { flex: 1; min-height: 0; overflow: hidden; }
/* Reduce font sizes in split text column for better fit */
.split-text-col .card-title { font-size: 56px; }
.split-text-col .card-title.sz-s { font-size: 46px; }
.split-text-col .card-title.sz-l { font-size: 66px; }
.split-text-col .card-subtitle { font-size: 26px; }
.split-text-col .cb-text { font-size: 30px; }
.split-text-col .cb-bullets { font-size: 30px; }
.split-text-col .cb-bullets li { margin-bottom: 10px; }
.split-text-col .cb-numbered li { font-size: 30px; }
.split-text-col .cb-check li { font-size: 30px; }
.split-text-col .cb-highlight .mod-text { font-size: 28px; }
.split-text-col .card-footer { padding-top: 16px; }

/* ── Block: Checklist ── */
.cb-check { list-style: none; padding: 0; margin-bottom: 24px; }
.cb-check li { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 14px; font-size: 36px; color: var(--body); line-height: 1.8; }
.cb-check.sz-s li { font-size: 30px; } .cb-check.sz-l li { font-size: 42px; }
.cb-check .ck { width: 44px; height: 44px; border-radius: 12px; border: 2.5px solid var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  /* 36×1.8/2 − 22 = 32.4 − 22 = 10px */
  margin-top: 10px;
  font-size: 24px; background: var(--accent-l); color: var(--accent); }
.cb-check.sz-s .ck { margin-top: 5px; }   /* 30×1.8/2−22 = 5px  */
.cb-check.sz-l .ck { margin-top: 16px; }  /* 42×1.8/2−22 = 15.8px */
.cb-check .ck.done { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
.cb-check li strong { font-weight: 700; color: var(--title); } .cb-check li .acc { color: var(--accent); font-weight: 600; }

/* ── Title alignment ── */
.card-title.ta-c { text-align: center; }
.card-subtitle.ta-c { text-align: center; }
.card-category.ta-c { justify-content: center; }
.card-category.ta-c::after { display: none; }
.card-accent-bar.ta-c { margin-left: auto; margin-right: auto; }

/* ── Cover template ── */
.cover-layout { align-items: center; justify-content: center; text-align: center; }
.cover-spacer { flex: 1; }
.cover-deco { font-size: 64px; opacity: 0.15; margin-bottom: var(--space-4); letter-spacing: 0.3em; color: var(--accent); }
.cover-title { font-family: var(--font-display); font-size: 80px; font-weight: 700; color: var(--title); line-height: var(--lh-tight); letter-spacing: var(--tr-title); margin-bottom: var(--space-5); }
.cover-title.sz-s { font-size: 66px; } .cover-title.sz-l { font-size: 96px; }
.cover-sub { font-size: 34px; color: var(--sub); margin-bottom: var(--space-6); letter-spacing: 0.02em; font-weight: 450; line-height: var(--lh-snug); }
.cover-tag { display: inline-block; padding: 12px 36px; border: 2px solid var(--accent); border-radius: 100px; font-size: 26px; font-weight: 650; color: var(--accent); letter-spacing: 0.15em; }
/* 系列徽标（右上角，绝对定位，所有 cover 布局通用） */
.card .series-badge {
  position: absolute; top: 36px; right: 56px;
  font-size: 18px; font-weight: 650; letter-spacing: 0.05em;
  color: var(--accent); padding: 4px 14px;
  background: var(--accent-l); border: 1px solid var(--accent-m);
  border-radius: 100px; z-index: 10;
}
.cover-footer { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.cover-footer .card-avatar { width: 64px; height: 64px; font-size: 24px; }
.cover-footer .card-author-name { font-size: 28px; }
.cover-footer .card-author-title { font-size: 22px; }

/* ── Cover Variant: v-numeric (数字巨构) ── */
.cover-layout.v-numeric {
  display: grid; grid-template-columns: 4fr 6fr; align-items: end;
  padding: var(--space-9) var(--space-9) var(--space-10);
  text-align: initial;
}
.cover-layout.v-numeric::before {
  content: attr(data-index);
  font-size: 480px; font-weight: 750; line-height: 0.85;
  letter-spacing: -0.06em;
  color: var(--accent); opacity: 0.14;
  grid-column: 1; grid-row: 1 / -1;
  display: flex; align-items: flex-end; pointer-events: none;
  font-family: inherit;
}
.cover-layout.v-numeric > * { grid-column: 2; }
.cover-layout.v-numeric .cover-spacer { display: none; }
.cover-layout.v-numeric .card-title,
.cover-layout.v-numeric .card-subtitle,
.cover-layout.v-numeric .card-category,
.cover-layout.v-numeric .cover-title,
.cover-layout.v-numeric .cover-sub,
.cover-layout.v-numeric .cover-deco { text-align: left; justify-content: flex-start; }
.cover-layout.v-numeric .card-title { font-size: var(--fs-h1); max-width: 95%; }
.cover-layout.v-numeric .card-subtitle { max-width: 90%; }
.cover-layout.v-numeric .card-accent-bar { margin-left: 0; margin-right: 0; }
.cover-layout.v-numeric .cover-footer { align-items: flex-start; }
.cover-has-img .cover-layout.v-numeric::before { color: #fff; opacity: 0.18; }

/* ── Cover Variant: v-diagonal (斜线切割) ── */
.cover-layout.v-diagonal {
  position: relative;
  padding: var(--space-9) var(--space-9) var(--space-10);
  text-align: initial;
  align-items: stretch; justify-content: flex-end;
}
.cover-layout.v-diagonal::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent) 60%, transparent 60.1%);
  z-index: 0; pointer-events: none;
}
.cover-layout.v-diagonal > * { position: relative; z-index: 1; }
.cover-layout.v-diagonal .cover-spacer { display: none; }
.cover-layout.v-diagonal .card-category,
.cover-layout.v-diagonal .cover-deco { color: #fff; opacity: 0.85; text-align: left; justify-content: flex-start; }
.cover-layout.v-diagonal .card-category::after { background: rgba(255,255,255,0.35); }
.cover-layout.v-diagonal .card-title,
.cover-layout.v-diagonal .cover-title { color: #fff; text-align: left; max-width: 75%; }
.cover-layout.v-diagonal .card-subtitle,
.cover-layout.v-diagonal .cover-sub { color: rgba(255,255,255,0.85); text-align: left; max-width: 70%; }
.cover-layout.v-diagonal .card-accent-bar { background: #fff; margin-left: 0; margin-right: 0; }
.cover-layout.v-diagonal .cover-footer { align-items: flex-start; }
.cover-layout.v-diagonal .cover-tag { color: #fff; border-color: rgba(255,255,255,0.6); }
.cover-has-img .cover-layout.v-diagonal::before { opacity: 0.82; }

/* ── Cover Variant: v-offset (极简偏心) ── */
/* Flex column + order 重排：category 置顶，标题组在下半部，footer 沉底 */
/* 修复原 grid-row:2 多元素重叠问题 */
.cover-layout.v-offset {
  display: flex;
  flex-direction: column;
  padding: var(--space-9) var(--space-9) var(--space-10);
  text-align: initial;
  align-items: flex-start;
}
.cover-layout.v-offset > * { max-width: 78%; text-align: left; }
/* 重新激活 spacer 作为弹性占位 */
.cover-layout.v-offset .cover-spacer        { display: block; flex-shrink: 0; flex-grow: 0; }
.cover-layout.v-offset .cover-spacer:first-child { order: 2; flex-grow: 1; }   /* 撑开 category↔title 之间 */
.cover-layout.v-offset .cover-spacer:last-of-type{ order: 7; flex-grow: 0.35; } /* tag↔footer 之间小间距 */
/* 装饰符 & 小标签 → 置顶 */
.cover-layout.v-offset .cover-deco  { order: 0; margin-bottom: var(--space-3); }
.cover-layout.v-offset .card-category { order: 1; justify-content: flex-start; margin-bottom: 0; }
.cover-layout.v-offset .card-category::after { display: none; }
/* 标题组：title → bar → sub，顺序堆叠 */
.cover-layout.v-offset .card-title,
.cover-layout.v-offset .cover-title {
  order: 3; font-weight: 550; letter-spacing: -0.02em;
  margin-top: 0; margin-bottom: var(--space-5);
}
.cover-layout.v-offset .card-accent-bar {
  order: 4; margin-left: 0; margin-right: 0;
  margin-bottom: var(--space-6);
}
.cover-layout.v-offset .card-subtitle,
.cover-layout.v-offset .cover-sub { order: 5; max-width: 72%; margin-bottom: var(--space-3); }
.cover-layout.v-offset .cover-tag  { order: 6; align-self: flex-start; }
/* Footer 沉底 */
.cover-layout.v-offset .cover-footer { order: 8; align-items: flex-start; }
.cover-has-img .cover-layout.v-offset .card-title,
.cover-has-img .cover-layout.v-offset .cover-title { color: #fff; }

/* ── Cover background image ── */
.cover-bg-img {
  position: absolute; inset: 0; z-index: 0; overflow: hidden;
}
.cover-bg-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cover-bg-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    rgba(0,0,0,0) 0%, rgba(0,0,0,0.12) 55%,
    rgba(0,0,0,0.40) 85%, rgba(0,0,0,0.62) 100%);
}
.cover-has-img .cover-title { color: #fff; text-shadow: 0 2px 24px rgba(0,0,0,0.35); }
.cover-has-img .cover-sub { color: rgba(255,255,255,0.88); text-shadow: 0 1px 8px rgba(0,0,0,0.2); }
.cover-has-img .cover-tag { color: #fff; border-color: rgba(255,255,255,0.6); }
.cover-has-img .card-category { color: rgba(255,255,255,0.92); }
.cover-has-img .card-category::after { background: rgba(255,255,255,0.3); }
.cover-has-img .cover-deco { color: rgba(255,255,255,0.3); }
.cover-has-img .card-accent-bar { background: rgba(255,255,255,0.55); }
.cover-has-img .card-author-name { color: #fff; }
.cover-has-img .card-author-title { color: rgba(255,255,255,0.75); }
.cover-has-img .card-avatar { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); color: #fff; }

/* ── ImageOnly template ── */
.fullimg-layout { padding: 0 !important; }
.fullimg-wrap { flex: 1; min-height: 0; overflow: hidden; position: relative; }
.fullimg-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.fullimg-wrap .fullimg-contain { object-fit: contain; background: var(--bg2); }
.fullimg-caption { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.55)); color: #fff; padding: 48px 56px 36px; font-size: 30px; line-height: 1.6; z-index: 2; }
.fullimg-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--sub); opacity: 0.35; background: var(--accent-l); }

/* ── Background styles (all use direct element backgrounds, no ::after) ── */
.card-bg.bg-dots {
  background:
    radial-gradient(circle, var(--line) 2.5px, transparent 2.6px) 0 0 / 48px 48px,
    linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%);
}
.card-bg.bg-none {
  background: linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%);
}
.card-bg.bg-lines {
  background:
    repeating-linear-gradient(0deg, transparent 0px, transparent 47px, var(--line) 47px, var(--line) 48px),
    linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%);
}
.card-bg.bg-cross {
  background:
    linear-gradient(0deg, var(--line) 1px, transparent 1px) 0 0 / 48px 48px,
    linear-gradient(90deg, var(--line) 1px, transparent 1px) 0 0 / 48px 48px,
    linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%);
}
.card-bg.bg-diag {
  background:
    repeating-linear-gradient(-45deg, transparent, transparent 32px, var(--line) 32px, var(--line) 33px),
    linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 100%);
}

/* ── Bottom accent stripe (XHS-style decorative flourish) ── */
.card-accent-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 3; height: 6px;
  background: linear-gradient(90deg, transparent 5%, var(--accent) 30%, var(--accent) 70%, transparent 95%);
  opacity: 0.5;
}


/* ── Data table ── */
.card-table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  border-radius: 16px; overflow: hidden; border: 1px solid var(--line);
  background: var(--mod); box-shadow: 0 2px 10px var(--shad); margin-bottom: 24px;
}
.card-table th { background: var(--accent-m); font-size: 28px; font-weight: 700; color: var(--title); padding: 20px 26px; text-align: left; border-bottom: 1px solid var(--line); }
.card-table td { font-size: 30px; color: var(--body); padding: 18px 26px; border-bottom: 1px solid var(--line); }
.card-table tr:last-child td { border-bottom: none; }
.card-table tr:nth-child(even) td { background: var(--accent-l); }

/* ── Keystat (data card hero) ── */
.card-hero-keystat { background: var(--accent-l); border-radius: 20px; padding: 38px 40px; margin-bottom: 24px; text-align: center; border: 1px solid var(--accent-m); }
.card-hero-value { font-size: var(--fs-hero); font-weight: 750; color: var(--accent); letter-spacing: -0.03em; line-height: 1; }
.card-hero-label { font-size: var(--fs-xs); color: var(--sub); margin-top: var(--space-3); letter-spacing: var(--tr-label); font-weight: 550; line-height: var(--lh-snug); }

/* ── Footer ── */
.card-footer { display: flex; align-items: center; gap: var(--space-4); padding-top: var(--space-5); border-top: 1px solid var(--line); margin-top: auto; flex-shrink: 0; }
.card-footer .ft-author { display: flex; align-items: center; gap: var(--space-4); flex: 0 0 auto; }
.card-footer .ft-cta { margin-left: auto; font-size: var(--fs-cap); color: var(--sub); letter-spacing: 0.02em; text-align: right; line-height: var(--lh-snug); }
.card-footer .ft-cta strong { color: var(--accent); font-weight: 650; }
/* footer 风格 variant */
.card-footer.ft-style-minimal { border-top: none; padding-top: var(--space-3); }
.card-footer.ft-style-minimal .card-avatar { width: 38px; height: 38px; font-size: 16px; border-width: 1px; }
.card-footer.ft-style-minimal .card-author-name { font-size: 22px; }
.card-footer.ft-style-bold { border-top-width: 2px; border-top-color: var(--accent); padding-top: var(--space-6); }
.card-footer.ft-hide { display: none; }
.card-avatar {
  width: 50px; height: 50px; border-radius: 50%; background: var(--accent-l);
  border: 2px solid var(--accent-m); display: flex; align-items: center;
  justify-content: center; font-size: 20px; color: var(--accent); overflow: hidden; flex-shrink: 0;
}
.card-avatar img { width: 100%; height: 100%; object-fit: cover; }
.card-author-name { font-size: 26px; font-weight: 700; color: var(--title); }
.card-author-title { font-size: 22px; color: var(--sub); margin-top: 2px; }

/* ── Overflow warning on card ── */
.card-overflow-overlay {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  height: 100px; background: linear-gradient(transparent, rgba(200,50,20,0.25));
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 18px;
}
.card-overflow-badge {
  background: rgba(200,50,20,0.88); color: #fff; font-size: 22px; font-weight: 500;
  padding: 8px 28px; border-radius: 24px; letter-spacing: 1px; cursor: pointer;
}
.card-overflow-badge:hover { background: rgba(200,50,20,1); }

/* ═══════════════════════════════════════════
   ENHANCED: Spacing / Typography / New Blocks
   ═══════════════════════════════════════════ */

/* ── Per-block spacing system (breathing room) ── */
.sp-none { margin-bottom: 0 !important; }
.sp-tight { margin-bottom: var(--space-3) !important; }
.sp-loose { margin-bottom: var(--space-7) !important; }
.sp-extra { margin-bottom: var(--space-8) !important; }

/* ── Unified rhythm (合并 spacing + lineHeight) ── */
.rh-tight { margin-bottom: var(--space-3) !important; }
.rh-tight, .rh-tight li, .rh-tight .mod-text, .rh-tight .q-text,
.rh-tight .ic-desc, .rh-tight .gi-text { line-height: 1.45 !important; }
.rh-loose { margin-bottom: var(--space-7) !important; }
.rh-loose, .rh-loose li, .rh-loose .mod-text, .rh-loose .q-text,
.rh-loose .ic-desc, .rh-loose .gi-text { line-height: 2.05 !important; }
.rh-breath { margin-bottom: var(--space-8) !important; padding-top: 6px; padding-bottom: 6px; }
.rh-breath, .rh-breath li, .rh-breath .mod-text, .rh-breath .q-text,
.rh-breath .ic-desc, .rh-breath .gi-text { line-height: 2.35 !important; }
.cb-highlight.rh-breath { padding: var(--space-7) var(--space-7); }
.cb-highlight.rh-tight { padding: var(--space-5) var(--space-6); }
.cb-quote.rh-breath { padding: var(--space-7) var(--space-7); }
.cb-quote.rh-tight { padding: var(--space-5) var(--space-6); }

/* ── 单块对齐 + 最大宽度（3.2：加法，默认不设=原行为） ── */
.bk-al-left { text-align: left; }
.bk-al-center { text-align: center; }
.bk-al-right { text-align: right; }
.bk-mw-sm { max-width: 48%; }
.bk-mw-md { max-width: 64%; }
.bk-mw-lg { max-width: 82%; }
.bk-mw-sm, .bk-mw-md, .bk-mw-lg { margin-left: 0; margin-right: auto; }
.bk-al-center.bk-mw-sm, .bk-al-center.bk-mw-md, .bk-al-center.bk-mw-lg { margin-left: auto; margin-right: auto; }
.bk-al-right.bk-mw-sm, .bk-al-right.bk-mw-md, .bk-al-right.bk-mw-lg { margin-left: auto; margin-right: 0; }

/* ── 3.2-D 块并排行容器 ── */
.cb-row { display: flex; gap: var(--space-6); align-items: stretch; margin-bottom: var(--space-block); }
.cb-row .cb-rowcell { flex: 1 1 0; min-width: 0; }
.cb-row .cb-rowcell > * { margin-bottom: 0 !important; height: 100%; }

/* ── Line-height variants ── */
.lh-tight, .lh-tight li, .lh-tight .mod-text, .lh-tight .q-text,
.lh-tight .ic-desc, .lh-tight .gi-text { line-height: 1.35 !important; }
.lh-compact, .lh-compact li, .lh-compact .mod-text, .lh-compact .q-text,
.lh-compact .ic-desc, .lh-compact .gi-text { line-height: 1.55 !important; }
.lh-relaxed, .lh-relaxed li, .lh-relaxed .mod-text, .lh-relaxed .q-text,
.lh-relaxed .ic-desc, .lh-relaxed .gi-text { line-height: 2.15 !important; }
.lh-loose, .lh-loose li, .lh-loose .mod-text, .lh-loose .q-text,
.lh-loose .ic-desc, .lh-loose .gi-text { line-height: 2.5 !important; }

/* ── Font-weight variants ── */
.fw-light, .fw-light li, .fw-light .mod-text, .fw-light .q-text { font-weight: 300 !important; }
.fw-medium, .fw-medium li, .fw-medium .mod-text, .fw-medium .q-text { font-weight: 500 !important; }
.fw-semibold, .fw-semibold li, .fw-semibold .mod-text, .fw-semibold .q-text { font-weight: 600 !important; }
.fw-bold, .fw-bold li, .fw-bold .mod-text, .fw-bold .q-text { font-weight: 700 !important; }
.fw-heavy, .fw-heavy li, .fw-heavy .mod-text, .fw-heavy .q-text { font-weight: 900 !important; }

/* ── Extra font-size levels (xs, ms, ml, xl) ── */
.cb-text.sz-xs { font-size: 24px; }
.cb-text.sz-ms { font-size: 33px; }
.cb-text.sz-ml { font-size: 39px; }
.cb-text.sz-xl { font-size: 48px; }
.cb-bullets.sz-xs { font-size: 24px; }
.cb-bullets.sz-ms { font-size: 33px; }
.cb-bullets.sz-ml { font-size: 39px; }
.cb-bullets.sz-xl { font-size: 48px; }
.cb-numbered.sz-xs li { font-size: 24px; }
.cb-numbered.sz-ms li { font-size: 33px; }
.cb-numbered.sz-ml li { font-size: 39px; }
.cb-numbered.sz-xl li { font-size: 48px; }
.cb-check.sz-xs li { font-size: 24px; }
.cb-check.sz-ms li { font-size: 33px; }
.cb-check.sz-ml li { font-size: 39px; }
.cb-check.sz-xl li { font-size: 48px; }
.cb-highlight .mod-text.sz-xs { font-size: 22px; }
.cb-highlight .mod-text.sz-ms { font-size: 31px; }
.cb-highlight .mod-text.sz-ml { font-size: 37px; }
.cb-highlight .mod-text.sz-xl { font-size: 44px; }
.cb-quote .q-text.sz-xs { font-size: 24px; }
.cb-quote .q-text.sz-ms { font-size: 33px; }
.cb-quote .q-text.sz-ml { font-size: 39px; }
.cb-quote .q-text.sz-xl { font-size: 48px; }
.cb-infocard .ic-title.sz-xs { font-size: 24px; }
.cb-infocard .ic-title.sz-ms { font-size: 33px; }
.cb-infocard .ic-title.sz-ml { font-size: 39px; }
.cb-infocard .ic-title.sz-xl { font-size: 48px; }
.cb-infocard .ic-desc.sz-xs { font-size: 22px; }
.cb-infocard .ic-desc.sz-ms { font-size: 28px; }
.cb-infocard .ic-desc.sz-ml { font-size: 31px; }
.cb-infocard .ic-desc.sz-xl { font-size: 38px; }
.cb-grid-item .gi-text.sz-xs { font-size: 20px; }
.cb-grid-item .gi-text.sz-ms { font-size: 26px; }
.cb-grid-item .gi-text.sz-ml { font-size: 30px; }
.cb-grid-item .gi-text.sz-xl { font-size: 36px; }

/* ── Section header block (内容分区) ── */
.cb-section-header { display: flex; align-items: center; gap: 20px; margin-bottom: var(--space-6); margin-top: var(--space-3); }
.cb-section-header .sh-line { flex: 1; height: 2px; background: var(--accent); opacity: 0.2; border-radius: 1px; }
.cb-section-header .sh-icon { font-size: var(--fs-xs); color: var(--accent); opacity: 0.5; flex-shrink: 0; }
.cb-section-header .sh-label {
  font-family: var(--font-display);
  font-size: var(--fs-xs); font-weight: 650; letter-spacing: var(--tr-cap);
  color: var(--accent); white-space: nowrap; padding: var(--space-2) var(--space-5);
  background: var(--accent-l); border-radius: 100px; border: 1px solid var(--accent-m);
}
.cb-section-header .sh-num {
  font-size: var(--fs-h3); font-weight: 750; color: var(--accent); opacity: 0.14; line-height: 1;
  letter-spacing: -0.03em; flex-shrink: 0;
}
/* Bar style: flat left-bar marker, no pill */
.cb-section-header.sh-style-bar { gap: 16px; }
.cb-section-header.sh-style-bar .sh-label {
  background: none; color: var(--title); border-radius: 0; border: none;
  border-left: 4px solid var(--accent); padding: 4px 0 4px 16px;
  font-size: var(--fs-xs); letter-spacing: 0.08em;
}
.cb-section-header.sh-style-bar .sh-line { height: 1px; background: var(--line); opacity: 1; }
/* Dot style: small dot + ring marker */
.cb-section-header.sh-style-dot { gap: 14px; }
.cb-section-header.sh-style-dot .sh-label {
  background: none; border: none; padding: 4px 0; letter-spacing: 0.12em;
  font-weight: 550; font-size: var(--fs-xs); color: var(--body);
  display: inline-flex; align-items: center; gap: 14px;
}
.cb-section-header.sh-style-dot .sh-label::before {
  content: ''; display: inline-block; width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 0 4px var(--accent-l);
}
.cb-section-header.sh-style-dot .sh-line { height: 1px; background: var(--line); opacity: 1; }

/* Banner style: poster-like large banner with icon + title + subtitle + accent line */
.cb-section-header.sh-style-banner {
  flex-wrap: wrap; align-items: flex-end; gap: 14px 18px;
  padding: 10px 0 12px; margin-bottom: var(--space-5);
  border-bottom: 1px solid var(--line);
}
.cb-section-header.sh-style-banner .sh-icon {
  font-size: 26px; color: var(--accent); opacity: 1;
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--accent-l); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-weight: 700;
}
.cb-section-header.sh-style-banner .sh-label {
  background: none; border: none; padding: 0;
  font-family: var(--font-display); font-size: 34px; font-weight: 700;
  color: var(--title); letter-spacing: -0.01em; text-transform: none;
}
.cb-section-header.sh-style-banner .sh-num {
  font-size: var(--fs-xs); color: var(--sub); letter-spacing: 0.12em;
  background: none; border: none; padding: 0; font-weight: 550;
}
.cb-section-header.sh-style-banner .sh-line {
  height: 2px; background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0.45; border-radius: 2px; min-width: 60px;
}

/* ── Stat compare variant (三段式：label | value | gold chip) ── */
.cb-stat-compare {
  display: flex; align-items: center; gap: 18px;
  margin: var(--space-4) 0; padding: 16px 20px;
  background: var(--bg2); border: 1px solid var(--line); border-radius: 14px;
}
.cb-stat-compare .sc-label {
  flex: 1; font-size: var(--fs-body); color: var(--body); font-weight: 500;
  letter-spacing: 0.02em; min-width: 0;
}
.cb-stat-compare .sc-value {
  font-family: var(--font-display); font-size: 30px; font-weight: 700;
  color: var(--title); letter-spacing: -0.02em; line-height: 1;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.cb-stat-compare .sc-chip {
  font-family: var(--font-display); font-size: 22px; font-weight: 700;
  background: var(--accent); color: #fff;
  padding: 8px 14px; border-radius: 8px; letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums; flex-shrink: 0;
  box-shadow: 0 2px 8px var(--accent-l);
}
/* A股配色：正值红、负值绿 */
.cb-stat-compare .sc-chip.chip-pos { background: var(--pos); box-shadow: 0 2px 8px rgba(0,0,0,0.12); color: #fff; }
.cb-stat-compare .sc-chip.chip-neg { background: var(--neg); box-shadow: 0 2px 8px rgba(0,0,0,0.12); color: #fff; }
.card.theme-navy .cb-stat-compare .sc-chip { color: #fff; }
.card.theme-navy .cb-stat-compare .sc-chip:not(.chip-pos):not(.chip-neg) { color: #2a1d04; }
.card.theme-navy .cb-stat-compare { background: rgba(245,236,214,0.05); }

/* ── Image gallery block (多图组合) ── */
.cb-gallery { display: grid; gap: 18px; margin-bottom: 24px; border-radius: 16px; overflow: hidden; }
.cb-gallery.gal-2 { grid-template-columns: 1fr 1fr; }
.cb-gallery.gal-3 { grid-template-columns: 1fr 1fr 1fr; }
.cb-gallery.gal-2x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.cb-gallery.gal-1L2R { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.cb-gallery.gal-1L2R .gal-item:first-child { grid-row: 1 / -1; }
.cb-gallery .gal-item {
  border-radius: 12px; overflow: hidden; background: var(--accent-l);
  min-height: 180px; position: relative;
}
.cb-gallery .gal-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cb-gallery .gal-item .gal-label {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 16px 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.5)); color: #fff;
  font-size: 22px; font-weight: 600; text-align: center;
}

/* ── Text-wrap image (图文环绕) ── */
.cb-text-wrap { margin-bottom: 24px; overflow: hidden; font-size: 32px; line-height: 1.85; color: var(--body); }
.cb-text-wrap.sz-xs { font-size: 24px; } .cb-text-wrap.sz-s { font-size: 28px; }
.cb-text-wrap.sz-ms { font-size: 30px; } .cb-text-wrap.sz-ml { font-size: 36px; }
.cb-text-wrap.sz-l { font-size: 38px; } .cb-text-wrap.sz-xl { font-size: 44px; }
.cb-text-wrap .wrap-img {
  width: 280px; border-radius: 14px; overflow: hidden;
  box-shadow: 0 3px 14px var(--shad); margin-bottom: 12px;
}
.cb-text-wrap .wrap-img.wrap-left { float: left; margin-right: 28px; shape-outside: margin-box; }
.cb-text-wrap .wrap-img.wrap-right { float: right; margin-left: 28px; shape-outside: margin-box; }
.cb-text-wrap .wrap-img.wrap-sm { width: 200px; }

/* Text-wrap: vertical alignment hint (push image down to visually center with text block) */
.cb-text-wrap.wrap-valign-center .wrap-img { margin-top: 0.6em; }
/* Text-wrap: border variants */
.cb-text-wrap .wrap-img.wrap-border { border: 3px solid var(--accent-m); }
.cb-text-wrap .wrap-img.wrap-border-thin { border: 1px solid var(--line); }

/* ── Enhanced table styles ── */
.card-table caption {
  caption-side: top; font-size: 28px; font-weight: 700; color: var(--title);
  padding: 20px 26px 14px; text-align: left; letter-spacing: 1px;
}
.card-table.table-bordered th,
.card-table.table-bordered td { border: 1px solid var(--line); }

.card-table.table-compact td { padding: 12px 20px; font-size: 26px; }
.card-table.table-minimal { border: none; box-shadow: none; background: transparent; }
.card-table.table-minimal th { background: transparent; border-bottom: 2px solid var(--accent); }
.card-table.table-minimal td { border-bottom: 1px solid var(--line); }

.card-table .row-highlight td { background: var(--accent-l) !important; font-weight: 600; }
/* 表格数字颜色：A股红涨绿跌 */
.card-table .num-pos { color: var(--pos); font-weight: 600; }
.card-table .num-neg { color: var(--neg); font-weight: 600; }

.card-table .cell-right { text-align: right; font-variant-numeric: tabular-nums; }
.card-table .cell-center { text-align: center; }
.card-table .col-narrow { width: 18%; }
.card-table .col-wide { width: 38%; }
.card-table th.sort-indicator::after { content: ' ▾'; font-size: 16px; opacity: 0.35; }
.card-table .cell-merge { border-bottom-color: transparent !important; vertical-align: top; }
.card-table .cell-bold { font-weight: 700; color: var(--title); }
.card-table.table-auto { width: auto; }
.cb-table-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
.cb-table-wrap .card-table { margin-bottom: 0; }

/* ── Editor: advanced row styling ── */
.block-adv-row { display: none; gap: 5px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
.block-adv-row.open { display: flex; }
.block-adv-toggle {

/* Table editor: row highlight toggle */
.row-hl-btn { padding: 2px 5px; border: 1px solid #e0d8cf; border-radius: 4px; background: #fff; cursor: pointer; font-size: 10px; color: #9a8878; font-family: inherit; }

<body>

<header class="app-header">
  <h1>小红书笔记生成器</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="size-selector" id="sizeSelector">
      <button class="size-btn active" data-w="1080" data-h="1440">3:4</button>
      <button class="size-btn" data-w="1080" data-h="1080">1:1</button>
      <button class="size-btn" data-w="1080" data-h="1350">4:5</button>
      <button class="size-btn" data-w="1080" data-h="1920">9:16</button>
      <button class="size-btn" data-w="1080" data-h="3240" title="单页长图，3 倍高">长图3x</button>
      <button class="size-btn" data-w="1080" data-h="4320" title="单页长图，4 倍高">长图4x</button>
    </div>
    <span class="header-tag" id="sizeLabel">1080 × 1440</span>
  </div>
</header>

<main class="app-main">
  <aside class="editor-panel">
    <div class="editor-scroll" id="editorScroll">
      <div class="section-label">模板类型</div>
      <div class="template-tabs" id="templateTabs" style="flex-wrap:wrap">
        <div class="template-tab active" data-tpl="text" title="编辑部长文：衬线大标 + 章节分区 + pull-quote">纯文字<br>知识分享</div>
        <div class="template-tab" data-tpl="imageText" title="图文对照：锁比例 + 焦点裁切">图文<br>混排</div>
        <div class="template-tab" data-tpl="dataCard" title="业绩成绩单：hero 数值 + 表格高亮">数据<br>卡片</div>
        <div class="template-tab" data-tpl="dashboard" title="数据仪表盘：灰底白卡网格 + 指标/排行/进度">数据<br>看板</div>
        <div class="template-tab" data-tpl="cover" title="封面：大字 + 编号/斜线/对角线四 variant">封面页</div>
        <div class="template-tab" data-tpl="imageOnly" title="纯图：全幅 + 淡 caption">纯图片</div>
      </div>
      <div id="tplHint" class="template-hint"></div>

      <div id="editorFields"></div>

      <div class="section-label">配色方案</div>
      <div class="palette-row" id="paletteRow"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:7px">
        <span class="form-hint" style="margin:0">自定义强调色</span>
        <input type="color" id="customAccentInput" value="#b5572a" title="覆盖当前主题的强调色">
        <button class="seg-btn" id="customAccentClear" type="button" style="padding:2px 9px;font-size:10px">恢复主题色</button>
      </div>

      <div class="section-label">全局字号</div>
      <div class="font-size-row" id="fontSizeRow">
        <button class="font-size-btn" data-size="xs">极小</button>
        <button class="font-size-btn" data-size="small">小</button>
        <button class="font-size-btn" data-size="ms">中小</button>
        <button class="font-size-btn active" data-size="medium">中</button>
        <button class="font-size-btn" data-size="ml">中大</button>
        <button class="font-size-btn" data-size="large">大</button>
        <button class="font-size-btn" data-size="xl">极大</button>
      </div>

      <div class="section-label">排版预设 <span style="font-weight:500;text-transform:none;letter-spacing:0;color:#b0a090;font-size:10px">（一键调整所有模块节奏）</span></div>
      <div class="font-size-row" id="typoPresetRow" style="flex-wrap:wrap;gap:5px">
        <button class="font-size-btn" data-preset="compact" title="紧凑：密集信息型">紧凑</button>
        <button class="font-size-btn" data-preset="balanced" title="平衡：默认推荐">平衡</button>
        <button class="font-size-btn" data-preset="breathing" title="呼吸：强调留白">呼吸</button>
        <button class="font-size-btn" data-preset="editorial" title="杂志：层次分明">杂志</button>
        <button class="font-size-btn" data-preset="reset" title="清除所有自定义">清除</button>
      </div>
      <div class="form-hint" id="typoPresetHint" style="margin-top:6px;min-height:14px"></div>

      <div class="section-label collapse-header open" id="authorToggle">
        作者信息 <span class="arrow">▶</span>
      </div>
      <div class="collapse-body open" id="authorBody">
        <div class="author-row">
          <div class="form-group">
            <label class="form-label">名称</label>
            <input class="form-input" id="authorName" placeholder="你的昵称">
          </div>
          <div class="form-group">
            <label class="form-label">头衔</label>
            <input class="form-input" id="authorTitle" placeholder="基金研究员">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">头像</label>
          <div class="image-drop" id="avatarDrop" style="min-height:52px;padding:12px;">
            <span>点击上传头像</span>
          </div>
          <input type="file" id="avatarInput" accept="image/*" style="display:none">
        </div>
        <div class="form-group">
          <label class="form-label">页脚右侧文案 <span style="color:#b0a090;font-weight:400">（可选 · 支持 **加粗**）</span></label>
          <input class="form-input" id="footerCta" placeholder="如 关注 → 不错过基金干货">
        </div>
        <div class="form-group">
          <label class="form-label">页脚风格</label>
          <div class="seg-row" id="footerStyleRow">
            <button class="seg-btn" data-fts="">默认</button>
            <button class="seg-btn" data-fts="minimal">极简</button>
            <button class="seg-btn" data-fts="bold">强调</button>
            <button class="seg-btn" data-fts="hide">隐藏</button>
          </div>
        </div>
      </div>

      <div class="section-label collapse-header" id="seriesToggle">
        系列设置 <span class="arrow">▶</span>
      </div>
      <div class="collapse-body" id="seriesBody">
        <div class="form-group">
          <label class="form-label">系列名称 <span style="color:#b0a090;font-weight:400">（可选）</span></label>
          <input class="form-input" id="seriesName" placeholder="如 基金入门">
        </div>
        <div class="author-row">
          <div class="form-group">
            <label class="form-label">期号</label>
            <input class="form-input" id="seriesIndex" placeholder="如 3">
          </div>
          <div class="form-group">
            <label class="form-label">总期数</label>
            <input class="form-input" id="seriesTotal" placeholder="如 10">
          </div>
          <div class="form-group">
            <label class="form-label">单位</label>
            <input class="form-input" id="seriesUnit" placeholder="期 / 讲 / 章">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">数据日期 <span style="color:#b0a090;font-weight:400">（YYYY-MM-DD，留空用今日）</span></label>
          <input class="form-input" id="dataDate" placeholder="如 2026-03-31">
        </div>
        <div class="form-hint">系列号会自动渲染到封面右上角；数据日期供「📅 插入今日」按钮使用。</div>
      </div>
    </div>
    <div class="page-strip" id="pageStrip"></div>
  </aside>

  <section class="preview-panel" id="previewPanel">
    <div class="find-replace-bar" id="findReplaceBar">
      <input class="form-input fr-input" id="frFind" placeholder="查找内容…" autocomplete="off">
      <span class="fr-arrow">→</span>
      <input class="form-input fr-input" id="frReplace" placeholder="替换为（留空=删除）" autocomplete="off">
      <button class="export-btn secondary fr-btn" id="frApply">全部替换</button>
      <span class="fr-count" id="frCount"></span>
      <button class="export-btn ghost fr-btn" id="frClose" title="关闭（Esc）">×</button>
    </div>
    <div class="preview-wrapper" id="previewWrapper">
      <button class="preview-nav prev" id="prevPage">‹</button>
      <button class="preview-nav next" id="nextPage">›</button>
      <div class="card" id="cardOutput">
        <div class="card-bg"></div>
        <div class="card-content" id="cardContent"></div>
        <div class="card-page-indicator" id="pageIndicator"></div>
        <div class="card-accent-bottom"></div>
      </div>
    </div>
    <div class="preview-info" id="previewInfo"></div>
    <div class="export-bar">
      <button class="export-btn ghost" id="undoBtn" type="button" disabled title="撤销（Ctrl+Z）" aria-label="撤销">↶ 撤销<span class="undo-count" id="undoCount"></span></button>
      <button class="export-btn primary" id="exportCurrent">导出当前页</button>
      <button class="export-btn secondary" id="exportAll">导出全部页面</button>
      <button class="export-btn secondary" id="exportLong" title="将所有页面纵向拼接为单张长图">导出长图</button>
      <button class="export-btn ghost" id="archiveSave" type="button" title="把当前全部页面保存为 JSON 存档文件（可备份/换设备继续编辑）">存档</button>
      <button class="export-btn ghost" id="archiveOpen" type="button" title="打开之前保存的 JSON 存档继续编辑">打开</button>
      <input type="file" id="archiveFile" accept="application/json,.json" style="display:none">
    </div>
    <div class="kbd-hint">
      <kbd>Ctrl+Z</kbd> 撤销 · <kbd>Ctrl+Shift+Z</kbd> 强制撤销（输入框内）· <kbd>Ctrl+F</kbd> 查找 · <kbd>Alt</kbd>+↑↓ 移动块
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
// ====== Block Types ======
const BLOCK_TYPES = {

  bullets:   '要点列表',
  numbered:  '编号列表',
  checklist: '清单',
