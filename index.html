    while (blk.colWidths.length <= ci) blk.colWidths.push('');
    blk.colWidths[ci] = btn.dataset.cw;
    cwRow.querySelectorAll(`.col-align-btn[data-col="${ci}"]`).forEach(b => b.classList.toggle('active', b.dataset.cw === (blk.colWidths[ci]||'')));
    renderCard();
  });
  // 数字色 checkbox
  const ncEl = document.getElementById(`b${bi}_nc`);
  if (ncEl) ncEl.addEventListener('change', () => { blk.numberColor = ncEl.checked; renderCard(); });
  // 表格布局（撑满 / 自适应居中）
  const tlRow = document.getElementById(`tblLayout_${bi}`);
  if (tlRow) tlRow.addEventListener('click', e => {
    const btn = e.target.closest('.seg-btn'); if (!btn) return;
    blk.tableLayout = btn.dataset.tl;
    tlRow.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.tl === blk.tableLayout));
    renderCard();
  });
}

function bindEditorEvents() {
  const page = cp();
  // Smart bind: text-like inputs use debounced card render to avoid lag on every keystroke
  const bind = (id, obj, key, isText = false) => {
    const el=document.getElementById(id);
    if(el) el.addEventListener('input',()=>{
      obj[key]=el.value;
      isText ? _scheduleCardRender() : renderCard();
      pushHistoryDebounced('编辑');
    });
  };

  bind('fCat', page, 'category', true);
  bind('fTitle', page, 'title', true);
  bind('fSub', page, 'subtitle', true);
  bind('fGreet', page, 'greeting', true);
  bind('fDashDate', page, 'dashDate', true);
  bind('fDashRange', page, 'dashRange', true);
  bind('fHV', page, 'heroValue', true);
  bind('fHL', page, 'heroLabel', true);
  bind('fDeco', page, 'coverDeco', true);
  bind('fCTag', page, 'coverTag', true);
  bind('fFullCap', page, 'fullImgCaption', true);

  // Full image fit toggles (imageOnly template) — 统一写 page.imageFit
  document.querySelectorAll('#fullImgFitRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => { page.imageFit = btn.dataset.fit; renderEditorFields(); renderCard(); });
  });
  // Full image focal point picker (imageOnly template)
  const focalFull = document.getElementById('focalFull');
  if (focalFull) {
    focalFull.addEventListener('click', (e) => {
      const rect = focalFull.getBoundingClientRect();
      page.cropX = Math.max(0, Math.min(100, Math.round(((e.clientX - rect.left) / rect.width) * 100)));
      page.cropY = Math.max(0, Math.min(100, Math.round(((e.clientY - rect.top) / rect.height) * 100)));
      const dot = focalFull.querySelector('.focal-dot');
      const ch = focalFull.querySelector('.focal-crosshair-h');
      const cv = focalFull.querySelector('.focal-crosshair-v');
      if (dot) { dot.style.left = page.cropX+'%'; dot.style.top = page.cropY+'%'; }
      if (ch) ch.style.top = page.cropY+'%';
      if (cv) cv.style.left = page.cropX+'%';
      renderCard();
    });
  }

  // Cover image focal point picker
  const focalCover = document.getElementById('focalCover');
  if (focalCover) {
    focalCover.addEventListener('click', (e) => {
      const rect = focalCover.getBoundingClientRect();
      page.cropX = Math.max(0, Math.min(100, Math.round(((e.clientX - rect.left) / rect.width) * 100)));
      page.cropY = Math.max(0, Math.min(100, Math.round(((e.clientY - rect.top) / rect.height) * 100)));
      const dot = focalCover.querySelector('.focal-dot');
      const ch = focalCover.querySelector('.focal-crosshair-h');
      const cv = focalCover.querySelector('.focal-crosshair-v');
      if (dot) { dot.style.left = page.cropX+'%'; dot.style.top = page.cropY+'%'; }
      if (ch) ch.style.top = page.cropY+'%';
      if (cv) cv.style.left = page.cropX+'%';
      renderCard();
    });
  }

  // Mood (global)
  document.querySelectorAll('#moodRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.fontMood = btn.dataset.mood; renderEditorFields(); renderCard(); pushHistory('气质·'+(btn.textContent.trim())); });
  });
  // Density (global)
  document.querySelectorAll('#densityRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.density = btn.dataset.density; renderEditorFields(); renderCard(); });
  });
  // Title alignment
  document.querySelectorAll('#alignRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => { page.titleAlign = btn.dataset.align; renderEditorFields(); renderCard(); });
  });
  // Background style
  document.querySelectorAll('#bgRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => { page.bgStyle = btn.dataset.bg; renderEditorFields(); renderCard(); });
  });
  // Cover layout variant
  document.querySelectorAll('#coverVariantRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      page.coverVariant = btn.dataset.cv;
      if (page.coverVariant === 'numeric' && !page.coverIndex) page.coverIndex = '01';
      renderEditorFields(); renderCard();
    });
  });
  const fCoverIndex = document.getElementById('fCoverIndex');
  if (fCoverIndex) fCoverIndex.addEventListener('input', () => { page.coverIndex = fCoverIndex.value; renderCard(); });
  // Split layout toggle
  document.querySelectorAll('#imgSplitRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => { page.imageSplit = btn.dataset.split === '1'; renderEditorFields(); renderCard(); });
  });
  // Image fit toggles (shown in both normal and split mode)
  document.querySelectorAll('#imgFitRow .seg-btn, #splitFitRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => { page.imageFit = btn.dataset.fit; renderEditorFields(); renderCard(); });
  });
  // Main image height slider
  const imgHSlider = document.getElementById('imgHSlider');
  if (imgHSlider) {
    imgHSlider.addEventListener('input', () => {
      const v = parseInt(imgHSlider.value);
      page.imageH = v;
      const valEl = document.getElementById('imgHVal');
      if (valEl) valEl.textContent = v + 'px';
      const row = document.getElementById('imgSliderRow');
      if (row) row.style.opacity = '1';
      // Deactivate ratio buttons
      document.querySelectorAll('#imgRatioRow .seg-btn').forEach(b => b.classList.remove('active'));
      renderCard();
    });
  }
  // Main image ratio presets
  document.querySelectorAll('#imgRatioRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ratio = btn.dataset.ratio;
      const h = ratioToH(ratio);
      page.imageH = h;
      document.querySelectorAll('#imgRatioRow .seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const slider = document.getElementById('imgHSlider');
      const valEl = document.getElementById('imgHVal');
      const row = document.getElementById('imgSliderRow');
      if (h === 0) {
        if (slider) slider.value = 420;
        if (valEl) valEl.textContent = '自动';
        if (row) row.style.opacity = '0.55';
      } else {
        if (slider) slider.value = h;
        if (valEl) valEl.textContent = h + 'px';
        if (row) row.style.opacity = '1';
      }
      renderCard();
    });
  });
  // Main image focal point picker
  const focalMain = document.getElementById('focalMain');
  if (focalMain) {
    focalMain.addEventListener('click', (e) => {
      const rect = focalMain.getBoundingClientRect();
      const x = Math.round(((e.clientX - rect.left) / rect.width) * 100);
      const y = Math.round(((e.clientY - rect.top) / rect.height) * 100);
      page.cropX = Math.max(0, Math.min(100, x));
      page.cropY = Math.max(0, Math.min(100, y));
      // Update dot + crosshairs visually without full re-render
      const dot = focalMain.querySelector('.focal-dot');
      const ch = focalMain.querySelector('.focal-crosshair-h');
      const cv = focalMain.querySelector('.focal-crosshair-v');
      if (dot) { dot.style.left = page.cropX + '%'; dot.style.top = page.cropY + '%'; }
      if (ch) ch.style.top = page.cropY + '%';
      if (cv) cv.style.left = page.cropX + '%';
      renderCard();
    });
  }
  // Split width toggles (split mode only)
  document.querySelectorAll('#splitWRow .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => { page.splitW = btn.dataset.sw; renderEditorFields(); renderCard(); });
  });
  // Split layout focal point picker
  const focalSplit = document.getElementById('focalSplit');
  if (focalSplit) {
    focalSplit.addEventListener('click', (e) => {
      const rect = focalSplit.getBoundingClientRect();
      page.cropX = Math.max(0, Math.min(100, Math.round(((e.clientX - rect.left) / rect.width) * 100)));
      page.cropY = Math.max(0, Math.min(100, Math.round(((e.clientY - rect.top) / rect.height) * 100)));
      const dot = focalSplit.querySelector('.focal-dot');
      const ch = focalSplit.querySelector('.focal-crosshair-h');
      const cv = focalSplit.querySelector('.focal-crosshair-v');
      if (dot) { dot.style.left = page.cropX+'%'; dot.style.top = page.cropY+'%'; }
      if (ch) ch.style.top = page.cropY+'%';
      if (cv) cv.style.left = page.cropX+'%';
      renderCard();
    });
  }

  // Main image drop
  const mainDrop = document.getElementById('mainImgDrop');
  const mainInput = document.getElementById('mainImgInput');
  if (mainDrop && mainInput) {
    mainDrop.addEventListener('click', e => { if(!e.target.classList.contains('remove-img')) mainInput.click(); });
    mainInput.addEventListener('change', e => {
      if(e.target.files[0]) readFile(e.target.files[0], d => { page.image=d; renderEditorFields(); renderCard(); _autoFit(d, fit => { if(page.imageFit!==fit){ page.imageFit=fit; renderEditorFields(); renderCard(); } }); });
    });
    mainDrop.addEventListener('dragover', e => { e.preventDefault(); mainDrop.style.borderColor='#c4673a'; });
    mainDrop.addEventListener('dragleave', () => { mainDrop.style.borderColor=''; });
    mainDrop.addEventListener('drop', e => {
      e.preventDefault(); mainDrop.style.borderColor='';
      if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0], d => { page.image=d; renderEditorFields(); renderCard(); _autoFit(d, fit => { if(page.imageFit!==fit){ page.imageFit=fit; renderEditorFields(); renderCard(); } }); });
    });
  }

  // Block events
  page.blocks.forEach((blk, bi) => {
    const bnd = (sfx, obj, key) => bind(`b${bi}_${sfx}`, obj, key);

    // Per-block size buttons
    document.querySelectorAll(`.block-size-mini[data-bi="${bi}"] button`).forEach(btn => {
      btn.addEventListener('click', () => {
        blk.customSize = btn.dataset.bsz;
        document.querySelectorAll(`.block-size-mini[data-bi="${bi}"] button`).forEach(b => b.classList.toggle('active', b.dataset.bsz === blk.customSize));
        renderCard();
      });
    });
    // Per-block color dots
    document.querySelectorAll(`.bsb-colors[data-bi="${bi}"] .block-color-dot`).forEach(dot => {
      dot.addEventListener('click', () => {
        blk.customColor = dot.dataset.cid;
        document.querySelectorAll(`.bsb-colors[data-bi="${bi}"] .block-color-dot`).forEach(d => d.classList.toggle('active', d.dataset.cid === blk.customColor));
        renderCard();
      });
    });
    // Per-block style buttons
    document.querySelectorAll(`.block-style-select[data-bi="${bi}"] button`).forEach(btn => {
      btn.addEventListener('click', () => {
        blk.blockStyle = btn.dataset.bst;
        document.querySelectorAll(`.block-style-select[data-bi="${bi}"] button`).forEach(b => b.classList.toggle('active', b.dataset.bst === blk.blockStyle));
        renderCard();
      });
    });
    // Per-block custom color picker
    const ccInput = document.querySelector(`.block-custom-color-input[data-bi="${bi}"]`);
    if (ccInput) {
      ccInput.addEventListener('input', () => {
        blk.customColor = ccInput.value;
        document.querySelectorAll(`.bsb-colors[data-bi="${bi}"] .block-color-dot`).forEach(d => d.classList.remove('active'));
        renderCard();
      });
    }
    // Per-block texture: single axis that sets rhythm + weight + lineHeight together
    document.querySelectorAll(`.block-texture-select[data-bi="${bi}"] button`).forEach(btn => {
      btn.addEventListener('click', () => {
        applyBlkTexture(blk, btn.dataset.btx);
        document.querySelectorAll(`.block-texture-select[data-bi="${bi}"] button`).forEach(b => b.classList.toggle('active', b.dataset.btx === btn.dataset.btx));
        renderCard();
      });
    });
    // Per-block 对齐
    document.querySelectorAll(`.block-align-select[data-bi="${bi}"] button`).forEach(btn => {
      btn.addEventListener('click', () => {
        blk.align = btn.dataset.bal;
        document.querySelectorAll(`.block-align-select[data-bi="${bi}"] button`).forEach(b => b.classList.toggle('active', b.dataset.bal === (blk.align||'')));
        renderCard();
      });
    });
    // Per-block 最大宽度
    document.querySelectorAll(`.block-maxw-select[data-bi="${bi}"] button`).forEach(btn => {
      btn.addEventListener('click', () => {
        blk.maxW = btn.dataset.bmw;
        document.querySelectorAll(`.block-maxw-select[data-bi="${bi}"] button`).forEach(b => b.classList.toggle('active', b.dataset.bmw === (blk.maxW||'')));
        renderCard();
      });
    });
    // Per-block 并排
    document.querySelectorAll(`.block-col-select[data-bi="${bi}"] button`).forEach(btn => {
      btn.addEventListener('click', () => {
        blk.col = btn.dataset.bcol;
        document.querySelectorAll(`.block-col-select[data-bi="${bi}"] button`).forEach(b => b.classList.toggle('active', b.dataset.bcol === (blk.col||'')));
        renderCard();
      });
    });
    // Advanced options toggle
    const advToggle = document.getElementById(`advToggle_${bi}`);
    if (advToggle) {
      advToggle.addEventListener('click', () => {
        advToggle.classList.toggle('open');
        const row = document.getElementById(`advRow_${bi}`);
        if (row) row.classList.toggle('open');
      });
    }

    if (blk.type === 'text') bnd('c', blk, 'content', true);
    else if (blk.type === 'checklist') {
      blk.items.forEach((item,ii) => {
        const el=document.getElementById(`b${bi}_ck${ii}`);
        if(el) el.addEventListener('input',()=>{item.text=el.value;_scheduleCardRender();});
      });
      document.querySelectorAll(`.ck-done-btn[data-bi="${bi}"]`).forEach(btn => {
        btn.addEventListener('click', () => {
          const ii=parseInt(btn.dataset.ii);
          blk.items[ii].done=!blk.items[ii].done;
          renderEditorFields(); renderCard();
        });
      });
    } else if (blk.type === 'bullets' || blk.type === 'numbered') {
      blk.items.forEach((_,ii) => { const el=document.getElementById(`b${bi}_i${ii}`); if(el) el.addEventListener('input',()=>{blk.items[ii]=el.value;_scheduleCardRender();}); });
    } else if (blk.type === 'highlight') {
      bnd('l',blk,'label',true); bnd('c',blk,'content',true);
      document.querySelectorAll(`#hlLabelSzRow_${bi} [data-hls]`).forEach(btn => {
        btn.addEventListener('click', () => {
          blk.labelSize = btn.dataset.hls;
          document.querySelectorAll(`#hlLabelSzRow_${bi} [data-hls]`).forEach(b => b.classList.toggle('active', b.dataset.hls === (blk.labelSize||'')));
          renderCard();
        });
      });
      document.querySelectorAll(`#hlLabelStyRow_${bi} [data-hlsty]`).forEach(btn => {
        btn.addEventListener('click', () => {
          blk.labelStyle = btn.dataset.hlsty;
          document.querySelectorAll(`#hlLabelStyRow_${bi} [data-hlsty]`).forEach(b => b.classList.toggle('active', b.dataset.hlsty === (blk.labelStyle||'')));
          renderCard();
        });
      });
    }
    else if (blk.type === 'quote')     {
      bnd('c',blk,'content',true); bnd('s',blk,'source',true);
      const qv=document.getElementById(`qv_${bi}`);
      if (qv) qv.addEventListener('click', e => {
        const b=e.target.closest('.seg-btn'); if(!b)return;
        blk.variant=b.dataset.qv;
        qv.querySelectorAll('.seg-btn').forEach(x=>x.classList.toggle('active',x.dataset.qv===(blk.variant||'')));
        renderEditorFields(); renderCard();
      });
    }
    else if (blk.type === 'infocard')  { bnd('n',blk,'num',true); bnd('t',blk,'title',true); bnd('d',blk,'desc',true); }
    else if (blk.type === 'keystat') {
      const kv = blk.variant || '';
      bnd('v',blk,'value',true); bnd('l',blk,'label',true);
      if (kv === 'hero') bnd('cap',blk,'caption',true);
      if (kv === 'metric') {
        bnd('d',blk,'delta',true); bnd('dl',blk,'deltaLabel',true);
        document.querySelectorAll(`#metricDirRow_${bi} [data-mdir]`).forEach(btn => {
          btn.addEventListener('click', () => {
            blk.deltaDir = btn.dataset.mdir;
            document.querySelectorAll(`#metricDirRow_${bi} [data-mdir]`).forEach(b => b.classList.toggle('active', b.dataset.mdir === blk.deltaDir));
            renderCard();
          });
        });
      }
      if (kv === 'compare') { bnd('cl',blk,'chipLabel',true); bnd('cv',blk,'chipValue',true); }
      const ksv=document.getElementById(`ksv_${bi}`);
      if (ksv) ksv.addEventListener('click', e => {
        const b=e.target.closest('.seg-btn'); if(!b)return;
        blk.variant=b.dataset.ksv;
        renderEditorFields(); renderCard();
      });
    }
    else if (blk.type === 'ranking') {
      bnd('t',blk,'title',true);
      blk.items.forEach((it, ii) => {
        const nEl = document.getElementById(`b${bi}_rn${ii}`);
        const vEl = document.getElementById(`b${bi}_rv${ii}`);
        const pEl = document.getElementById(`b${bi}_rp${ii}`);
        const pvEl = document.getElementById(`b${bi}_rpv${ii}`);
        if (nEl) nEl.addEventListener('input', () => { it.name = nEl.value; _scheduleCardRender(); });
        if (vEl) vEl.addEventListener('input', () => { it.value = vEl.value; _scheduleCardRender(); });
        if (pEl) pEl.addEventListener('input', () => { it.pct = Number(pEl.value); if (pvEl) pvEl.textContent = it.pct + '%'; _scheduleCardRender(); });
      });
    }
    else if (blk.type === 'progress') {
      bnd('l',blk,'label',true); bnd('cap',blk,'caption',true);
      const vEl = document.getElementById(`b${bi}_v`);
      const vvEl = document.getElementById(`b${bi}_vv`);
      if (vEl) vEl.addEventListener('input', () => { blk.value = Number(vEl.value); if (vvEl) vvEl.textContent = blk.value + '%'; _scheduleCardRender(); });
      document.querySelectorAll(`#progSizeRow_${bi} [data-psz]`).forEach(btn => {
        btn.addEventListener('click', () => {
          blk.size = btn.dataset.psz;
          document.querySelectorAll(`#progSizeRow_${bi} [data-psz]`).forEach(b => b.classList.toggle('active', b.dataset.psz === blk.size));
          renderCard();
        });
      });
    }
    else if (blk.type === 'kpigrid') {
      blk.items.forEach((it, ii) => {
        const vEl = document.getElementById(`b${bi}_kv${ii}`);
        const lEl = document.getElementById(`b${bi}_kl${ii}`);
        const dEl = document.getElementById(`b${bi}_kd${ii}`);
        if (vEl) vEl.addEventListener('input', () => { it.value = vEl.value; _scheduleCardRender(); });
        if (lEl) lEl.addEventListener('input', () => { it.label = lEl.value; _scheduleCardRender(); });
        if (dEl) dEl.addEventListener('input', () => { it.delta = dEl.value; _scheduleCardRender(); });
        document.querySelectorAll(`#kpiDirRow_${bi}_${ii} [data-kdir]`).forEach(btn => {
          btn.addEventListener('click', () => {
            it.deltaDir = btn.dataset.kdir;
            document.querySelectorAll(`#kpiDirRow_${bi}_${ii} [data-kdir]`).forEach(b => b.classList.toggle('active', b.dataset.kdir === it.deltaDir));
            renderCard();
          });
        });
      });
    }
    else if (blk.type === 'sparkcard') {
      bnd('t',blk,'title',true); bnd('v',blk,'value',true); bnd('d',blk,'delta',true); bnd('vals',blk,'values',true);
      document.querySelectorAll(`#sparkDirRow_${bi} [data-sdir]`).forEach(btn => {
        btn.addEventListener('click', () => {
          blk.deltaDir = btn.dataset.sdir;
          document.querySelectorAll(`#sparkDirRow_${bi} [data-sdir]`).forEach(b => b.classList.toggle('active', b.dataset.sdir === blk.deltaDir));
          renderCard();
        });
      });
    }
    else if (blk.type === 'callout') {
      bnd('t', blk, 'title', true);
      bnd('c', blk, 'content', true);
      document.querySelectorAll(`#coVarRow_${bi} [data-covar]`).forEach(btn => {
        btn.addEventListener('click', () => {
          blk.variant = btn.dataset.covar;
          document.querySelectorAll(`#coVarRow_${bi} [data-covar]`).forEach(b => b.classList.toggle('active', b.dataset.covar === blk.variant));
          renderCard();
        });
      });
    }
    else if (blk.type === 'tldr') {
      const tv = blk.variant || '';
      if (tv === 'source') {
        (blk.items||[]).forEach((it,ii) => {
          const idEl=document.getElementById(`b${bi}_sid${ii}`);
          const txEl=document.getElementById(`b${bi}_stx${ii}`);
          if(idEl) idEl.addEventListener('input',()=>{it.id=idEl.value;_scheduleCardRender();});
          if(txEl) txEl.addEventListener('input',()=>{it.text=txEl.value;_scheduleCardRender();});
        });
      } else {
        bnd('bg', blk, 'badge', true);
        bnd('t', blk, 'title', true);
        (blk.points||[]).forEach((_,ii) => {
          const el=document.getElementById(`b${bi}_p${ii}`);
          if(el) el.addEventListener('input',()=>{blk.points[ii]=el.value;_scheduleCardRender();});
        });
      }
      const tlv=document.getElementById(`tlv_${bi}`);
      if (tlv) tlv.addEventListener('click', e => {
        const b=e.target.closest('.seg-btn'); if(!b)return;
        blk.variant=b.dataset.tlv;
        renderEditorFields(); renderCard();
      });
    }
    else if (blk.type === 'panel') {
      bnd('t', blk, 'title', true);
      bnd('st', blk, 'subtitle', true);
      // 子块字段绑定（按 child.type 分支）
      (blk.children||[]).forEach((ch, ci) => {
        const id = (f) => `b${bi}_c${ci}_${f}`;
        const bindCh = (suffix, key) => { const el=document.getElementById(id(suffix)); if(el) el.addEventListener('input',()=>{ ch[key]=el.value; _scheduleCardRender(); }); };
        if (ch.type === 'text')      bindCh('c','content');
        else if (ch.type === 'keystat') { bindCh('v','value'); bindCh('l','label'); }
        else if (ch.type === 'herostat'){ bindCh('v','value'); bindCh('l','label'); bindCh('cap','caption'); }
        else if (ch.type === 'metric')  { bindCh('v','value'); bindCh('l','label'); bindCh('d','delta'); bindCh('dl','deltaLabel'); }
        else if (ch.type === 'compare') { bindCh('lbl','label'); bindCh('v','value'); bindCh('cv','chipValue'); }
        else if (ch.type === 'callout') { bindCh('t','title'); bindCh('c','content'); }
        else if (ch.type === 'bullets') {
          (ch.items||[]).forEach((_,ii) => { const el=document.getElementById(id('i'+ii)); if(el) el.addEventListener('input',()=>{ ch.items[ii]=el.value; _scheduleCardRender(); }); });
        }
        else if (ch.type === 'progress'){ bindCh('l','label'); const v=document.getElementById(id('v')); if(v) v.addEventListener('input',()=>{ ch.value=parseInt(v.value)||0; _scheduleCardRender(); }); }
        else if (ch.type === 'sparkcard'){ bindCh('t','title'); bindCh('v','value'); bindCh('vals','values'); }
        else if (ch.type === 'ranking') {
          bindCh('t','title');
          (ch.items||[]).forEach((it,ii) => {
            const nEl=document.getElementById(id('rn'+ii)); if(nEl) nEl.addEventListener('input',()=>{ it.name=nEl.value; _scheduleCardRender(); });
            const vEl=document.getElementById(id('rv'+ii)); if(vEl) vEl.addEventListener('input',()=>{ it.value=vEl.value; _scheduleCardRender(); });
          });
        }
      });
    }
    else if (blk.type === 'disclaimer') {
      bnd('c', blk, 'content', true);
      const presetRow = document.getElementById(`dcPreset_${bi}`);
      if (presetRow) presetRow.addEventListener('click', e => {
        const btn = e.target.closest('.seg-btn'); if (!btn) return;
        const p = btn.dataset.dcp;
        blk.preset = p;
        if (p !== 'custom' && DISCLAIMER_PRESETS[p]) blk.content = DISCLAIMER_PRESETS[p];
        renderEditorFields(); renderCard();
      });
    }
    else if (blk.type === 'qrcode') {
      bnd('qt', blk, 'text', true);
      bnd('ql', blk, 'label', true);
      [['qrKind_','qk','kind'],['qrSize_','qs','size'],['qrPos_','qp','position']].forEach(([rowId, attr, field]) => {
        const row = document.getElementById(`${rowId}${bi}`);
        if (row) row.addEventListener('click', e => {
          const btn = e.target.closest('.seg-btn'); if (!btn) return;
          blk[field] = btn.dataset[attr];
          row.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset[attr] === blk[field]));
          renderCard();
        });
      });
    }
    else if (blk.type === 'table') {
      _bindTableEditor(blk, bi, bind);
    }
    else if (blk.type === 'tags') {
      blk.items.forEach((_,ii) => { const el=document.getElementById(`b${bi}_i${ii}`); if(el) el.addEventListener('input',()=>{blk.items[ii]=el.value;_scheduleCardRender();}); });
    } else if (blk.type === 'grid') {
      blk.items.forEach((item,ii) => {
        const lEl=document.getElementById(`b${bi}_gl${ii}`), tEl=document.getElementById(`b${bi}_gt${ii}`);
        if(lEl) lEl.addEventListener('input',()=>{item.label=lEl.value;_scheduleCardRender();});
        if(tEl) tEl.addEventListener('input',()=>{item.text=tEl.value;_scheduleCardRender();});
      });
    } else if (blk.type === 'image') {
      bnd('cap', blk, 'caption', true);
      // Fit buttons
      document.querySelectorAll(`.img-fit-btn[data-bi="${bi}"]`).forEach(btn => {
        btn.addEventListener('click', () => { blk.fit=btn.dataset.fit; renderEditorFields(); renderCard(); });
      });
      // Block height slider
      const bSlider = document.querySelector(`.blk-h-slider[data-bi="${bi}"]`);
      if (bSlider) {
        bSlider.addEventListener('input', () => {
          const v = parseInt(bSlider.value);
          blk.h = v;
          const valEl = document.querySelector(`.blk-h-val[data-bi="${bi}"]`);
          if (valEl) valEl.textContent = v + 'px';
          const row = document.getElementById(`blkSliderRow_${bi}`);
          if (row) row.style.opacity = '1';
          document.querySelectorAll(`.blk-ratio-btn[data-bi="${bi}"]`).forEach(b => b.classList.remove('active'));
          renderCard();
        });
      }
      // Block ratio presets
      document.querySelectorAll(`.blk-ratio-btn[data-bi="${bi}"]`).forEach(btn => {
        btn.addEventListener('click', () => {
          const h = ratioToH(btn.dataset.ratio);
          blk.h = h;
          document.querySelectorAll(`.blk-ratio-btn[data-bi="${bi}"]`).forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const sl = document.querySelector(`.blk-h-slider[data-bi="${bi}"]`);
          const vl = document.querySelector(`.blk-h-val[data-bi="${bi}"]`);
          const rw = document.getElementById(`blkSliderRow_${bi}`);
          if (h === 0) {
            if (sl) sl.value = 420;
            if (vl) vl.textContent = '自动';
            if (rw) rw.style.opacity = '0.55';
          } else {
            if (sl) sl.value = h;
            if (vl) vl.textContent = h + 'px';
            if (rw) rw.style.opacity = '1';
          }
          renderCard();
        });
      });
      // Block focal point picker
      const focalBlk = document.getElementById(`focalBlk_${bi}`);
      if (focalBlk) {
        focalBlk.addEventListener('click', (e) => {
          const rect = focalBlk.getBoundingClientRect();
          const x = Math.max(0, Math.min(100, Math.round(((e.clientX - rect.left) / rect.width) * 100)));
          const y = Math.max(0, Math.min(100, Math.round(((e.clientY - rect.top) / rect.height) * 100)));
          blk.cropX = x; blk.cropY = y;
          const dot = focalBlk.querySelector('.focal-dot');
          const ch = focalBlk.querySelector('.focal-crosshair-h');
          const cv = focalBlk.querySelector('.focal-crosshair-v');
          if (dot) { dot.style.left = x+'%'; dot.style.top = y+'%'; }
          if (ch) ch.style.top = y+'%';
          if (cv) cv.style.left = x+'%';
          renderCard();
        });
      }
      // Block 缩放滑块（仅 cover 有意义）
      const zSlider = document.querySelector(`.blk-zoom-slider[data-bi="${bi}"]`);
      if (zSlider) zSlider.addEventListener('input', () => {
        blk.zoom = Number(zSlider.value) || 1;
        const zv = document.querySelector(`.blk-zoom-val[data-bi="${bi}"]`);
        if (zv) zv.textContent = blk.zoom.toFixed(2) + '×';
        _scheduleCardRender();
      });
      // Image drop
      const drop=document.getElementById(`imgDrop_${bi}`), inp=document.getElementById(`imgInput_${bi}`);
      if(drop && inp) {
        drop.addEventListener('click', e => { if(!e.target.classList.contains('remove-img')) inp.click(); });
        inp.addEventListener('change', e => {
          if(e.target.files[0]) readFile(e.target.files[0], d => { blk.src=d; renderEditorFields(); renderCard(); });
        });
        drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor='#c4673a'; });
        drop.addEventListener('dragleave', () => { drop.style.borderColor=''; });
        drop.addEventListener('drop', e => {
          e.preventDefault(); drop.style.borderColor='';
          if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0], d => { blk.src=d; renderEditorFields(); renderCard(); });
        });
      }
    }
    // sectionHeader events
    else if (blk.type === 'sectionHeader') {
      bnd('l', blk, 'label', true);
      bnd('n', blk, 'num', true);
      bnd('ico', blk, 'icon', true);
      document.querySelectorAll(`#shStyleRow_${bi} .seg-btn`).forEach(btn => {
        btn.addEventListener('click', () => { blk.shStyle = btn.dataset.shst; renderEditorFields(); renderCard(); });
      });
    }
    // gallery events
    else if (blk.type === 'gallery') {
      document.querySelectorAll(`#galLayoutRow_${bi} .seg-btn`).forEach(btn => {
        btn.addEventListener('click', () => { blk.layout = btn.dataset.glay; renderEditorFields(); renderCard(); });
      });
      blk.images.forEach((img, ii) => {
        const lEl = document.getElementById(`b${bi}_gl${ii}`);
        if (lEl) lEl.addEventListener('input', () => { img.label = lEl.value; _scheduleCardRender(); });
        const drop = document.getElementById(`galDrop_${bi}_${ii}`);
        const inp = document.getElementById(`galInput_${bi}_${ii}`);
        if (drop && inp) {
          drop.addEventListener('click', e => { if (!e.target.classList.contains('remove-img')) inp.click(); });
          inp.addEventListener('change', e => {
            if (e.target.files[0]) readFile(e.target.files[0], d => { img.src = d; renderEditorFields(); renderCard(); });
          });
          drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor = '#c4673a'; });
          drop.addEventListener('dragleave', () => { drop.style.borderColor = ''; });
          drop.addEventListener('drop', e => {
            e.preventDefault(); drop.style.borderColor = '';
            if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0], d => { img.src = d; renderEditorFields(); renderCard(); });
          });
        }
      });
    }
    // textWrap events
    else if (blk.type === 'textWrap') {
      bnd('c', blk, 'content', true);
      const wrapDrop = document.getElementById(`wrapImgDrop_${bi}`);
      const wrapInp = document.getElementById(`wrapImgInput_${bi}`);
      if (wrapDrop && wrapInp) {
        wrapDrop.addEventListener('click', e => { if (!e.target.classList.contains('remove-img')) wrapInp.click(); });
        wrapInp.addEventListener('change', e => {
          if (e.target.files[0]) readFile(e.target.files[0], d => { blk.src = d; renderEditorFields(); renderCard(); });
        });
        wrapDrop.addEventListener('dragover', e => { e.preventDefault(); wrapDrop.style.borderColor = '#c4673a'; });
        wrapDrop.addEventListener('dragleave', () => { wrapDrop.style.borderColor = ''; });
        wrapDrop.addEventListener('drop', e => {
          e.preventDefault(); wrapDrop.style.borderColor = '';
          if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0], d => { blk.src = d; renderEditorFields(); renderCard(); });
        });
      }
      document.querySelectorAll(`#wrapSideRow_${bi} .seg-btn`).forEach(btn => {
        btn.addEventListener('click', () => { blk.wrapSide = btn.dataset.ws; renderEditorFields(); renderCard(); });
      });
      document.querySelectorAll(`#wrapSizeRow_${bi} .seg-btn`).forEach(btn => {
        btn.addEventListener('click', () => { blk.wrapSize = btn.dataset.wsz; renderEditorFields(); renderCard(); });
      });
      document.querySelectorAll(`#wrapRoundRow_${bi} .seg-btn`).forEach(btn => {
        btn.addEventListener('click', () => {
          blk.wrapRound = btn.dataset.wr;
          document.querySelectorAll(`#wrapRoundRow_${bi} .seg-btn`).forEach(b => b.classList.toggle('active', b.dataset.wr === (blk.wrapRound||'')));
          renderCard();
        });
      });
      document.querySelectorAll(`#wrapGapRow_${bi} .seg-btn`).forEach(btn => {
        btn.addEventListener('click', () => {
          blk.wrapGap = btn.dataset.wg;
          document.querySelectorAll(`#wrapGapRow_${bi} .seg-btn`).forEach(b => b.classList.toggle('active', b.dataset.wg === (blk.wrapGap||'')));
          renderCard();
        });
      });
      document.querySelectorAll(`#wrapShadowRow_${bi} .seg-btn`).forEach(btn => {
        btn.addEventListener('click', () => {
          blk.wrapShadow = btn.dataset.wsh;
          document.querySelectorAll(`#wrapShadowRow_${bi} .seg-btn`).forEach(b => b.classList.toggle('active', b.dataset.wsh === (blk.wrapShadow||'')));
          renderCard();
        });
      });
      document.querySelectorAll(`#wrapVAlignRow_${bi} .seg-btn`).forEach(btn => {
        btn.addEventListener('click', () => {
          blk.wrapVAlign = btn.dataset.wva;
          document.querySelectorAll(`#wrapVAlignRow_${bi} .seg-btn`).forEach(b => b.classList.toggle('active', b.dataset.wva === (blk.wrapVAlign||'')));
          renderCard();
        });
      });
    }
  });

  // Data card table：复用 table 块编辑器（数据=page.tableData，bi='dc'）
  if (page.template === 'dataCard') {
    if (!page.tableData || typeof page.tableData !== 'object') page.tableData = makeBlock('table');
    _bindTableEditor(page.tableData, 'dc', bind);
  }
}

// ====== Portrait image detection ======
// 上传图片时按宽高比智能选默认适配：竖版卡片下竖图/近方图用 cover 充满、
// 横图用 contain 完整展示（避免裁掉关键内容）。用户仍可手动切换。
function _autoFit(dataUrl, cb) {
  if (!dataUrl) return;
  const im = new Image();
  im.onload = () => {
    if (!im.naturalWidth || !im.naturalHeight) return;
    const ratio = im.naturalHeight / im.naturalWidth; // >1 竖图，<1 横图
    cb(ratio >= 0.8 ? 'cover' : 'contain');
  };
  im.onerror = () => {};
  im.src = dataUrl;
}

function detectPortraitImages() {
  els.cardContent.querySelectorAll('.card-image-area img, .cb-image img').forEach(img => {
    const apply = () => {
      if (!img.naturalWidth || !img.naturalHeight) return;
      const ratio = img.naturalHeight / img.naturalWidth;
      const container = img.closest('.card-image-area') || img.closest('.cb-image');
      if (!container || container.classList.contains('portrait-img')) return;
      if (ratio > 1.15) {
        container.classList.add('portrait-img');
        // Auto mode (no explicit ih-s/m/l): dynamically limit portrait height
        if (!container.className.match(/\bih-[sml]\b/)) {
          const maxH = ratio > 1.8 ? Math.round(state.cardH * 0.32) : Math.round(state.cardH * 0.38);
          img.style.maxHeight = maxH + 'px';
        }
        requestAnimationFrame(checkOverflow);
      }
    };
    if (img.complete && img.naturalWidth) apply();
    else img.addEventListener('load', apply, { once: true });
  });
}

// ====== Render: Block ======
function resolveBlockColor(blk) {
  if (!blk.customColor) return '';
  // Named preset
  const preset = BLOCK_COLORS.find(c => c.id === blk.customColor);
  if (preset && preset.css) {
    if (preset.css.startsWith('linear-gradient')) {
      // Gradient text via background-clip
      return `background:${preset.css};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;
    }
    return `color:${preset.css};`;
  }
  // Custom hex color (from color picker)
  if (blk.customColor.startsWith('#')) return `color:${blk.customColor};`;
  return '';
}

function svgSparkline(csv, w, h) {
  const nums = String(csv||'').split(/[,\s]+/).map(parseFloat).filter(n=>!isNaN(n));
  if (nums.length < 2) return '';
  const min = Math.min(...nums), max = Math.max(...nums), range = max - min || 1;
  const step = w / (nums.length - 1);
  const pts = nums.map((n, i) => `${(i*step).toFixed(1)},${(h - (n-min)/range*h*0.85 - h*0.08).toFixed(1)}`);
  const last = pts[pts.length-1].split(',');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    <polygon points="0,${h} ${pts.join(' ')} ${w},${h}" fill="currentColor" opacity="0.12"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3.5" fill="currentColor"/>
  </svg>`;
}
function svgProgressRing(pct, size) {
  const p = Math.max(0, Math.min(100, Number(pct)||0));
  const r = size/2 - 8, c = 2*Math.PI*r, dash = p*c/100;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="currentColor" stroke-width="10" opacity="0.18"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="currentColor" stroke-width="10"
      stroke-linecap="round" stroke-dasharray="${dash.toFixed(2)} ${c.toFixed(2)}"/>
  </svg>`;
}

function renderBlock(blk, sz) {
  // Per-block size override (comprehensive map matching all 7 size levels)
  const szMap = { xs:'sz-xs', small:'sz-s', s:'sz-s', ms:'sz-ms', '':'', ml:'sz-ml', l:'sz-l', large:'sz-l', xl:'sz-xl' };
  const effectiveSz = blk.customSize ? (szMap[blk.customSize] || '') : sz;
  const cStyle = resolveBlockColor(blk);
  const wrapStyle = cStyle ? ` style="${cStyle}"` : '';
  const bsCls = blk.blockStyle ? ` block-${blk.blockStyle}` : '';
  // 排版节奏：canonical 只有 rhythm + fontWeight（旧 spacing/lineHeight 已由
  // migrateBlock 全量收敛删除，所有入口[init/导入/恢复]均过 migrateState）
  const extraCls =
    (blk.rhythm ? ` rh-${blk.rhythm}` : '') +
    (blk.fontWeight ? ` fw-${blk.fontWeight}` : '') +
    (blk.align ? ` bk-al-${blk.align}` : '') +
    (blk.maxW ? ` bk-mw-${blk.maxW}` : '');
  const hasColorAttr = blk.customColor ? ' data-has-color' : '';

  switch (blk.type) {
    case 'text':
      return blk.content ? `<div class="cb-text ${effectiveSz}${extraCls}"${hasColorAttr}${wrapStyle}>${parseBody(blk.content)}</div>` : '';
    case 'bullets': {
      const items = blk.items.filter(i=>i.trim());
      return items.length ? `<ul class="cb-bullets ${effectiveSz}${extraCls}"${hasColorAttr}>${items.map(i=>`<li${wrapStyle}>${inl(i)}</li>`).join('')}</ul>` : '';
    }
    case 'numbered': {
      const items = blk.items.filter(i=>i.trim());
      return items.length ? `<ol class="cb-numbered ${effectiveSz}${extraCls}"${hasColorAttr}>${items.map((item,i)=>`<li><span class="n">${String(i+1).padStart(2,'0')}</span><span${wrapStyle}>${inl(item)}</span></li>`).join('')}</ol>` : '';
    }
    case 'checklist': {
      const items = blk.items.filter(i=>i.text.trim()||i.done);
      return items.length ? `<ul class="cb-check ${effectiveSz}${extraCls}"${hasColorAttr}>${items.map(i=>`<li><span class="ck${i.done?' done':''}">✓</span><span${wrapStyle}>${inl(i.text)}</span></li>`).join('')}</ul>` : '';
    }
    case 'highlight': {
      const labelSzCls = blk.labelSize ? ` sz-${blk.labelSize}` : '';
      const labelStyleCls = blk.labelStyle ? ` label-${blk.labelStyle}` : '';
      return `<div class="cb-highlight${bsCls}${extraCls}${labelStyleCls}"${hasColorAttr}${wrapStyle}>${blk.label?`<div class="mod-label${labelSzCls}">${esc(blk.label)}</div>`:''}<div class="mod-text ${effectiveSz}">${parseBody(blk.content)}</div></div>`;
    }
    case 'quote':
      if (blk.variant === 'featured')
        return `<div class="cb-pullquote${extraCls}"${wrapStyle}><div class="pq-text">${inl(blk.content||'')}</div>${blk.source?`<div class="pq-source">${esc(blk.source)}</div>`:''}</div>`;
      return `<div class="cb-quote${bsCls}${extraCls}"${hasColorAttr}${wrapStyle}><div class="q-text ${effectiveSz}">${parseBody(blk.content)}</div>${blk.source?`<div class="q-source">— ${esc(blk.source)}</div>`:''}</div>`;
    case 'infocard':
      return `<div class="cb-infocard${bsCls}${extraCls}"${wrapStyle}>${blk.num?`<div class="ic-num">${esc(blk.num)}</div>`:''}${blk.title?`<div class="ic-title ${effectiveSz}">${esc(blk.title)}</div>`:''}${blk.desc?`<div class="ic-desc ${effectiveSz}">${parseBody(blk.desc)}</div>`:''}</div>`;
    case 'keystat': {
      const kv = blk.variant || '';
      if (kv === 'hero')
        return `<div class="cb-herostat${extraCls}"${wrapStyle}>${blk.value?`<div class="hs-value">${esc(blk.value)}</div>`:''}<div class="hs-sep"></div>${blk.label?`<div class="hs-label">${esc(blk.label)}</div>`:''}${blk.caption?`<div class="hs-caption">${inl(blk.caption)}</div>`:''}</div>`;
      if (kv === 'metric') {
        const dir = blk.deltaDir || 'up';
        const szCls = effectiveSz ? ` ${effectiveSz}` : '';
        return `<div class="cb-metric${szCls}${extraCls}"${wrapStyle}>
          ${blk.label?`<div class="m-label">${esc(blk.label)}</div>`:''}
          ${blk.value?`<div class="m-value">${esc(blk.value)}</div>`:''}
          ${(blk.delta||blk.deltaLabel)?`<div class="m-delta-row">${blk.delta?`<span class="cb-delta dir-${dir}">${esc(blk.delta)}</span>`:''}${blk.deltaLabel?`<span class="cb-delta-label">${esc(blk.deltaLabel)}</span>`:''}</div>`:''}
        </div>`;
      }
      if (kv === 'compare') {
        if (!blk.label && !blk.value && !blk.chipValue) return '';
        const chipNum = blk.chipValue ? parseFloat(blk.chipValue) : NaN;
        const chipCls = isNaN(chipNum) ? '' : chipNum > 0 ? ' chip-pos' : chipNum < 0 ? ' chip-neg' : '';
        return `<div class="cb-stat-compare ${effectiveSz}${extraCls}"${wrapStyle}>
          ${blk.label?`<div class="sc-label">${inl(blk.label)}</div>`:''}
          ${blk.value?`<div class="sc-value">${esc(blk.value)}</div>`:''}
          ${blk.chipValue?`<div class="sc-chip${chipCls}">${blk.chipLabel?`<span style="font-size:0.55em;font-weight:600;letter-spacing:0.1em;margin-right:6px;opacity:0.85">${esc(blk.chipLabel)}</span>`:''}${esc(blk.chipValue)}</div>`:''}
        </div>`;
      }
      return `<div class="cb-keystat ${effectiveSz}${bsCls}${extraCls}"${wrapStyle}>${blk.value?`<div class="ks-value">${esc(blk.value)}</div>`:''}${blk.label?`<div class="ks-label">${esc(blk.label)}</div>`:''}</div>`;
    }
    case 'ranking': {
      const items = (blk.items||[]).filter(it => it && (it.name||it.value));
      if (!items.length) return '';
      return `<div class="cb-ranking ${effectiveSz}${extraCls}"${wrapStyle}>
        ${blk.title?`<div class="r-title">${esc(blk.title)}</div>`:''}
        ${items.map(it => {
          const pct = Math.max(0, Math.min(100, Number(it.pct)||0));
          const barStyle = it.accent ? `background:${it.accent}` : '';
          return `<div class="r-row">
            <div class="r-name">${esc(it.name||'')}</div>
            <div class="r-track"><div class="r-fill" style="width:${pct}%${barStyle?';'+barStyle:''}"></div></div>
            <div class="r-value">${esc(it.value||'')}</div>
          </div>`;
        }).join('')}
      </div>`;
    }
    case 'progress': {
      const size = blk.size || 'm';
      const px = size==='s' ? 120 : size==='l' ? 220 : 170;
      return `<div class="cb-progress sz-${size}${extraCls}"${wrapStyle}>
        <div class="p-wrap" style="width:${px}px;height:${px}px">${svgProgressRing(blk.value, px)}<div class="p-center">${Number(blk.value)||0}%</div></div>
        ${blk.label?`<div class="p-label">${esc(blk.label)}</div>`:''}
        ${blk.caption?`<div class="p-caption">${esc(blk.caption)}</div>`:''}
      </div>`;
    }
    case 'kpigrid': {
      const items = (blk.items||[]).slice(0, 4);
      if (!items.length) return '';
      return `<div class="cb-kpigrid ${effectiveSz}${extraCls}"${wrapStyle}>
        ${items.map(it => {
          const dir = it.deltaDir || 'up';
          return `<div class="k-cell">
            ${it.label?`<div class="k-label">${esc(it.label)}</div>`:''}
            ${it.value?`<div class="k-value">${esc(it.value)}</div>`:''}
            ${it.delta?`<div class="k-delta-row"><span class="cb-delta dir-${dir}">${esc(it.delta)}</span></div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    }
    case 'sparkcard': {
      const dir = blk.deltaDir || 'up';
      return `<div class="cb-sparkcard ${effectiveSz}${extraCls}"${wrapStyle}>
        <div class="sc-head">
          <div class="sc-left">
            ${blk.title?`<div class="sc-title">${esc(blk.title)}</div>`:''}
            ${blk.value?`<div class="sc-value">${esc(blk.value)}</div>`:''}
          </div>
          ${blk.delta?`<span class="cb-delta dir-${dir}">${esc(blk.delta)}</span>`:''}
        </div>
        <div class="sc-chart">${svgSparkline(blk.values, 600, 56)}</div>
      </div>`;
    }
    case 'callout': {
      const v = blk.variant || 'note';
      const iconMap = { note:'ℹ', tip:'✦', warning:'⚠', danger:'●', quote:'❝', abstract:'≡' };
      const icon = iconMap[v] || 'ℹ';
      return `<div class="cb-callout v-${v} ${effectiveSz}${extraCls}"${wrapStyle}>
        <div class="co-icon">${icon}</div>
        <div class="co-body">
          ${blk.title?`<div class="co-title">${esc(blk.title)}</div>`:''}
          ${blk.content?`<div class="co-text ${effectiveSz}">${parseBody(blk.content)}</div>`:''}
        </div>
      </div>`;
    }
    case 'tldr': {
      if (blk.variant === 'source') {
        const items = (blk.items||[]).filter(i=>i && i.text && i.text.trim());
        if (!items.length) return '';
        return `<div class="cb-source${extraCls}">
          <span class="sr-label">Sources · 来源</span>
          <ol>${items.map(i=>`<li><span class="sr-id">[${esc(i.id||'')}]</span> ${inl(i.text)}</li>`).join('')}</ol>
        </div>`;
      }
      const pts = (blk.points||[]).filter(p=>p && p.trim());
      const badge = (blk.badge !== undefined ? blk.badge : '速览').trim();
      return `<div class="cb-tldr ${effectiveSz}${extraCls}"${wrapStyle}>
        ${badge?`<span class="td-badge">${esc(badge)}</span>`:''}
        ${blk.title?`<div class="td-title">${esc(blk.title)}</div>`:''}
        ${pts.length?`<ul class="td-list">${pts.map(p=>`<li>${inl(p)}</li>`).join('')}</ul>`:''}
      </div>`;
    }
    case 'panel': {
      // Nested container: render children inline (recursion guarded — skip nested panels)
      const children = (blk.children||[]).filter(c => c && c.type && c.type !== 'panel');
      const inner = children.map(c => renderBlock(c, sz)).join('');
      return `<div class="cb-panel ${effectiveSz}${extraCls}"${wrapStyle}>
        ${(blk.title||blk.subtitle) ? `<div class="pn-head">
          ${blk.title?`<div class="pn-title">${esc(blk.title)}</div>`:''}
          ${blk.subtitle?`<div class="pn-sub">${esc(blk.subtitle)}</div>`:''}
        </div>` : ''}
        <div class="pn-body">${inner}</div>
      </div>`;
    }
    case 'tags': {
      const tags = blk.items.filter(i=>i.trim());
      return tags.length ? `<div class="cb-tags${extraCls}"${wrapStyle}>${tags.map(t=>`<span class="cb-tag">${esc(t)}</span>`).join('')}</div>` : '';
    }
    case 'disclaimer': {
      if (!blk.content || !blk.content.trim()) return '';
      return `<div class="cb-disclaimer ${effectiveSz}${extraCls}"${wrapStyle}>
        <span class="dc-tag">风险提示</span>${inl(blk.content)}
      </div>`;
    }
    case 'qrcode': {
      if (!blk.text || !blk.text.trim()) return '';
      const sz = blk.size || 'm';
      const kind = blk.kind || 'wechat';
      const pos  = blk.position || 'right';
      const sizePx = sz === 's' ? 120 : sz === 'l' ? 200 : 160;
      let qrHtml = '';
      try {
        if (typeof qrcode === 'function') {
          const q = qrcode(0, 'M');
          q.addData(blk.text);
          q.make();
          qrHtml = q.createSvgTag({ cellSize: Math.max(2, Math.floor(sizePx / q.getModuleCount())), margin: 0 });
        } else {
          qrHtml = `<div class="qr-fallback">${esc(blk.text)}</div>`;
        }
      } catch(err) {
        qrHtml = `<div class="qr-fallback">${esc(blk.text)}</div>`;
      }
      return `<div class="cb-qrcode sz-${sz} qr-pos-${pos} qr-kind-${kind}${extraCls}"${wrapStyle}>
        <div class="qr-canvas">${qrHtml}</div>
        ${blk.label?`<div class="qr-label">${esc(blk.label)}</div>`:''}
      </div>`;
    }
    case 'table': {
      const tblCls = ['card-table','cb-table'];
      if (blk.style === 'bordered') tblCls.push('table-bordered');
      else if (blk.style === 'compact') tblCls.push('table-compact');
      else if (blk.style === 'minimal') tblCls.push('table-minimal');
      const isAutoLayout = blk.tableLayout === 'auto';
      if (isAutoLayout) tblCls.push('table-auto');
      const alignMap = { left:'', center:'cell-center', right:'cell-right' };
      const widthMap = { narrow:'col-narrow', wide:'col-wide' };
      const numPat = /^[-+]?(\d+\.?\d*|\.\d+)(%?)$/;
      const hlRows = blk.highlightRows || [];
      const numColor = blk.numberColor !== false;
      let tbl = isAutoLayout ? `<div class="cb-table-wrap">` : '';
      tbl += `<table class="${tblCls.join(' ')} ${effectiveSz}${extraCls}"${wrapStyle}>`;
      if (blk.title) tbl += `<caption>${esc(blk.title)}</caption>`;
      tbl += `<thead><tr>`;
      (blk.headers||[]).forEach((hd, ci) => {
        const ca = (blk.colAligns||[])[ci] || '';
        const cw = (blk.colWidths||[])[ci] || '';
        tbl += `<th class="${alignMap[ca]||''} ${widthMap[cw]||''}">${esc(hd)}</th>`;
      });
      tbl += `</tr></thead><tbody>`;
      // 计算被合并覆盖的格子（hidden 标记）
      const rows = blk.rows || [];
      const hidden = rows.map(r => r.map(() => false));
      rows.forEach((row, ri) => {
        row.forEach((cell, ci) => {
          const rs = Math.max(1, parseInt(cell.rs)||1);
          const cs = Math.max(1, parseInt(cell.cs)||1);
          if (rs===1 && cs===1) return;
          for (let dr=0; dr<rs; dr++) for (let dc=0; dc<cs; dc++) {
            if (dr===0 && dc===0) continue;
            if (hidden[ri+dr] && hidden[ri+dr][ci+dc] !== undefined) hidden[ri+dr][ci+dc] = true;
          }
        });
      });
      rows.forEach((row, ri) => {
        const isHl = hlRows.includes(ri);
        tbl += `<tr${isHl?' class="row-highlight"':''}>`;
        row.forEach((cell, ci) => {
          if (hidden[ri][ci]) return;
          const txt = cell.text || '';
          const ca = (blk.colAligns||[])[ci] || '';
          let cls = alignMap[ca] || '';
          if (isHl) cls += ' cell-bold';
          const rs = Math.max(1, parseInt(cell.rs)||1);
          const cs = Math.max(1, parseInt(cell.cs)||1);
          let html;
          if (numColor && numPat.test(txt)) {
            const num = parseFloat(txt);
            if (num > 0) cls += ' num-pos';
            else if (num < 0) cls += ' num-neg';
            else cls += ' num-zero';
            html = esc(txt);
          } else {
            html = inl(txt);
          }
          tbl += `<td class="${cls}"${rs>1?` rowspan="${rs}"`:''}${cs>1?` colspan="${cs}"`:''}>${html}</td>`;
        });
        tbl += `</tr>`;
      });
      tbl += `</tbody></table>`;
      if (blk.note) tbl += `<div style="font-size:24px;color:var(--sub);line-height:1.7;margin-top:8px">${inl(blk.note)}</div>`;
      if (isAutoLayout) tbl += `</div>`;
      return tbl;
    }
    case 'grid': {
      const valid = blk.items.filter(i=>i.label||i.text);
      return valid.length ? `<div class="cb-grid${extraCls}"${wrapStyle}>${valid.map(item=>`<div class="cb-grid-item${bsCls}">${item.label?`<div class="gi-label">${esc(item.label)}</div>`:''}<div class="gi-text ${effectiveSz}">${inl(item.text)}</div></div>`).join('')}</div>` : '';
    }
    case 'divider':
      return `<div class="cb-divider${blk.spacing?' sp-'+blk.spacing:''}"><div class="dl"></div><div class="dc">· · ·</div><div class="dl"></div></div>`;
    case 'image': {
      if (!blk.src) return '';
      const bH = resolveH(blk.h);
      const bFit = blk.fit || 'contain';
      let bContS = '', bImgS = '';
      if (bFit === 'cover') {
        if (bH > 0) bContS = ` style="height:${bH}px"`;
        const z = Math.max(1, Math.min(4, Number(blk.zoom) || 1));
        const zS = z > 1 ? `;transform:scale(${z});transform-origin:${blk.cropX||50}% ${blk.cropY||50}%` : '';
        bImgS = ` style="object-position:${blk.cropX||50}% ${blk.cropY||50}%${zS}"`;
      } else {
        if (bH > 0) bImgS = ` style="max-height:${bH}px"`;
      }
      return `<div class="cb-image fit-${bFit}${extraCls}"${bContS}><img src="${blk.src}"${bImgS}>${blk.caption?`<div class="img-caption">${esc(blk.caption)}</div>`:''}</div>`;
    }
    case 'sectionHeader': {
      if (!blk.label && !blk.num && !blk.icon) return '';
      const shCls = blk.shStyle ? ` sh-style-${blk.shStyle}` : '';
      const numHtml = blk.num ? `<span class="sh-num">${esc(blk.num)}</span>` : '';
      const iconHtml = blk.icon ? `<span class="sh-icon">${esc(blk.icon)}</span>` : '';
      const labelHtml = blk.label ? `<span class="sh-label">${esc(blk.label)}</span>` : '';
      // Banner variant: icon → label → num → accent line (poster style)
      if (blk.shStyle === 'banner') {
        return `<div class="cb-section-header${shCls}${extraCls}">${iconHtml || '<span class="sh-icon">●</span>'}${labelHtml}${numHtml}<div class="sh-line"></div></div>`;
      }
      return `<div class="cb-section-header${shCls}${extraCls}">${numHtml}<div class="sh-line"></div>${labelHtml}${iconHtml}<div class="sh-line"></div></div>`;
    }
    case 'gallery': {
      const galCls = blk.layout ? ` gal-${blk.layout}` : ' gal-2';
      const items = blk.images.filter(img => img.src);
      if (!items.length) return `<div class="cb-gallery${galCls}${extraCls}"><div class="gal-item"><div style="display:flex;align-items:center;justify-content:center;height:180px;color:var(--sub);opacity:0.35;font-size:24px">点击左侧上传图片</div></div></div>`;
      return `<div class="cb-gallery${galCls}${extraCls}">${items.map(img=>`<div class="gal-item"><img src="${img.src}">${img.label?`<div class="gal-label">${esc(img.label)}</div>`:''}</div>`).join('')}</div>`;
    }
    case 'textWrap': {
      const twMap = { xs:'sz-xs', small:'sz-s', s:'sz-s', ms:'sz-ms', '':'', ml:'sz-ml', l:'sz-l', large:'sz-l', xl:'sz-xl' };
      const twSz = blk.customSize ? (twMap[blk.customSize] || '') : '';
      const sideCls = blk.wrapSide === 'right' ? 'wrap-right' : 'wrap-left';
      const sizeCls = blk.wrapSize === 'sm' ? 'wrap-sm' : blk.wrapSize === 'lg' ? 'wrap-lg' : '';
      const roundCls = blk.wrapRound ? ` wrap-round-${blk.wrapRound}` : '';
      const gapCls = blk.wrapGap ? ` wrap-gap-${blk.wrapGap}` : '';
      const shadowCls = blk.wrapShadow ? ` wrap-shadow-${blk.wrapShadow}` : '';
      const vAlignCls = blk.wrapVAlign ? ` wrap-valign-${blk.wrapVAlign}` : '';
      const imgHtml = blk.src ? `<div class="wrap-img ${sideCls} ${sizeCls}${roundCls}${gapCls}${shadowCls}"><img src="${blk.src}"></div>` : '';
      return `<div class="cb-text-wrap ${twSz}${extraCls}${vAlignCls}"${hasColorAttr}${wrapStyle}>${imgHtml}${parseBody(blk.content)}</div>`;
    }
    default: return '';
  }
}

// ====== Render: Card ======
// 3.2-D 块并排：连续 col 非空的块包进一个 flex 行容器，等分排布
function renderBlockSeq(blocks, sz) {
  let out = '', i = 0;
  const bs = blocks || [];
  while (i < bs.length) {
    const b = bs[i];
    if (b && b.col) {
      let row = '<div class="cb-row">';
      while (i < bs.length && bs[i] && bs[i].col) {
        row += `<div class="cb-rowcell">${renderBlock(bs[i], sz)}</div>`;
        i++;
      }
      out += row + '</div>';
    } else {
      out += renderBlock(b, sz);
      i++;
    }
  }
  return out;
}

function renderCard() {
  const page = cp();
  const szMap = { 'xs':'sz-xs', 'small':'sz-s', 'ms':'sz-ms', 'medium':'', 'ml':'sz-ml', 'large':'sz-l', 'xl':'sz-xl' };
  const sz = szMap[state.fontSize] || '';
  els.cardOutput.className = `card theme-${state.theme}`;
  // 自定义强调色覆盖（非空时盖过主题 --accent 及其 alpha 派生）
  const _co = els.cardOutput.style;
  const _ca = (state.customAccent || '').trim();
  if (/^#[0-9a-fA-F]{6}$/.test(_ca)) {
    const r=parseInt(_ca.slice(1,3),16), g=parseInt(_ca.slice(3,5),16), b=parseInt(_ca.slice(5,7),16);
    _co.setProperty('--accent', _ca);
    _co.setProperty('--accent-l', `rgba(${r},${g},${b},0.08)`);
    _co.setProperty('--accent-m', `rgba(${r},${g},${b},0.16)`);
    _co.setProperty('--accent-s', `rgba(${r},${g},${b},0.28)`);
  } else {
    _co.removeProperty('--accent'); _co.removeProperty('--accent-l');
    _co.removeProperty('--accent-m'); _co.removeProperty('--accent-s');
  }
  if (state.fontMood) els.cardOutput.classList.add('mood-' + state.fontMood);
  if (state.density)  els.cardOutput.classList.add('density-' + state.density);
  if (page.template === 'dashboard') els.cardOutput.classList.add('template-dashboard');

  els.pageIndicator.style.display = state.pages.length > 1 ? '' : 'none';
  if (state.pages.length > 1) els.pageIndicator.textContent = `${state.currentPageIndex+1} / ${state.pages.length}`;

  // Clean up template-specific classes
  els.cardContent.classList.remove('cover-layout', 'fullimg-layout', 'split-layout', 'v-numeric', 'v-diagonal', 'v-offset');
  els.cardContent.removeAttribute('data-index');

  // Apply background style
  const bgEl = els.cardOutput.querySelector('.card-bg');
  if (bgEl) bgEl.className = `card-bg bg-${page.bgStyle||'dots'}`;

  // Cover background image management
  let coverBgEl = els.cardOutput.querySelector('.cover-bg-img');
  if (page.template === 'cover' && page.image) {
    if (!coverBgEl) {
      coverBgEl = document.createElement('div');
      coverBgEl.className = 'cover-bg-img';
      els.cardOutput.insertBefore(coverBgEl, els.cardContent);
    }
    coverBgEl.innerHTML = `<img src="${page.image}" style="object-position:${page.cropX||50}% ${page.cropY||50}%"><div class="cover-bg-overlay"></div>`;
    els.cardContent.classList.add('cover-has-img');
  } else {
    if (coverBgEl) coverBgEl.remove();
    els.cardContent.classList.remove('cover-has-img');
  }

  const ta = page.titleAlign === 'center' ? 'ta-c' : '';
  let h = '';

  if (page.template !== 'dashboard') {
    if (page.category) h += `<div class="card-category ${ta}">${esc(page.category)}</div>`;
    if (page.title) {
      h += `<div class="card-title ${sz} ${ta}">${page.title.replace(/\\n|\n/g,'<br>')}</div>`;
      h += `<div class="card-accent-bar ${ta}"></div>`;
    }
    if (page.subtitle) h += `<div class="card-subtitle ${sz} ${ta}">${esc(page.subtitle)}</div>`;
  }

  if (page.template === 'cover') {
    // Cover: centered layout
    els.cardContent.classList.add('cover-layout');
    // Variant support
    els.cardContent.classList.remove('v-numeric', 'v-diagonal', 'v-offset');
    els.cardContent.removeAttribute('data-index');
    if (page.coverVariant) {
      els.cardContent.classList.add('v-' + page.coverVariant);
      if (page.coverVariant === 'numeric') {
        els.cardContent.setAttribute('data-index', page.coverIndex || '01');
      }
    }
    h = ''; // Reset h, cover builds its own layout
    // 系列徽标（右上角）
    if (state.seriesIndex) {
      const sn = state.seriesName ? ` · ${esc(state.seriesName)}` : '';
      const st = state.seriesTotal ? ` / ${esc(state.seriesTotal)}` : '';
      h += `<div class="series-badge">第 ${esc(state.seriesIndex)} ${esc(state.seriesUnit||'期')}${st}${sn}</div>`;
    }
    h += `<div class="cover-spacer"></div>`;
    if (page.coverDeco) h += `<div class="cover-deco">${esc(page.coverDeco)}</div>`;
    if (page.category) h += `<div class="card-category ta-c">${esc(page.category)}</div>`;
    if (page.title) h += `<div class="cover-title ${sz}">${page.title.replace(/\\n|\n/g,'<br>')}</div>`;
    h += `<div class="card-accent-bar ta-c"></div>`;
    if (page.subtitle) h += `<div class="cover-sub">${esc(page.subtitle)}</div>`;
    if (page.coverTag) h += `<div class="cover-tag">${esc(page.coverTag)}</div>`;
    h += `<div class="cover-spacer"></div>`;
    if (state.authorName || state.authorTitle) {
      h += `<div class="cover-footer"><div class="card-avatar">${state.avatar?`<img src="${state.avatar}">`:(state.authorName?esc(state.authorName[0]):'?')}</div><div class="card-author-name">${esc(state.authorName)}</div>${state.authorTitle?`<div class="card-author-title">${esc(state.authorTitle)}</div>`:''}</div>`;
    }
  } else if (page.template === 'imageOnly') {
    // Full image layout
    els.cardContent.classList.add('fullimg-layout');
    h = '';
    if (page.image) {
      const fullFit = page.imageFit || 'contain';
      const fullPos = fullFit === 'cover' ? `;object-position:${page.cropX||50}% ${page.cropY||50}%` : '';
      h += `<div class="fullimg-wrap"><img src="${page.image}" style="object-fit:${fullFit}${fullPos}">`;
      if (page.fullImgCaption) h += `<div class="fullimg-caption">${esc(page.fullImgCaption)}</div>`;
      h += `</div>`;
    } else {
      h += `<div class="fullimg-placeholder">点击左侧上传图片</div>`;
    }
  } else if (page.template === 'text' || page.template === 'imageText') {
    if (page.template === 'imageText' && page.imageSplit) {
      // ── Split layout: image left, content right ──
      els.cardContent.classList.add('split-layout');
      h = '';
      const swCls = page.splitW ? ` sw-${page.splitW}` : '';
      const fitCls = page.imageFit === 'cover' ? ' split-cover' : '';
      let leftCol = `<div class="split-img-col${swCls}${fitCls}">`;
      const splitImgStyle = page.imageFit==='cover' ? ` style="object-position:${page.cropX||50}% ${page.cropY||50}%"` : '';
      leftCol += page.image ? `<img src="${page.image}"${splitImgStyle}>` : `<div class="split-img-placeholder">配图区域</div>`;
      leftCol += `</div>`;
      let rightCol = `<div class="split-text-col">`;
      if (page.category) rightCol += `<div class="card-category ${ta}">${esc(page.category)}</div>`;
      if (page.title) {
        rightCol += `<div class="card-title ${sz} ${ta}">${page.title.replace(/\\n|\n/g,'<br>')}</div>`;
        rightCol += `<div class="card-accent-bar ${ta}"></div>`;
      }
      if (page.subtitle) rightCol += `<div class="card-subtitle ${sz} ${ta}">${esc(page.subtitle)}</div>`;
      rightCol += `<div class="card-body">`;
      rightCol += renderBlockSeq(page.blocks, sz);
      rightCol += `</div>`;
      // Footer inside right column
      const _ftHide = state.footerStyle === 'hide';
      const _hasFt = state.authorName || state.authorTitle || state.footerCta;
      if (_hasFt && !_ftHide) {
        const _ftCls = `card-footer${state.footerStyle?` ft-style-${state.footerStyle}`:''}`;
        const _author = (state.authorName || state.authorTitle) ? `<div class="ft-author"><div class="card-avatar">${state.avatar?`<img src="${state.avatar}">`:(state.authorName?esc(state.authorName[0]):'?')}</div><div>${state.authorName?`<div class="card-author-name">${esc(state.authorName)}</div>`:''}${state.authorTitle?`<div class="card-author-title">${esc(state.authorTitle)}</div>`:''}</div></div>` : '';
        const _cta = state.footerCta ? `<div class="ft-cta">${inl(state.footerCta)}</div>` : '';
        rightCol += `<div class="${_ftCls}">${_author}${_cta}</div>`;
      }
      rightCol += `</div>`;
      h = leftCol + rightCol;
    } else {
      if (page.template === 'imageText') {
        const imgH = resolveH(page.imageH);
        const fitMode = page.imageFit || 'contain';
        let contStyle = '';
        let imgInline = '';
        if (fitMode === 'cover') {
          if (imgH > 0) contStyle = ` style="height:${imgH}px"`;
          imgInline = ` style="object-position:${page.cropX||50}% ${page.cropY||50}%"`;
        } else {
          if (imgH > 0) contStyle = ''; // contain uses max-height on img
          imgInline = imgH > 0 ? ` style="max-height:${imgH}px"` : '';
        }
        h += `<div class="card-image-area fit-${fitMode}"${fitMode==='cover'?contStyle:''}>`;
        h += page.image ? `<img src="${page.image}"${imgInline}>` : `<div class="card-image-placeholder">配图区域</div>`;
        h += `</div>`;
      }
      h += `<div class="card-body">`;
      h += renderBlockSeq(page.blocks, sz);
      h += `</div>`;
    }
  } else if (page.template === 'dashboard') {
    h = `<div class="dash-hero">
      <div class="dh-left">
        ${page.category?`<div class="card-category">${esc(page.category)}</div>`:''}
        <div class="dh-greet">${esc(page.greeting || page.title || 'Hello')}</div>
        ${page.subtitle?`<div class="card-subtitle ${sz}" style="margin-top:4px">${esc(page.subtitle)}</div>`:''}
      </div>
      <div class="dh-meta">
        ${page.dashDate?`<div>${esc(page.dashDate)}</div>`:''}
        ${page.dashRange?`<span class="dh-range">${esc(page.dashRange)}</span>`:''}
      </div>
    </div>`;
    h += renderBlockSeq(page.blocks, sz);
  } else if (page.template === 'dataCard') {
    if (page.heroValue || page.heroLabel) {
      h += `<div class="card-hero-keystat">${page.heroValue?`<div class="card-hero-value">${esc(page.heroValue)}</div>`:''}${page.heroLabel?`<div class="card-hero-label">${esc(page.heroLabel)}</div>`:''}</div>`;
    }
    // 统一走 table 块渲染管线（支持合并单元格/风格/对齐/列宽/高亮/A股色，单处维护）
    if (!page.tableData || typeof page.tableData !== 'object') page.tableData = makeBlock('table');
    h += renderBlock(page.tableData, sz);
    // 数据卡片页也支持插入其他 block（在表格之后）
    h += renderBlockSeq(page.blocks, sz);
  }

  // Footer (skip for split layout – already included inside right column)
  const isSplit = page.template === 'imageText' && page.imageSplit;
  const ftHide = state.footerStyle === 'hide';
  const hasFooterContent = state.authorName || state.authorTitle || state.footerCta;
  if (!isSplit && page.template !== 'cover' && page.template !== 'imageOnly' && hasFooterContent && !ftHide) {
    const ftCls = `card-footer${state.footerStyle?` ft-style-${state.footerStyle}`:''}`;
    const authorBlk = (state.authorName || state.authorTitle) ? `<div class="ft-author"><div class="card-avatar">${state.avatar?`<img src="${state.avatar}">`:(state.authorName?esc(state.authorName[0]):'?')}</div><div>${state.authorName?`<div class="card-author-name">${esc(state.authorName)}</div>`:''}${state.authorTitle?`<div class="card-author-title">${esc(state.authorTitle)}</div>`:''}</div></div>` : '';
    const ctaBlk = state.footerCta ? `<div class="ft-cta">${inl(state.footerCta)}</div>` : '';
    h += `<div class="${ftCls}">${authorBlk}${ctaBlk}</div>`;
  }

  els.cardContent.innerHTML = h;
  detectPortraitImages();
  renderPreviewInfo();
  requestAnimationFrame(checkOverflow);
}

// ====== Render: Page Strip ======
function renderPageStrip() {
  const icon = t => ({text:'T',imageText:'图',dataCard:'数',cover:'封',imageOnly:'🖼'}[t]||'?');
  els.pageStrip.innerHTML = state.pages.map((p,i)=>`
    <div class="page-pill ${i===state.currentPageIndex?'active':''}" data-index="${i}">
      <span style="font-size:9px;opacity:0.45;position:absolute;top:4px">${icon(p.template)}</span>
      ${i+1}
      ${state.pages.length>1?`<button class="delete-page" data-del="${i}">×</button>`:''}
    </div>`).join('')+
    `<button class="page-add" ${state.pages.length>=18?'disabled style="opacity:0.3;cursor:not-allowed"':''}>+</button>`;
}

function renderPreviewInfo() {
  els.previewInfo.textContent = `第 ${state.currentPageIndex+1} 页 / 共 ${state.pages.length} 页`;
  els.prevPage.style.visibility = state.currentPageIndex>0 ? 'visible' : 'hidden';
  els.nextPage.style.visibility = state.currentPageIndex<state.pages.length-1 ? 'visible' : 'hidden';
}

// ====== Scale Preview ======
function scalePreview() {
  const panel = els.previewPanel;
  const W = state.cardW, H = state.cardH;
  const availW = panel.clientWidth - 80, availH = panel.clientHeight - 180;
  const scale = Math.min(availW / W, availH / H, 1);
  const wrapper = els.previewWrapper;
  wrapper.style.width = Math.round(W * scale) + 'px';
  wrapper.style.height = Math.round(H * scale) + 'px';
  wrapper.style.transform = 'none';
  const card = els.cardOutput;
  card.style.width = W + 'px'; card.style.height = H + 'px';
  card.style.position = 'absolute'; card.style.top = '0'; card.style.left = '0';
  card.style.transform = `scale(${scale})`; card.style.transformOrigin = 'top left';
}

// ====== Full Render ======
function render() {
  renderTemplateTabs(); renderEditorFields();
  renderPalette(); renderFontSize();
  renderPageStrip(); renderCard(); scalePreview();
}

// ── Typography preset: apply coordinated spacing/lineHeight/fontWeight across all blocks ──
// 直接写 canonical 的 rhythm（renderBlock 只认 blk.rhythm，旧 spacing/lineHeight
// 在有 rhythm 时被忽略；1.0 接入 migrateBlock 后块普遍带 rhythm，故必须写 rhythm 才生效）
const TYPO_PRESETS = {
  compact:   { rhythm: 'tight',  fontWeight: '',       desc: '紧凑 · 密集信息流，适合数据密集型笔记' },
  balanced:  { rhythm: '',       fontWeight: '',       desc: '平衡 · 默认推荐，文字与留白均衡' },
  breathing: { rhythm: 'loose',  fontWeight: '',       desc: '呼吸 · 强调留白，正文行距更舒展' },
  editorial: { rhythm: 'loose',  fontWeight: 'medium', desc: '杂志 · 层次分明，正文略加重' },
  reset:     { rhythm: '',       fontWeight: '',       desc: '已清除所有自定义节奏' },
};
const typoPresetRow = document.getElementById('typoPresetRow');
const typoPresetHint = document.getElementById('typoPresetHint');
function _syncTypoPresetActive() {
  if (!typoPresetRow) return;
  const cur = state.typoPreset || '';
  typoPresetRow.querySelectorAll('.font-size-btn').forEach(x => x.classList.toggle('active', x.dataset.preset === cur));
  if (typoPresetHint) typoPresetHint.textContent = cur && TYPO_PRESETS[cur] ? TYPO_PRESETS[cur].desc : '';
}
if (typoPresetRow) {
  typoPresetRow.addEventListener('click', e => {
    const b = e.target.closest('.font-size-btn');
    if (!b) return;
    const presetKey = b.dataset.preset;
    const preset = TYPO_PRESETS[presetKey];
    if (!preset) return;
    const page = cp();
    const eligible = (page.blocks || []).filter(blk => blk.type !== 'divider' && blk.type !== 'image');
    if (!eligible.length) {
      showToast('当前页没有可调整排版节奏的模块', 'warn', 2600);
      return;
    }
    // 统计将被覆盖的「手工调过排版」的模块数（rhythm/spacing/lineHeight/fontWeight 与目标不一致）
    const isReset = presetKey === 'reset';
    let overridden = 0;
    eligible.forEach(blk => {
      const hadManual = blk.rhythm || blk.spacing || blk.lineHeight || blk.fontWeight;
      const willChange = isReset
        ? !!hadManual
        : (blk.rhythm !== preset.rhythm || blk.fontWeight !== preset.fontWeight || blk.spacing || blk.lineHeight);
      if (hadManual && willChange) overridden++;
      // 统一写 canonical rhythm，并移除旧 spacing/lineHeight（单一真源，避免与 rhythm 打架）
      blk.rhythm = preset.rhythm;
      blk.fontWeight = preset.fontWeight;
      delete blk.spacing;
      delete blk.lineHeight;
    });
    state.typoPreset = isReset ? '' : presetKey;
    _syncTypoPresetActive();
    renderEditorFields(); renderCard();
    pushHistory(`排版·${b.textContent.trim()}`);
    const extra = overridden ? `（含 ${overridden} 个你手动调过的模块一并统一）` : '';
    showToast(`${preset.desc}${extra}`, 'success', overridden ? 3600 : 2400);
  });
  _syncTypoPresetActive();  // 初始化
}

// ====== Export ======
async function exportPage(idx) {
  const prev = state.currentPageIndex;
  state.currentPageIndex = idx; renderCard(); renderTemplateTabs();
  await new Promise(r => setTimeout(r, 200));
  const TIMEOUT_MS = 12000;
  try {
    const url = await Promise.race([
      htmlToImage.toPng(els.cardOutput, {
        width: state.cardW, height: state.cardH, pixelRatio: 2, backgroundColor: null,
        style: { transform: 'none', position: 'static', left: '0', top: '0' },
        filter: (node) => {
          if (!node || !node.classList) return true;
          if (node.classList.contains('card-overflow-overlay')) return false;
          if (node.classList.contains('card-overflow-badge')) return false;
          if (node.classList.contains('toast')) return false;
          if (node.classList.contains('find-replace-bar')) return false;
          return true;
        }
      }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT')), TIMEOUT_MS))
    ]);
    const a = document.createElement('a'); a.download = `笔记-${idx+1}.png`; a.href = url; a.click();
    return true;
  } catch(err) {
    console.error(err);
    if (err && err.message === 'TIMEOUT') {
      showToast(`导出超时（${TIMEOUT_MS/1000}s）。建议：减少图片数量 / 关闭玻璃态主题 / 缩小画幅`, 'error', 5000);
    } else {
      showToast('导出失败：' + (err && err.message ? err.message : '未知错误'), 'error', 4000);
    }
    return false;
  } finally {
    state.currentPageIndex = prev; renderCard(); scalePreview(); renderTemplateTabs();
  }
}

els.exportCurrent.addEventListener('click', async () => {
  els.exportCurrent.disabled=true; els.exportCurrent.textContent='导出中...';
  await exportPage(state.currentPageIndex);
  els.exportCurrent.disabled=false; els.exportCurrent.textContent='导出当前页'; showToast('导出成功 ✓');
});
els.exportAll.addEventListener('click', async () => {

  for(let i=0;i<state.pages.length;i++){ await exportPage(i); await new Promise(r=>setTimeout(r,350)); }
  els.exportAll.disabled=false; els.exportAll.textContent='导出全部页面'; showToast(`已导出 ${state.pages.length} 页 ✓`);
});

// ====== Long Image Export — 拼接所有页面为单张长图 ======
async function _renderPageToDataUrl(idx, timeout = 12000) {
  const prev = state.currentPageIndex;
  state.currentPageIndex = idx;
  renderCard(); renderTemplateTabs();
  await new Promise(r => setTimeout(r, 200));
  try {
    return await Promise.race([
      htmlToImage.toPng(els.cardOutput, {
        width: state.cardW, height: state.cardH, pixelRatio: 2, backgroundColor: null,
        style: { transform: 'none', position: 'static', left: '0', top: '0' },
        filter: (node) => {
          if (!node || !node.classList) return true;
          if (node.classList.contains('card-overflow-overlay')) return false;
          if (node.classList.contains('card-overflow-badge')) return false;
          if (node.classList.contains('toast')) return false;
          if (node.classList.contains('find-replace-bar')) return false;
          return true;
        }
      }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT')), timeout))
    ]);
  } finally {
    state.currentPageIndex = prev;
  }
}
async function exportLongImage() {
  const n = state.pages.length;
  if (n < 1) { showToast('没有页面可导出', 'warn'); return; }
  if (n === 1) { showToast('仅一页，建议改用「导出当前页」或选择「长图3x」画幅', 'info', 3000); }
  els.exportLong.disabled = true; els.exportLong.textContent = `拼接中 0/${n}…`;
  try {
    const imgs = [];
    for (let i = 0; i < n; i++) {
      els.exportLong.textContent = `拼接中 ${i+1}/${n}…`;
      const dataUrl = await _renderPageToDataUrl(i);
      const img = await new Promise((res, rej) => {
        const im = new Image();
        im.onload = () => res(im);
        im.onerror = rej;
        im.src = dataUrl;
      });
      imgs.push(img);
      await new Promise(r => setTimeout(r, 150));
    }
    // 计算画布大小（按第一页宽度对齐，pixelRatio=2 时图像实际为 2160 宽）
    const w = imgs[0].naturalWidth;
    const totalH = imgs.reduce((s, im) => s + im.naturalHeight, 0);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = totalH;
    const ctx = canvas.getContext('2d');
    let y = 0;
    imgs.forEach(im => {
      // 不同页宽不一致时居中绘制，避免拼接错位
      const dx = Math.round((w - im.naturalWidth) / 2);
      ctx.drawImage(im, dx, y);
      y += im.naturalHeight;
    });
    canvas.toBlob(blob => {
      if (!blob) { showToast('长图生成失败', 'error'); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = `长图-${n}页拼接.png`;
      a.href = url; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast(`已导出长图（${w}×${totalH}px，${n} 页）`, 'success', 3500);
    }, 'image/png');
  } catch(err) {
    console.error(err);
    if (err && err.message === 'TIMEOUT') {
      showToast('拼接超时，请减少页数或简化内容后重试', 'error', 4000);
    } else {
      showToast('长图导出失败：' + (err && err.message ? err.message : '未知错误'), 'error', 4000);
    }
  } finally {
    els.exportLong.disabled = false; els.exportLong.textContent = '导出长图';
    renderCard(); scalePreview(); renderTemplateTabs();
  }
}
if (els.exportLong) els.exportLong.addEventListener('click', exportLongImage);
